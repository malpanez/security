---
# Security Enforcement - Production (Gradual Rollout)
# Conservative, phased rollout for production systems
# Processes servers in small batches with validation between batches
#
# Usage:
#   ansible-playbook playbooks/enforce-production-gradual.yml -i inventory \
#     -e "rollout_percentage=10" -e "security_phase=1"
#
# Phases:
#   Phase 1: SSH Hardening only
#   Phase 2: Add Sudoers
#   Phase 3: Add MFA (most critical)
#   Phase 4: Add SELinux
#   Phase 5: Add Audit
#   Phase 6: Full enforcement

- name: Security Enforcement - Production (Gradual)
  hosts: production
  become: true
  gather_facts: true

  # CRITICAL: Gradual rollout
  serial: "{{ rollout_percentage | default('10%') }}"

  vars:
    # Which phase are we in? (1-6)
    security_phase: "{{ security_phase | default(1) }}"
    rollout_max_fail_percentage: "{{ rollout_max_fail_percentage | default(5) }}" # Stop if >5% fail

    # Conservative enforcement
    security_mode: enforce

    # Phase controls (set based on security_phase variable)
    security_phase_ssh_hardening: "{{ security_phase | int >= 1 }}"
    security_phase_sudoers: "{{ security_phase | int >= 2 }}"
    security_phase_mfa: "{{ security_phase | int >= 3 }}"
    security_phase_selinux: "{{ security_phase | int >= 4 }}"
    security_phase_audit: "{{ security_phase | int >= 5 }}"

    # Maintenance window requirement
    security_require_maintenance_window: true
    security_maintenance_day: "{{ maintenance_day | default('Saturday') }}"
    security_maintenance_hour_start: "{{ maintenance_hour | default(2) }}"
    security_maintenance_hour_end: "{{ maintenance_hour | default(2) + 4 }}"

  pre_tasks:
    - name: Display production enforcement warning
      ansible.builtin.debug:
        msg: |
          ========================================
          SECURITY ENFORCEMENT - PRODUCTION
          ========================================
          Phase: {{ security_phase }}
          Rollout: {{ rollout_percentage | default('10%') }}
          Max Failures: 5%

          Current Batch: {{ ansible_play_batch }}

          Phases Active:
          - Phase 1 (SSH): {{ security_phase_ssh_hardening }}
          - Phase 2 (Sudoers): {{ security_phase_sudoers }}
          - Phase 3 (MFA): {{ security_phase_mfa }}
          - Phase 4 (SELinux): {{ security_phase_selinux }}
          - Phase 5 (Audit): {{ security_phase_audit }}
          ========================================

    - name: Check if in maintenance window
      when: security_require_maintenance_window | default(true)

      block:
        - name: Get current time
          ansible.builtin.set_fact:
            current_hour: "{{ ansible_date_time.hour | int }}"
            current_day: "{{ ansible_date_time.weekday_name }}"

        - name: Verify maintenance window
          ansible.builtin.assert:
            that:
              - current_day == security_maintenance_day
              - current_hour | int >= security_maintenance_hour_start | int
              - current_hour | int < security_maintenance_hour_end | int
            fail_msg: |
              NOT IN MAINTENANCE WINDOW!
              Current: {{ current_day }} {{ current_hour }}:00
              Required: {{ security_maintenance_day }}
              Window: {{ security_maintenance_hour_start }}:00-{{ security_maintenance_hour_end }}:00

              Override with: -e security_require_maintenance_window=false (NOT RECOMMENDED)
            success_msg: Maintenance window confirmed
    - name: Critical reminder - emergency access
      ansible.builtin.debug:
        msg: |
          ⚠️  CRITICAL PRODUCTION DEPLOYMENT ⚠️

          Before continuing, ensure:
          1. Emergency SSH session is open to {{ inventory_hostname }}
          2. Console access credentials are available
          3. Rollback plan is understood
          4. On-call engineer is available
          5. Monitoring is active

          This will pause for 60 seconds. Press Ctrl+C to abort.

    - name: Final confirmation pause
      ansible.builtin.pause:
        seconds: 60
        prompt: PRODUCTION ENFORCEMENT - Starting in 60 seconds. Ctrl+C to abort.

    - name: Backup configurations
      ansible.builtin.include_tasks: ../tasks/backup-configs.yml
    - name: Detect capabilities
      ansible.builtin.include_role:
        name: security_capabilities

  roles:
    # Phase 1: SSH Hardening
    - role: sshd_hardening
      when: security_phase_ssh_hardening
      vars:
        # Conservative settings for production
        sshd_hardening_password_authentication: false
        sshd_hardening_permit_root_login: false
        sshd_hardening_max_auth_tries: 4 # Slightly more lenient

    # Phase 2: Sudoers (ALWAYS preserve main in production)
    - role: sudoers_baseline
      when: security_phase_sudoers
      vars:
        # WARNING: role manages /etc/sudoers when strict is true
        sudoers_baseline_strict: true
        sudoers_baseline_defaults:
          - use_pty
          - logfile=/var/log/sudo.log
        sudoers_baseline_groups:
          linux_admins:
            require_password: true
            commands:
              - /usr/bin/systemctl restart *

    # Phase 3: MFA (MOST CRITICAL - Extra validation)
    - role: pam_mfa
      when:
        - security_phase_mfa
        - security_capabilities_mfa_capable | default(false)
      vars:
        pam_mfa_enabled: true
        pam_mfa_totp_enabled: true
        # CRITICAL: Comprehensive service account list
        pam_mfa_service_accounts:
          - ansible
          - awx
          - ci
          - jenkins
          - gitlab-runner
          - monitoring
          - nagios
          - zabbix
          - prometheus
          - grafana
          - backup
          - rsync
          - sftp

    # Phase 4: SELinux (Start permissive, then enforcing)
    - role: selinux_enforcement
      when:
        - security_phase_selinux
        - ansible_os_family == 'RedHat'
      vars:
        selinux_enforcement_enabled: true
        # Conservative: permissive for first week
        selinux_enforcement_mode: >-
          {{ 'enforcing'
             if selinux_enforcement_production_ready | default(false)
             else 'permissive' }}

    # Phase 5: Audit Logging
    - role: audit_logging
      when: security_phase_audit
      vars:
        audit_logging_enabled: true

    # CIS Baseline (always in enforce)
    - role: cis_baseline
      vars:
        cis_baseline_enabled: true
        cis_baseline_mode: enforce

  post_tasks:
    - name: Validate services
      ansible.builtin.include_tasks: ../tasks/validate-services.yml
    - name: Critical validation - SSH
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        timeout: 30
        state: started
      delegate_to: localhost
      become: false
      register: ssh_validation

    - name: Critical validation - Sudo
      ansible.builtin.command: sudo -n true
      register: sudo_validation
      failed_when: false
      changed_when: false

    - name: Rollback on validation failure
      block:
        - name: Check validation results
          ansible.builtin.assert:
            that:
              - ssh_validation is success
              - sudo_validation.rc in [0, 1]
            fail_msg: Validation failed - initiating rollback

      rescue:
        - name: Execute emergency rollback
          ansible.builtin.include_tasks: ../tasks/rollback.yml
        - name: Fail playbook after rollback
          ansible.builtin.fail:
            msg: Validation failed on {{ inventory_hostname }} - changes rolled back

    - name: Generate production enforcement report
      ansible.builtin.copy:
        dest: /var/log/security-enforcement-{{ ansible_date_time.epoch }}.log
        content: |
          Production Security Enforcement Report
          =======================================
          Timestamp: {{ ansible_date_time.iso8601 }}
          Hostname: {{ inventory_hostname }}
          Phase: {{ security_phase }}
          Rollout Batch: {{ rollout_percentage | default('10%') }}

          Applied Changes:
          - SSH Hardening: {{ security_phase_ssh_hardening }}
          - Sudoers (sudoers.d/ only): {{ security_phase_sudoers }}
          - PAM MFA: {{ security_phase_mfa and security_capabilities_mfa_capable | default(false) }}
          - SELinux: {{ security_phase_selinux and ansible_os_family == 'RedHat' }}
          - Audit Logging: {{ security_phase_audit }}

          Validation:
          - SSH Access: PASS
          - Sudo Functionality: PASS

          Backup: /root/security-backup-{{ ansible_date_time.epoch }}

          Status: SUCCESS
          Engineer: {{ lookup('env', 'USER') }}
        mode: "0640"

    - name: Display production summary
      ansible.builtin.debug:
        msg: |
          ========================================
          PRODUCTION ENFORCEMENT - BATCH COMPLETE
          ========================================
          Host: {{ inventory_hostname }}
          Phase: {{ security_phase }}/6

          Status: ✓ SUCCESS

          Validations Passed:
          - SSH Access: ✓
          - Sudo Functionality: ✓

          Next Steps:
          1. Monitor for 15-30 minutes
          2. Check application functionality
          3. Review logs: /var/log/security-enforcement-*.log
          4. If stable, proceed with next batch

          Backup: /root/security-backup-{{ ansible_date_time.epoch }}
          ========================================

    - name: Batch completion pause
      ansible.builtin.pause:
        seconds: 300
        prompt: |
          Batch complete. Monitoring for 5 minutes before next batch.
          - Check logs
          - Verify applications
          - Press Ctrl+C to stop rollout if issues detected
      when: ansible_play_batch != ansible_play_hosts # Not last batch
