---
- name: Apply security baseline
  hosts: all
  become: true
  gather_facts: true

  vars:
    security_phase_ssh_hardening: true
    security_phase_sudoers: "{{ sudoers_baseline_strict | default(false) }}"
    security_phase_mfa: "{{ pam_mfa_enabled | default(false) }}"
    security_phase_selinux: "{{ selinux_enforcement_enabled | default(false) }}"
    security_phase_audit: "{{ audit_logging_enabled | default(true) }}"

  pre_tasks:
    - name: Backup configurations
      ansible.builtin.include_tasks: ../tasks/backup-configs.yml

  roles:
    - security_capabilities
    - service_accounts_transfer
    - sshd_hardening
    - pam_mfa
    - sudoers_baseline
    - selinux_enforcement
    - audit_logging
    - compliance_evidence

  post_tasks:
    - name: Validate services
      ansible.builtin.include_tasks: ../tasks/validate-services.yml

    - name: Critical validation - SSH
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        timeout: 30
        state: started
      delegate_to: localhost
      become: false
      register: ssh_validation
      failed_when: false

    - name: Critical validation - Sudo
      ansible.builtin.command: sudo -n true
      register: sudo_validation
      failed_when: false
      changed_when: false

    - name: Rollback on validation failure
      block:
        - name: Check validation results
          ansible.builtin.assert:
            that:
              - ssh_validation is success
              - sudo_validation.rc in [0, 1]
            fail_msg: Validation failed - initiating rollback

      rescue:
        - name: Execute emergency rollback
          ansible.builtin.include_tasks: ../tasks/rollback.yml
        - name: Fail playbook after rollback
          ansible.builtin.fail:
            msg: Validation failed on {{ inventory_hostname }} - changes rolled back
