---
# Security Dry-Run - Simulate Changes with Diffs
# Uses Ansible check mode to show what WOULD change without actually changing it
# Shows detailed diffs of configuration changes
#
# Usage:
#   ansible-playbook playbooks/dry-run.yml -i inventory
#
# Note: This uses Ansible's native --check mode combined with --diff

- name: Security Dry-Run - Simulate Changes
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Enforce mode variables (what we WOULD apply)
    security_mode: enforce

    # Phase controls - customize based on rollout phase
    security_phase_ssh_hardening: true
    security_phase_sudoers: true
    security_phase_mfa: false # Usually disabled in dry-run
    security_phase_selinux: false
    security_phase_audit: true

  pre_tasks:
    - name: Display dry-run warning
      ansible.builtin.debug:
        msg: |
          ========================================
          SECURITY DRY-RUN MODE
          ========================================
          This playbook will:
          - Show diffs of proposed changes
          - Simulate configuration modifications
          - Report what would restart

          This playbook will NOT:
          - Actually modify files
          - Restart services
          - Change system state

          Running in Ansible check mode with diff enabled
          ========================================

    - name: Verify check mode is enabled
      ansible.builtin.assert:
        that:
          - ansible_check_mode
        fail_msg: |
          ERROR: This playbook must be run with --check flag
          Usage: ansible-playbook playbooks/dry-run.yml --check --diff -i inventory
        success_msg: Check mode confirmed - dry-run will proceed safely

  roles:
    # Phase 1: SSH Hardening
    - role: sshd_hardening
      when: security_phase_ssh_hardening | default(false)
      vars:
        sshd_hardening_permit_root_login: false
        sshd_hardening_password_authentication: false
        sshd_hardening_max_auth_tries: 3
        sshd_hardening_log_level: VERBOSE

    # Phase 2: Sudoers Baseline
    - role: sudoers_baseline
      when: security_phase_sudoers | default(false)
      vars:
        # WARNING: role manages /etc/sudoers when strict is true
        sudoers_baseline_strict: true
        sudoers_baseline_defaults:
          - use_pty
          - logfile=/var/log/sudo.log
          - "!visiblepw"
        sudoers_baseline_groups:
          linux_admins:
            require_password: true
            commands:
              - /usr/bin/systemctl restart *
              - /usr/bin/systemctl status *

    # Phase 3: PAM MFA (usually skip in dry-run)
    - role: pam_mfa
      when:
        - security_phase_mfa | default(false)
        - security_capabilities_mfa_capable | default(false)
      vars:
        pam_mfa_enabled: true
        pam_mfa_totp_enabled: true
        pam_mfa_service_accounts:
          - ansible
          - ci
          - jenkins
          - awx

    # Phase 4: SELinux (usually skip in dry-run)
    - role: selinux_enforcement
      when:
        - security_phase_selinux | default(false)
        - ansible_os_family == 'RedHat'
      vars:
        selinux_enforcement_enabled: true
        selinux_enforcement_mode: enforcing

    # Phase 5: Audit Logging
    - role: audit_logging
      when: security_phase_audit | default(false)
      vars:
        audit_logging_enabled: true

  post_tasks:
    - name: Display dry-run summary
      ansible.builtin.debug:
        msg: |
          ========================================
          SECURITY DRY-RUN COMPLETE
          ========================================
          Review the diffs above to see proposed changes.

          Phases tested:
          - SSH Hardening: {{ security_phase_ssh_hardening | default(false) }}
          - Sudoers: {{ security_phase_sudoers | default(false) }}
          - PAM MFA: {{ security_phase_mfa | default(false) }}
          - SELinux: {{ security_phase_selinux | default(false) }}
          - Audit: {{ security_phase_audit | default(false) }}

          Next steps:
          1. Review all diffs carefully
          2. Test in staging: playbooks/enforce-staging.yml
          3. Plan production rollout

          NO CHANGES WERE MADE TO THIS SYSTEM
          ========================================

    - name: Reminder about actual enforcement
      ansible.builtin.debug:
        msg: |
          To actually apply these changes:
          1. Test in staging first: playbooks/enforce-staging.yml
          2. Then production (gradual): playbooks/enforce-production-gradual.yml

          NEVER skip staging validation for security changes!
