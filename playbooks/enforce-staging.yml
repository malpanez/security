---
# Security Enforcement - Staging Environment
# Full security baseline testing in staging before production
# Use this to validate all phases work correctly
#
# Usage:
#   ansible-playbook playbooks/enforce-staging.yml -i inventory

- name: Security Enforcement - Staging Environment
  hosts: staging
  become: true
  gather_facts: true
  serial: 1  # One at a time for staging validation
  max_fail_percentage: 0  # Stop immediately on any failure

  vars:
    security_mode: enforce

    # Enable all phases for full testing
    security_phase_ssh_hardening: true
    security_phase_sudoers: true
    security_phase_mfa: true
    security_phase_selinux: true
    security_phase_audit: true

    # Staging-specific settings
    security_staging_rollback_on_failure: true

  pre_tasks:
    - name: Display staging enforcement warning
      debug:
        msg: |
          ========================================
          SECURITY ENFORCEMENT - STAGING
          ========================================
          Target: {{ inventory_hostname }}
          Mode: ENFORCE (FULL TESTING)

          This is a STAGING validation run.
          All security phases will be applied.

          Automatic rollback on failure: {{ security_staging_rollback_on_failure }}
          ========================================

    - name: Ensure emergency SSH session is open
      debug:
        msg: |
          ⚠️  CRITICAL: Before continuing:
          1. Open a SEPARATE SSH session to {{ inventory_hostname }}
          2. Keep that session open during this playbook
          3. That session will NOT be affected by PAM changes

          Press Ctrl+C now if you don't have emergency access!

    - name: Wait for confirmation (30 seconds to abort)
      pause:
        seconds: 30
        prompt: "Starting in 30 seconds. Press Ctrl+C to abort if needed."

    - name: Backup current configurations
      include_tasks: ../tasks/backup-configs.yml

    - name: Detect system capabilities
      include_role:
        name: security_capabilities

  roles:
    # Phase 1: SSH Hardening
    - role: sshd_hardening
      when: security_phase_ssh_hardening
      vars:
        sshd_hardening_password_authentication: false
        sshd_hardening_permit_root_login: false
        sshd_hardening_pubkey_authentication: true
        sshd_hardening_max_auth_tries: 3
        sshd_hardening_log_level: VERBOSE

    # Phase 2: Sudoers Baseline (Hybrid for staging)
    - role: sudoers_baseline
      when: security_phase_sudoers
      vars:
        # Hybrid approach - preserve main file
        sudoers_baseline_preserve_main: true
        sudoers_baseline_defaults:
          - "use_pty"
          - "logfile=/var/log/sudo.log"
          - "log_output"
          - "!visiblepw"
        sudoers_baseline_groups:
          linux_admins:
            require_password: true
            commands:
              - "/usr/bin/systemctl restart *"
              - "/usr/bin/systemctl status *"
          devops:
            require_password: false
            commands:
              - "/usr/bin/docker *"

    # Phase 3: PAM MFA
    - role: pam_mfa
      when:
        - security_phase_mfa
        - security_capabilities_mfa_capable | default(false)
      vars:
        pam_mfa_enabled: true
        pam_mfa_yubikey_enabled: "{{ security_capabilities_yubikey_available | default(false) }}"
        pam_mfa_totp_enabled: true
        pam_mfa_service_accounts:
          - ansible
          - ci
          - jenkins
          - awx
          - monitoring
          - nagios

    # Phase 4: SELinux (Permissive first in staging)
    - role: selinux_enforcement
      when:
        - security_phase_selinux
        - ansible_os_family == 'RedHat'
      vars:
        selinux_enforcement_enabled: true
        # Start permissive in staging to catch issues
        selinux_enforcement_mode: permissive

    # Phase 5: Audit Logging
    - role: audit_logging
      when: security_phase_audit
      vars:
        audit_logging_enabled: true
        audit_logging_verbose: true

    # CIS Baseline
    - role: cis_baseline
      vars:
        cis_baseline_enabled: true
        cis_baseline_mode: enforce

  post_tasks:
    - name: Validate all services
      include_tasks: ../tasks/validate-services.yml

    - name: Test SSH access (critical validation)
      block:
        - name: Attempt SSH connection test
          wait_for:
            host: "{{ inventory_hostname }}"
            port: 22
            timeout: 10
            state: started
          delegate_to: localhost
          become: false

      rescue:
        - name: SSH validation failed - initiate rollback
          debug:
            msg: "SSH access validation FAILED - rolling back changes"

        - name: Execute rollback
          include_tasks: ../tasks/rollback.yml
          when: security_staging_rollback_on_failure

    - name: Test sudo access (critical validation)
      command: sudo -n true
      register: sudo_test
      failed_when: false
      changed_when: false

    - name: Verify sudo is functional
      assert:
        that:
          - sudo_test.rc in [0, 1]  # 0 = success, 1 = password required (OK)
        fail_msg: "Sudo is broken - rolling back"
        success_msg: "Sudo is functional"

    - name: Generate staging validation report
      copy:
        dest: "/tmp/staging-validation-{{ ansible_date_time.epoch }}.txt"
        content: |
          Staging Security Enforcement Report
          ====================================
          Date: {{ ansible_date_time.iso8601 }}
          Host: {{ inventory_hostname }}

          Phases Applied:
          - SSH Hardening: {{ security_phase_ssh_hardening }}
          - Sudoers: {{ security_phase_sudoers }}
          - PAM MFA: {{ security_phase_mfa and security_capabilities_mfa_capable | default(false) }}
          - SELinux: {{ security_phase_selinux and ansible_os_family == 'RedHat' }}
          - Audit: {{ security_phase_audit }}

          Validation Results:
          - SSH Access: {{ 'PASS' if ansible_connection == 'ssh' else 'UNKNOWN' }}
          - Sudo Access: {{ 'PASS' if sudo_test.rc in [0,1] else 'FAIL' }}

          Backup Location: /root/security-backup-{{ ansible_date_time.epoch }}

          Status: {{ 'SUCCESS' if sudo_test.rc in [0,1] else 'FAILED - ROLLED BACK' }}
        mode: '0640'

    - name: Display staging summary
      debug:
        msg: |
          ========================================
          STAGING ENFORCEMENT COMPLETE
          ========================================
          Host: {{ inventory_hostname }}

          Validation Status:
          - SSH Access: ✓
          - Sudo Functionality: {{ '✓' if sudo_test.rc in [0,1] else '✗ FAILED' }}

          Next Steps:
          1. Test all application functionality
          2. Monitor logs for 24-48 hours
          3. Verify MFA login works (if enabled)
          4. Test service account access

          If staging validates successfully:
          → Proceed to production with playbooks/enforce-production-gradual.yml

          Report: /tmp/staging-validation-{{ ansible_date_time.epoch }}.txt
          ========================================
