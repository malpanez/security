---
# Molecule prepare - minimal bootstrap so converge can run cleanly
- name: Prepare instances - fix nsswitch before sudo is needed
  hosts: all
  become: false
  gather_facts: false

  tasks:
    - name: Fix nsswitch.conf - remove sss entry to prevent PAM sudo failures in containers
      raw: |
        if [ -f /etc/nsswitch.conf ]; then
          sed -i 's/ sss//g' /etc/nsswitch.conf
        fi
      changed_when: false

    - name: Install Python and base packages (runs as root in container)
      raw: |
        if command -v apt-get >/dev/null 2>&1; then
          apt-get update -y && apt-get install -y python3 sudo openssh-server
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y python3 sudo openssh-server
        elif command -v yum >/dev/null 2>&1; then
          yum install -y python3 sudo openssh-server
        fi
      changed_when: false

- name: Prepare instances - ensure SSH is available
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Ensure SSH service is available
      ansible.builtin.service:
        name: sshd
        state: started
      failed_when: false
