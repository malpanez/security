---
# Molecule prepare - minimal bootstrap so converge can run cleanly
- name: Prepare instances for complete stack
  hosts: all
  gather_facts: true

  tasks:
    - name: Ensure openssh-client is installed (Debian/Ubuntu)
      ansible.builtin.raw: |
        if ! command -v ssh-keygen >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq openssh-client
        fi
      become: true
      when: ansible_os_family == 'Debian'
      changed_when: false

    - name: Ensure openssh-clients is installed (RedHat)
      ansible.builtin.raw: |
        if ! command -v ssh-keygen >/dev/null 2>&1; then
          dnf install -y -q openssh-clients || yum install -y -q openssh-clients
        fi
      become: true
      when: ansible_os_family == 'RedHat'
      changed_when: false

    - name: Ensure test groups exist
      ansible.builtin.group:
        name: "{{ item }}"
        state: present
      become: true
      loop:
        - test_service_accounts
        - test_human_users
        - mfa-bypass
        - linux_admins
