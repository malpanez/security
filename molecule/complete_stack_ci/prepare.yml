---
# Molecule prepare - minimal bootstrap so converge can run cleanly
# NOTE: geerlingguy images already have python3, sudo, openssh-server installed
- name: Prepare instances for complete stack
  hosts: all
  gather_facts: true

  tasks:
    - name: Ensure test groups exist
      ansible.builtin.group:
        name: "{{ item }}"
        state: present
      become: true
      loop:
        - test_service_accounts
        - test_human_users
        - mfa-bypass
        - linux_admins
