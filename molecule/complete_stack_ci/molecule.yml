---
# CI-friendly configuration with reduced platforms for faster testing
# For full platform coverage, use molecule.yml locally or with workflow_dispatch

dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: docker

platforms:
  # One representative from each family — systemd-enabled ansible images
  - name: ubuntu-2204-ci
    image: "geerlingguy/docker-ubuntu2204-ansible@sha256:2744f5aca5e33c01a682ff1ea201dc3841b0eaaa1f5c448e6bd9a6156a831638"
    command: ""
    privileged: true
    pre_build_image: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    networks:
      - name: molecule-network

  - name: debian-12-ci
    image: "geerlingguy/docker-debian12-ansible@sha256:f69527a18970386befd62a36f68d5c39422a7ad15e4005133670566dd3b0da7f"
    command: ""
    privileged: true
    pre_build_image: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    networks:
      - name: molecule-network

  - name: rocky-9-ci
    image: "geerlingguy/docker-rockylinux9-ansible@sha256:09c1074489a704687b2b1f3d16a4f537b211b49b64eb7a5b6e4d6d1eae5b8ba9"
    command: ""
    privileged: true
    pre_build_image: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    networks:
      - name: molecule-network

provisioner:
  name: ansible
  log: true
  config_options:
    defaults:
      stdout_callback: default
      callbacks_enabled: profile_tasks,timer
      verbosity: 1
      forks: 3  # Reduced for CI
      roles_path: ../../roles
      collections_paths: ../..
    ssh_connection:
      pipelining: true
      control_path: /tmp/ansible-ssh-%%h-%%p-%%r
  env:
    ANSIBLE_CONFIG: /workspace/ansible.cfg
    ANSIBLE_STDOUT_CALLBACK: default
    ANSIBLE_RESULT_FORMAT: yaml
    ANSIBLE_CALLBACKS_ENABLED: profile_tasks,timer
  inventory:
    group_vars:
      all:
        # Security enforcement mode
        security_mode: enforce
        security_phase: 6 # Full enforcement

        # SSH Hardening
        sshd_hardening_password_authentication: false
        sshd_hardening_permit_root_login: prohibit-password
        sshd_hardening_pubkey_authentication: true
        sshd_hardening_max_auth_tries: 4
        sshd_hardening_use_pam: true

        # PAM MFA
        pam_mfa_enabled: true
        pam_mfa_skip_module_validation: true

        # Sudoers
        sudoers_baseline_strict: true
        sudoers_baseline_preserve_main: true

        # SELinux (RHEL-based only)
        selinux_enforcement_enabled: true
        selinux_enforcement_mode: permissive

        # Audit logging
        audit_logging_enabled: true
        audit_logging_verbose: false

        # Compliance evidence
        compliance_evidence_enabled: true

        # Service accounts for testing
        security_capabilities_service_groups:
          - test_service_accounts

        # Human groups for testing
        security_capabilities_human_groups:
          - test_human_users

verifier:
  name: ansible

scenario:
  name: complete_stack_ci
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy

  create_sequence:
    - dependency
    - create
    - prepare

  converge_sequence:
    - dependency
    - create
    - prepare
    - converge

  destroy_sequence:
    - cleanup
    - destroy
