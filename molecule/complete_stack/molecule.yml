---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: docker # GH Actions ubuntu-latest has docker preinstalled

platforms:
  # Ubuntu platforms (4 versions)
  - name: ubuntu-1804-complete
    image: ubuntu:18.04
    privileged: true
    command: /sbin/init
    systemd: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    tmpfs:
      - /run
      - /tmp
    networks:
      - name: molecule-network

