---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: docker # GH Actions ubuntu-latest has docker preinstalled

platforms:
  # Systemd-enabled ansible images (geerlingguy) — required for PAM/sshd/audit testing
  - name: ubuntu-2204-complete
    image: "geerlingguy/docker-ubuntu2204-ansible@sha256:2744f5aca5e33c01a682ff1ea201dc3841b0eaaa1f5c448e6bd9a6156a831638"
    command: ""
    privileged: true
    pre_build_image: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    networks:
      - name: molecule-network

  - name: ubuntu-2004-complete
    image: "geerlingguy/docker-ubuntu2004-ansible@sha256:532fb09e9f152e9f85ae348befa9ef09a9d0d23ca6c3361714d041f5a998c826"
