---
# Molecule converge playbook - Applies complete security baseline
# This tests the FULL stack of security hardening

- name: Converge - Apply Complete Security Baseline
  hosts: all
  become: false
  gather_facts: false

  pre_tasks:
    - name: Gather facts without privilege escalation
      ansible.builtin.setup:
      become: false

    - name: Display test information
      ansible.builtin.debug:
        msg: |
          ========================================
          COMPLETE STACK TEST - CONVERGE
          ========================================
          Host: {{ inventory_hostname }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Phase: {{ security_phase | default(6) }}
          Mode: {{ security_mode | default('enforce') }}
          ========================================

    - name: Update apt cache (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == 'Debian'
      changed_when: false

    - name: Install required packages (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - openssh-server
          - sudo
          - python3
        state: present
      when: ansible_os_family == 'Debian'

    - name: Install required packages (RedHat)
      ansible.builtin.dnf:
        name:
          - openssh-server
          - sudo
          - python3
        state: present
      when: ansible_os_family == 'RedHat'

    - name: Ensure PAM module directories exist for MFA test mode
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /lib/security
        - /usr/lib64/security
      when: pam_mfa_enabled | default(false)

    - name: Create fake PAM modules for MFA test mode
      ansible.builtin.file:
        path: "{{ item }}"
        state: touch
        mode: "0644"
      loop:
        - /lib/security/pam_fido2.so
        - /lib/security/pam_u2f.so
        - /lib/security/pam_google_authenticator.so
        - /lib/security/pam_succeed_if.so
        - /usr/lib64/security/pam_fido2.so
        - /usr/lib64/security/pam_u2f.so
        - /usr/lib64/security/pam_google_authenticator.so
        - /usr/lib64/security/pam_succeed_if.so
      changed_when: false
      when: pam_mfa_enabled | default(false)

    - name: Ensure SSH service is enabled
      ansible.builtin.service:
        name: sshd
        enabled: true
        state: started

    - name: Ensure MFA bypass group exists
      ansible.builtin.group:
        name: "{{ pam_mfa_service_bypass_group }}"
        state: present

    - name: Ensure admin group exists for sudoers defaults
      ansible.builtin.group:
        name: linux_admins
        state: present

    - name: Ensure test groups exist
      ansible.builtin.group:
        name: "{{ item }}"
        state: present
      loop:
        - test_service_accounts
        - test_human_users

    - name: Create test service account
      ansible.builtin.user:
        name: test_service_account
        groups:
          - test_service_accounts
          - "{{ pam_mfa_service_bypass_group }}"
        shell: /bin/bash
        create_home: true
        state: present

    - name: Create test admin user
      ansible.builtin.user:
        name: test_admin
        groups:
          - test_human_users
          - linux_admins
        shell: /bin/bash
        create_home: true
        state: present

    - name: Create test human user
      ansible.builtin.user:
        name: test_human
        groups: test_human_users
        shell: /bin/bash
        create_home: true
        state: present

    - name: Ensure SSH directories exist for test users
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.owner }}"
        mode: "0700"
      loop:
        - { owner: test_service_account, path: /home/test_service_account/.ssh }
        - { owner: test_human, path: /home/test_human/.ssh }

    - name: Generate SSH key for test service account
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -f /home/test_service_account/.ssh/id_ed25519 -N ''
        creates: /home/test_service_account/.ssh/id_ed25519

    - name: Generate SSH key for test human
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -f /home/test_human/.ssh/id_ed25519 -N ''
        creates: /home/test_human/.ssh/id_ed25519

    - name: Set ownership on generated SSH material
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: "{{ item.owner }}"
        group: "{{ item.owner }}"
        mode: "{{ item.mode }}"
      loop:
        - { owner: test_service_account, path: /home/test_service_account/.ssh/id_ed25519, mode: "0600" }
        - { owner: test_service_account, path: /home/test_service_account/.ssh/id_ed25519.pub, mode: "0644" }
        - { owner: test_human, path: /home/test_human/.ssh/id_ed25519, mode: "0600" }
        - { owner: test_human, path: /home/test_human/.ssh/id_ed25519.pub, mode: "0644" }

    - name: Read generated public keys from remote hosts
      ansible.builtin.slurp:
        src: "{{ item.path }}"
      loop:
        - { name: test_service_account, path: /home/test_service_account/.ssh/id_ed25519.pub }
        - { name: test_human, path: /home/test_human/.ssh/id_ed25519.pub }
      register: test_public_keys

    - name: Add public keys to authorized_keys
      ansible.posix.authorized_key:
        user: "{{ item.user }}"
        key: >-
          {{
            (
              test_public_keys.results
              | selectattr('item.name', 'equalto', item.key_name)
              | map(attribute='content')
              | first
            ) | b64decode
          }}
      loop:
        - { user: test_service_account, key_name: test_service_account }
        - { user: test_human, key_name: test_human }
        - { user: test_admin, key_name: test_service_account }

  roles:
    # PHASE 1: Detect system capabilities
    - role: security_capabilities
      tags: [always, capabilities]

    # PHASE 2: Service accounts setup (before SSH hardening)
    - role: service_accounts_transfer
      tags: [service_accounts]
      when: security_phase | int >= 2

    # PHASE 3: SSH Hardening
    - role: sshd_hardening
      tags: [ssh, hardening]
      when: security_phase | int >= 1

    # PHASE 4: PAM MFA (optional, requires hardware keys)
    - role: pam_mfa
      tags: [pam, mfa]
      when:
        - security_phase | int >= 3
        - pam_mfa_enabled | default(false)

    # PHASE 5: Sudoers baseline
    - role: sudoers_baseline
      tags: [sudo, sudoers]
      when: security_phase | int >= 2

    # PHASE 6: SELinux enforcement (RHEL only)
    - role: selinux_enforcement
      tags: [selinux]
      when:
        - security_phase | int >= 4
        - ansible_os_family == 'RedHat'
        - selinux_enforcement_enabled | default(false)

    # PHASE 7: Audit logging
    - role: audit_logging
      tags: [audit, logging]
      when: security_phase | int >= 5

    # PHASE 8: Compliance evidence collection
    - role: compliance_evidence
      tags: [compliance, evidence]
      when: security_phase | int >= 6

    # PHASE 9: CIS Baseline
    - role: cis_baseline
      tags: [cis, baseline]
      when: security_phase | int >= 6

  post_tasks:
    - name: Display convergence summary
      ansible.builtin.debug:
        msg: |
          ========================================
          CONVERGENCE COMPLETE
          ========================================
          Host: {{ inventory_hostname }}
          Status: ✅ SUCCESS

          Applied Roles:
          - security_capabilities: ✅
          - service_accounts_transfer: {{ '✅' if security_phase | int >= 2 else '⏭️ Skipped' }}
          - sshd_hardening: {{ '✅' if security_phase | int >= 1 else '⏭️ Skipped' }}
          - pam_mfa: {{ '✅' if (security_phase | int >= 3 and pam_mfa_enabled) else '⏭️ Skipped' }}
          - sudoers_baseline: {{ '✅' if security_phase | int >= 2 else '⏭️ Skipped' }}
          - selinux_enforcement: {{ '✅' if (security_phase | int >= 4 and ansible_os_family == 'RedHat') else '⏭️ Skipped' }}
          - audit_logging: {{ '✅' if security_phase | int >= 5 else '⏭️ Skipped' }}
          - compliance_evidence: {{ '✅' if security_phase | int >= 6 else '⏭️ Skipped' }}
          - cis_baseline: {{ '✅' if security_phase | int >= 6 else '⏭️ Skipped' }}

          Next: Running verification tests...
          ========================================
