---
- name: common | Ensure sudo package is present
  ansible.builtin.package:
    name: sudo
    state: present

- name: common | Create sudo I/O log directory
  ansible.builtin.file:
    path: "{{ sudoers_baseline_iolog_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  when: sudoers_baseline_iolog_enabled
  tags: [enforce]

- name: common | Deploy sudoers defaults
  ansible.builtin.template:
    src: sudoers.j2
    dest: "{{ sudoers_baseline_sudoers_path }}"
    owner: root
    group: root
    mode: "0440"
    validate: visudo -cf %s

- name: common | Deploy sudoers include files
  ansible.builtin.template:
    src: sudoers.d.j2
    dest: "{{ sudoers_baseline_files_path }}/99-security"
    owner: root
    group: root
    mode: "0440"
    validate: visudo -cf %s
