---
- name: "Load OS-specific variables"
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

- name: "Apply sudoers baseline when strict mode enabled"
  when: sudoers_baseline_strict | bool
  block:
    - name: "Include common sudoers tasks"
      ansible.builtin.include_tasks: common.yml

    - name: "Resolve platform-specific sudoers tasks"
      ansible.builtin.set_fact:
        sudoers_baseline_platform_task: >-
          {{
            lookup(
              'ansible.builtin.first_found',
              params={'files': [ansible_os_family ~ '.yml'], 'paths': [role_path ~ '/tasks']},
              errors='ignore'
            )
          }}

    - name: "Include platform-specific sudoers tasks"
      ansible.builtin.include_tasks: "{{ sudoers_baseline_platform_task }}"
      when:
        - sudoers_baseline_platform_task is not none
        - sudoers_baseline_platform_task | length > 0
