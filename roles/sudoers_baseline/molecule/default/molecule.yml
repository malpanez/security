---
dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml
driver:
  name: docker
platforms:
  - name: ubuntu2204
    image: "geerlingguy/docker-ubuntu2204-ansible:latest"
    platform: linux/amd64
    privileged: true
    command: "/lib/systemd/systemd"
    pre_build_image: true
  - name: debian12
    image: "geerlingguy/docker-debian12-ansible:latest"
    platform: linux/amd64
    privileged: true
    command: "/lib/systemd/systemd"
    pre_build_image: true
  - name: rockylinux9
    image: "geerlingguy/docker-rockylinux9-ansible:latest"
    platform: linux/amd64
    privileged: true
    command: "/lib/systemd/systemd"
    pre_build_image: true
  - name: almalinux9
    image: "geerlingguy/docker-almalinux9-ansible:latest"
    platform: linux/amd64
    privileged: true
    command: "/lib/systemd/systemd"
    pre_build_image: true
  - name: oraclelinux8
    image: "geerlingguy/docker-oraclelinux8-ansible:latest"
    platform: linux/amd64
    privileged: true
    command: "/lib/systemd/systemd"
    pre_build_image: true
  - name: centos7
    image: "geerlingguy/docker-centos7-ansible:latest"
    platform: linux/amd64
    privileged: true
    command: "/usr/lib/systemd/systemd"
    pre_build_image: true
  - name: opensuse15
    image: "geerlingguy/docker-opensuse-leap-ansible:latest"
    platform: linux/amd64
    privileged: true
    command: "/usr/lib/systemd/systemd"
    pre_build_image: true
provisioner:
  name: ansible
verifier:
  name: testinfra
ansible:
  playbooks:
    converge: converge.yml
