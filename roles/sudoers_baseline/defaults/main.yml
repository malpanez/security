---
sudoers_baseline_strict: false

# Drop-in mode: ALL hardening goes into /etc/sudoers.d/ files.
# /etc/sudoers is NEVER rewritten — only verified with visudo -c.
# Safe, auditable, and survives OS package updates.
#   /etc/sudoers.d/10-security-defaults  → Defaults directives
#   /etc/sudoers.d/99-security-groups    → Group-based rules
# Set to false only if your system lacks @includedir in /etc/sudoers.
sudoers_baseline_use_dropin: true
sudoers_baseline_dropin_defaults: "{{ sudoers_baseline_files_path }}/10-security-defaults"
sudoers_baseline_dropin_groups: "{{ sudoers_baseline_files_path }}/99-security-groups"

# I/O logging for complete audit trail (ADVANCED)
# WARNING: Generates significant disk usage - plan for log rotation
sudoers_baseline_iolog_enabled: false  # Set true for HIGH security environments
sudoers_baseline_iolog_dir: /var/log/sudo-io
sudoers_baseline_iolog_maxseq: 1000  # Rotate after 1000 sessions

sudoers_baseline_defaults:
  - use_pty
  - logfile=/var/log/sudo.log
  - timestamp_timeout=5
  - passwd_tries=3
  - "!visiblepw"

sudoers_baseline_secure_path: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
sudoers_baseline_groups:
  linux_admins:
    require_password: true
    commands:
      - /usr/bin/systemctl status *
  svc_automation:
    require_password: false
    commands:
      - /usr/bin/systemctl restart myservice
sudoers_baseline_sudoers_path: /etc/sudoers
sudoers_baseline_files_path: /etc/sudoers.d
