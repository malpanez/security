---
argument_specs:
  main:
    short_description: Baseline sudoers configuration
    options:
      sudoers_baseline_strict:
        type: bool
        default: false
        description: Enable management of sudoers files and defaults.
      sudoers_baseline_defaults:
        type: list
        elements: str
        default:
          - use_pty
          - logfile=/var/log/sudo.log
          - timestamp_timeout=5
          - passwd_tries=3
          - "!visiblepw"
        description: List of Defaults lines to apply to sudoers.
      sudoers_baseline_secure_path:
        type: str
        default: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        description: Secure path for sudoers Defaults.
      sudoers_baseline_groups:
        type: dict
        default: {}
        description: Map of group names to sudo rules (keys require_password and commands).
      sudoers_baseline_sudoers_path:
        type: str
        default: /etc/sudoers
        description: Path to main sudoers file.
      sudoers_baseline_files_path:
        type: str
        default: /etc/sudoers.d
        description: Directory for included sudoers snippets.
      sudoers_baseline_dropin_defaults:
        type: str
        default: '{{ sudoers_baseline_files_path }}/10-security-defaults'
        description: Path of the sudoers.d defaults drop-in file.
      sudoers_baseline_dropin_groups:
        type: str
        default: '{{ sudoers_baseline_files_path }}/99-security-groups'
        description: Path of the sudoers.d groups drop-in file.
      sudoers_baseline_iolog_dir:
        type: str
        default: /var/log/sudo-io
        description: Directory for sudo I/O logging output.
      sudoers_baseline_iolog_enabled:
        type: bool
        default: false
        description: Enable sudo I/O (session) logging.
      sudoers_baseline_iolog_maxseq:
        type: int
        default: 1000
        description: Maximum sequence number for sudo I/O logs before rotation.
      sudoers_baseline_use_dropin:
        type: bool
        default: true
        description: Manage sudoers via sudoers.d drop-ins instead of the main file.
