---
galaxy_info:
  author: Miguel Alpañez
  description: >-
    Harden PAM password quality (pwquality), account access (access.conf),
    login policies (login.defs), resource limits (limits.conf), and
    account lockout (faillock). Supports Debian/Ubuntu, RHEL/Rocky/Alma,
    and SUSE/openSUSE.
  license: GPL-2.0-or-later
  min_ansible_version: "2.16"
  galaxy_tags:
    - security
    - compliance
    - hardening
    - pam
    - linux
  platforms:
    - name: Debian
      versions: [buster, bullseye, bookworm, trixie]
    - name: Ubuntu
      versions: [bionic, focal, jammy, noble]
    - name: EL
      versions: [all]
    - name: opensuse
      versions: ["15.5", "all"]
dependencies: []
