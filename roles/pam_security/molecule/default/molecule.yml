---
dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml
driver:
  name: docker
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ../../..
  config_options:
    defaults:
      roles_path: ../../..
      remote_tmp: /tmp/ansible-tmp
  inventory:
    group_vars:
      all:
        ansible_user: root
        ansible_remote_tmp: /tmp/ansible-tmp
platforms:
  - name: ubuntu2204
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    platform: linux/amd64
    privileged: true
    command: /lib/systemd/systemd
    cgroupns_mode: host
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    pre_build_image: true
  - name: debian12
    image: geerlingguy/docker-debian12-ansible:latest
    platform: linux/amd64
    privileged: true
    command: /lib/systemd/systemd
    cgroupns_mode: host
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    pre_build_image: true
  - name: rockylinux9
    image: geerlingguy/docker-rockylinux9-ansible:latest
    platform: linux/amd64
    privileged: true
    command: /lib/systemd/systemd
    cgroupns_mode: host
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    pre_build_image: true
verifier:
  name: ansible
