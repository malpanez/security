---
- name: common | Ensure SELinux packages are present
  ansible.builtin.package:
    name: "{{ selinux_enforcement_packages }}"
    state: present
  tags: [enforce]

- name: common | Check if SELinux config exists
  ansible.builtin.stat:
    path: /etc/selinux/config
  register: selinux_config_file
  tags: [enforce]

- name: common | Check if SELinux is available
  ansible.builtin.command: getenforce
  register: selinux_status
  failed_when: false
  changed_when: false
  when: selinux_config_file.stat.exists
  tags: [enforce]

- name: common | Set SELinux mode
  ansible.posix.selinux:
    policy: targeted
    state: "{{ selinux_enforcement_mode }}"
  when:
    - selinux_config_file.stat.exists
    - selinux_status.rc == 0
  tags: [enforce]

- name: common | Set SELinux booleans
  ansible.posix.seboolean:
    name: "{{ item.name }}"
    state: "{{ item.state | default('yes') }}"
    persistent: true
  loop: "{{ selinux_enforcement_booleans }}"
  when:
    - selinux_config_file.stat.exists
    - selinux_status.rc == 0
    - selinux_enforcement_booleans | length > 0
  tags: [enforce]

- name: common | Manage SELinux contexts
  community.general.sefcontext:
    target: "{{ item.target }}"
    setype: "{{ item.setype }}"
    state: present
  loop: "{{ selinux_enforcement_contexts }}"
  when:
    - selinux_config_file.stat.exists
    - selinux_status.rc == 0
    - selinux_enforcement_contexts | length > 0
  tags: [enforce]

- name: common | Restorecon managed paths
  ansible.builtin.command: restorecon -Rv {{ item.target }}
  loop: "{{ selinux_enforcement_contexts }}"
  when:
    - selinux_config_file.stat.exists
    - selinux_status.rc == 0
    - selinux_enforcement_restorecon
    - selinux_enforcement_contexts | length > 0
  changed_when: false
  tags: [enforce]
