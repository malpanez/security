---
- name: Skip SELinux enforcement when disabled
  ansible.builtin.debug:
    msg: SELinux enforcement disabled
  when: not selinux_enforcement_enabled

- name: Apply SELinux enforcement controls
  when:
    - selinux_enforcement_enabled
    - security_mode | default('enforce') == 'enforce'
  block:
    - name: Include common SELinux tasks
      ansible.builtin.include_tasks: common.yml
      tags: [enforce]

    - name: Include platform-specific SELinux tasks
      ansible.builtin.set_fact:
        selinux_enforcement_platform_task: >-
          {{
            lookup(
              'ansible.builtin.first_found',
              params={'files': [ansible_os_family | lower ~ '.yml'], 'paths': [role_path ~ '/tasks']},
              errors='ignore'
            )
          }}
      tags: [enforce]

    - name: Platform-specific SELinux tasks
      ansible.builtin.include_tasks: "{{ selinux_enforcement_platform_task }}"
      when:
        - selinux_enforcement_platform_task is not none
        - selinux_enforcement_platform_task | length > 0
      tags: [enforce]
