---
galaxy_info:
  role_name: mysql_hardening
  author: malpanez
  description: >-
    Harden MySQL and MariaDB: remove anonymous users and test DB, disable remote root,
    enforce bind-address, disable local_infile, skip_show_database, file permissions,
    password expiry, TLS, audit logging plugin, and MariaDB-specific controls.
    Skips gracefully if MySQL/MariaDB is not installed. Review and enforce modes.
    Supports Debian/Ubuntu, RHEL/Rocky/Alma, SUSE/openSUSE.
  license: Apache-2.0
  min_ansible_version: "2.16"
  platforms:
    - name: EL
      versions: [all]
    - name: Debian
      versions: [buster, bullseye, bookworm, trixie]
    - name: Ubuntu
      versions: [focal, jammy, noble]
    - name: opensuse
      versions: ["15.5", "all"]
  galaxy_tags:
    - security
    - hardening
    - mysql
    - mariadb
    - database
    - cis
    - pci
    - compliance
    - linux

dependencies: []
