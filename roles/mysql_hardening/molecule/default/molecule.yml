---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: mysql_hardening-ubuntu2204
    image: ghcr.io/geerlingguy/docker-ubuntu2204-ansible:latest
    command: /lib/systemd/systemd
    tmpfs: [/run, /tmp]
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
  - name: mysql_hardening-rocky9
    image: ghcr.io/geerlingguy/docker-rockylinux9-ansible:latest
    command: /usr/lib/systemd/systemd
    tmpfs: [/run, /tmp]
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
verifier:
  name: ansible
