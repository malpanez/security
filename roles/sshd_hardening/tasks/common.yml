---
- name: common | Update apt cache for OpenSSH
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when:
    - security_mode | default('enforce') == 'enforce'
    - ansible_facts["os_family"] == "Debian"
  tags: [enforce]

- name: common | Ensure OpenSSH server package is installed (Debian)
  ansible.builtin.apt:
    name: "{{ sshd_hardening_package_name }}"
    state: present
  when:
    - security_mode | default('enforce') == 'enforce'
    - ansible_facts["os_family"] == "Debian"
  tags: [enforce]

- name: common | Ensure OpenSSH server package is installed (non-Debian)
  ansible.builtin.package:
    name: "{{ sshd_hardening_package_name }}"
    state: present
  when:
    - security_mode | default('enforce') == 'enforce'
    - ansible_facts["os_family"] != "Debian"
  tags: [enforce]

- name: common | Detect SSH service name
  ansible.builtin.service_facts:

- name: common | Resolve SSH service name
  ansible.builtin.set_fact:
    sshd_hardening_resolved_service_name: >-
      {{ 'ssh' if 'ssh.service' in ansible_facts.services else
         ('sshd' if 'sshd.service' in ansible_facts.services else sshd_service_name) }}

- name: common | Detect OpenSSH version
  ansible.builtin.command: "{{ sshd_binary_path }} -V"
  register: sshd_hardening_version_raw
  failed_when: false
  changed_when: false

- name: common | Derive OpenSSH version string
  ansible.builtin.set_fact:
    sshd_hardening_version: >-
      {{
        (sshd_hardening_version_raw.stderr | default('') | regex_search('OpenSSH_([0-9]+\\.[0-9]+)'))
        | default('', true)
        | regex_replace('^OpenSSH_', '')
        | regex_replace('([0-9]+\\.[0-9]+).*', '\\1')
      }}

- name: common | Select algorithm profile
  ansible.builtin.set_fact:
    sshd_hardening_algorithm_profile_effective: >-
      {{
        sshd_hardening_algorithm_profile
        if sshd_hardening_algorithm_profile != 'auto'
        else (
          'legacy'
          if ((sshd_hardening_version | default('0.0', true)) is version('7.8', '<'))
          else 'modern'
        )
      }}

- name: common | Compute effective algorithm lists
  ansible.builtin.set_fact:
    sshd_hardening_effective_ciphers: >-
      {{ sshd_hardening_algorithm_sets[sshd_hardening_algorithm_profile_effective].ciphers }}
    sshd_hardening_effective_macs: >-
      {{ sshd_hardening_algorithm_sets[sshd_hardening_algorithm_profile_effective].macs }}
    sshd_hardening_effective_kex: >-
      {{ sshd_hardening_algorithm_sets[sshd_hardening_algorithm_profile_effective].kex_algorithms }}
    sshd_hardening_effective_hostkeys: >-
      {{ sshd_hardening_algorithm_sets[sshd_hardening_algorithm_profile_effective].hostkey_algorithms }}

- name: common | Derive human MFA mode for SSHD
  ansible.builtin.set_fact:
    sshd_hardening_human_mfa_mode: >-
      {{
        (security_capabilities_selected_auth_mode | default('legacy') == 'pam_mfa')
        or (
          security_capabilities_selected_auth_mode | default('legacy') == 'sk_keys'
          and security_capabilities_mfa_for_humans_even_with_sk_keys | default(false)
        )
      }}

- name: common | Prevent invalid keyboard-interactive settings with MFA
  ansible.builtin.assert:
    that:
      - not sshd_hardening_human_mfa_mode or sshd_hardening_kbd_interactive_authentication is not false
    fail_msg: >-
      CRITICAL: sshd_hardening_kbd_interactive_authentication=false
      conflicts with MFA AuthenticationMethods for human groups.
      Enable keyboard-interactive or disable MFA Match blocks to avoid lockout.

- name: common | Override effective algorithms when explicitly set
  ansible.builtin.set_fact:
    sshd_hardening_effective_ciphers: >-
      {{
        sshd_hardening_ciphers if sshd_hardening_ciphers | length > 0
        else sshd_hardening_effective_ciphers
      }}
    sshd_hardening_effective_macs: >-
      {{
        sshd_hardening_macs if sshd_hardening_macs | length > 0
        else sshd_hardening_effective_macs
      }}
    sshd_hardening_effective_kex: >-
      {{
        sshd_hardening_kex_algorithms if sshd_hardening_kex_algorithms | length > 0
        else sshd_hardening_effective_kex
      }}
    sshd_hardening_effective_hostkeys: >-
      {{
        sshd_hardening_hostkey_algorithms if sshd_hardening_hostkey_algorithms | length > 0
        else sshd_hardening_effective_hostkeys
      }}

- name: common | Write trusted CA public key for SSH certificates
  ansible.builtin.copy:
    dest: "{{ sshd_hardening_trusted_ca_path }}"
    content: "{{ sshd_hardening_trusted_ca_key }}"
    owner: root
    group: root
    mode: "0644"
  when: security_mode | default('enforce') == 'enforce' and sshd_hardening_trusted_ca_key | length > 0
  tags: [enforce]

- name: common | Ensure privilege separation directory exists
  ansible.builtin.file:
    path: /run/sshd
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: security_mode | default('enforce') == 'enforce'
  tags: [enforce]

- name: common | Generate SSH host keys if missing
  ansible.builtin.command: ssh-keygen -A
  when: security_mode | default('enforce') == 'enforce'
  failed_when: false
  changed_when: false

- name: common | Ensure sshd config drop-in directory exists
  ansible.builtin.file:
    path: "{{ sshd_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - security_mode | default('enforce') == 'enforce'
    - sshd_hardening_use_dropin
  tags: [enforce]

- name: common | Verify sshd_config includes drop-in directory
  ansible.builtin.command: grep -Eq "^[[:space:]]*Include[[:space:]]+{{ sshd_config_dir }}/\\*\\.conf" {{ sshd_config_path }}
  register: sshd_hardening_include_check
  changed_when: false
  failed_when: false
  when:
    - security_mode | default('enforce') == 'enforce'
    - sshd_hardening_use_dropin
  tags: [enforce]

- name: common | Fail if sshd_config lacks Include for drop-ins
  ansible.builtin.fail:
    msg: >-
      CRITICAL: {{ sshd_config_path }} does not include {{ sshd_config_dir }}/*.conf.
      Enable Include before using sshd_hardening_use_dropin to avoid a lockout.
  when:
    - security_mode | default('enforce') == 'enforce'
    - sshd_hardening_use_dropin
    - sshd_hardening_include_check.rc != 0
  tags: [enforce]

- name: common | Configure sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: "{{ sshd_config_path }}"
    owner: root
    group: root
    mode: "0600"
    validate: "{{ sshd_binary_path }} -t -f %s"
  notify: Restart sshd
  when:
    - security_mode | default('enforce') == 'enforce'
    - not sshd_hardening_use_dropin
  tags: [enforce]

- name: common | Configure sshd drop-in with rollback protection
  block:
    - name: common | Backup existing drop-in (if present)
      ansible.builtin.copy:
        src: "{{ sshd_hardening_dropin_path }}"
        dest: "{{ sshd_hardening_dropin_path }}.backup-{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: "0644"
      changed_when: false
      failed_when: false

    - name: common | Write sshd drop-in
      ansible.builtin.template:
        src: sshd_config_dropin.j2
        dest: "{{ sshd_hardening_dropin_path }}"
        owner: root
        group: root
        mode: "0644"
      notify: Restart sshd

    - name: common | Validate sshd_config after drop-in change
      ansible.builtin.command: "{{ sshd_binary_path }} -t"
      register: sshd_hardening_dropin_validate
      changed_when: false
      failed_when: sshd_hardening_dropin_validate.rc != 0
  rescue:
    - name: common | Check for drop-in backup after validation failure
      ansible.builtin.stat:
        path: "{{ sshd_hardening_dropin_path }}.backup-{{ ansible_date_time.epoch }}"
      register: sshd_hardening_dropin_backup
      changed_when: false

    - name: common | Restore previous drop-in after validation failure
      ansible.builtin.copy:
        src: "{{ sshd_hardening_dropin_path }}.backup-{{ ansible_date_time.epoch }}"
        dest: "{{ sshd_hardening_dropin_path }}"
        remote_src: true
        mode: "0644"
      changed_when: false
      failed_when: false
      when: sshd_hardening_dropin_backup.stat.exists | default(false)

    - name: common | Remove invalid drop-in when no backup exists
      ansible.builtin.file:
        path: "{{ sshd_hardening_dropin_path }}"
        state: absent
      changed_when: false
      when: not sshd_hardening_dropin_backup.stat.exists | default(false)
    - name: common | Fail due to invalid sshd config
      ansible.builtin.fail:
        msg: "CRITICAL: sshd -t failed after drop-in update; restored previous drop-in."
  when:
    - security_mode | default('enforce') == 'enforce'
    - sshd_hardening_use_dropin
  tags: [enforce]

- name: common | Ensure sshd service is enabled and running
  ansible.builtin.service:
    name: "{{ sshd_hardening_resolved_service_name | default(sshd_service_name) }}"
    state: started
    enabled: true
  when: security_mode | default('enforce') == 'enforce'
  tags: [enforce]
