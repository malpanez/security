---
- name: "Load OS-specific variables"
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

- name: "Include common sshd hardening tasks"
  ansible.builtin.include_tasks: common.yml

- name: "Resolve platform-specific sshd tasks"
  ansible.builtin.set_fact:
    sshd_hardening_platform_task: >-
      {{
        lookup(
          'ansible.builtin.first_found',
          params={'files': [ansible_os_family ~ '.yml'], 'paths': [role_path ~ '/tasks']},
          errors='ignore'
        )
      }}

- name: "Platform-specific sshd hardening tasks"
  ansible.builtin.include_tasks: "{{ sshd_hardening_platform_task }}"
  when: sshd_hardening_platform_task is not none
