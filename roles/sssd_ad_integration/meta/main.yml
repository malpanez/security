---
galaxy_info:
  author: Miguel Alpañez
  description: >-
    Network-zone-aware SSH access control with AD/SSSD group mapping.
    Deploys sshd_config.d drop-ins (Match Address + Match Group), SSSD AD
    configuration, per-group sudoers.d files, and pam_access.conf enforcement.
    Designed to complement malpanez.security.sshd_hardening.
  license: Apache-2.0
  min_ansible_version: "2.16"
  platforms:
    - name: Debian
      versions:
        - all
    - name: Ubuntu
      versions:
        - all
    - name: EL
      versions:
        - all
  galaxy_tags:
    - security
    - hardening
    - ssh
    - sssd
    - activedirectory
    - pam
    - sudoers
    - cis
    - nist
    - nis2
    - compliance
    - linux
    - ad
    - ldap

dependencies: []
