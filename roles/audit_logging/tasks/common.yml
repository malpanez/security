---
- name: common | Update apt cache for auditd
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts["os_family"] == "Debian"
  tags: [enforce]

- name: common | Ensure auditd package present (Debian)
  ansible.builtin.apt:
    name: "{{ audit_logging_package }}"
    state: present
  when: ansible_facts["os_family"] == "Debian"
  tags: [enforce]

- name: common | Ensure auditd package present (non-Debian)
  ansible.builtin.package:
    name: "{{ audit_logging_package }}"
    state: present
  when: ansible_facts["os_family"] != "Debian"
  tags: [enforce]

- name: common | Deploy audit rules
  ansible.builtin.copy:
    dest: "{{ audit_logging_rules_path }}"
    content: |
      {{ audit_logging_rules | join('\n') }}
    owner: root
    group: root
    mode: "0640"
  notify: Restart auditd
  tags: [enforce]

- name: common | Check if audit subsystem is available
  ansible.builtin.command: auditctl -l
  register: auditctl_check
  failed_when: false
  changed_when: false
  tags: [enforce]

- name: common | Ensure auditd service running
  ansible.builtin.service:
    name: "{{ audit_logging_service }}"
    state: started
    enabled: true
  when: auditctl_check.rc == 0
  tags: [enforce]
