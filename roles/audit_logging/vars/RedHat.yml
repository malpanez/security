---
# RHEL / Rocky Linux / AlmaLinux / CentOS platform-specific values.
# audit_logging_rules is defined in defaults/main.yml — do NOT override here.

audit_logging_package: audit
audit_logging_service: auditd
audit_logging_rules_path: /etc/audit/rules.d/99-security.rules
audit_logging_auth_log: /var/log/secure
audit_logging_secure_log: /var/log/secure
