---
# Debian / Ubuntu platform-specific values.
# audit_logging_rules is defined in defaults/main.yml — do NOT override here.
# Overriding it here would lose all the expanded rules added to defaults.

audit_logging_package: auditd
audit_logging_service: auditd
audit_logging_rules_path: /etc/audit/rules.d/99-security.rules
audit_logging_auth_log: /var/log/auth.log
audit_logging_secure_log: /var/log/auth.log
