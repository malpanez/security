---
argument_specs:
  main:
    short_description: Configure auditd rules and service
    options:
      audit_logging_enabled:
        type: bool
        default: true
        description: Whether to manage auditd rules and service.
      audit_logging_rules:
        type: list
        elements: str
        default:
          - "-w /etc/ssh/sshd_config -p wa -k sshd_config"
          - "-w /etc/ssh/sshd_config.d -p wa -k sshd_config_d"
          - "-w /etc/sudoers -p wa -k sudoers"
          - "-w /etc/sudoers.d -p wa -k sudoers_d"
          - "-w /etc/pam.d/sshd -p wa -k pam_sshd"
          - "-w /etc/pam.d/sudo -p wa -k pam_sudo"
          - "-w /etc/pam.d/common-auth -p wa -k pam_common_auth"
          - "-w /etc/pam.d/system-auth -p wa -k pam_system_auth"
          - "-w /etc/passwd -p wa -k identity"
          - "-w /etc/group -p wa -k identity"
          - "-w /etc/shadow -p wa -k identity"
          - "-w /etc/gshadow -p wa -k identity"
        description: List of auditd rule lines to deploy (paths are filtered if missing).
      audit_logging_service:
        type: str
        default: auditd
        description: Name of the audit daemon service.
      audit_logging_rules_path:
        type: str
        default: /etc/audit/rules.d/99-security.rules
        description: Destination path for the audit rules file.
      audit_logging_auth_log:
        type: str
        default: /var/log/auth.log
        description: Path to auth log (Debian/Ubuntu).
      audit_logging_secure_log:
        type: str
        default: /var/log/secure
        description: Path to secure log (RHEL/EL variants).
