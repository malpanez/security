---
audit_logging_enabled: true
audit_logging_package: auditd
audit_logging_rules:
  # SSH daemon configuration
  - "-w /etc/ssh/sshd_config -p wa -k sshd_config"
  - "-w /etc/ssh/sshd_config.d -p wa -k sshd_config_d"
  # Sudoers
  - "-w /etc/sudoers -p wa -k sudoers"
  - "-w /etc/sudoers.d -p wa -k sudoers_d"
  # PAM configuration
  - "-w /etc/pam.d/sshd -p wa -k pam_sshd"
  - "-w /etc/pam.d/sudo -p wa -k pam_sudo"
  - "-w /etc/pam.d/mfa-totp -p wa -k pam_mfa_substack"
  - "-w /etc/pam.d/common-auth -p wa -k pam_common_auth"
  - "-w /etc/pam.d/system-auth -p wa -k pam_system_auth"
  # Identity files
  - "-w /etc/passwd -p wa -k identity"
  - "-w /etc/group -p wa -k identity"
  - "-w /etc/shadow -p wa -k identity"
  - "-w /etc/gshadow -p wa -k identity"
  # Password and login policy (pam_security role)
  - "-w /etc/security/pwquality.conf -p wa -k pwquality"
  - "-w /etc/security/faillock.conf -p wa -k faillock"
  - "-w /etc/security/access.conf -p wa -k pam_access"
  - "-w /etc/security/limits.conf -p wa -k limits"
  - "-w /etc/security/limits.d -p wa -k limits_d"
  - "-w /etc/login.defs -p wa -k login_defs"
  # AppArmor profiles
  - "-w /etc/apparmor.d -p wa -k apparmor"
  # Kernel sysctl and module policy (kernel_hardening role)
  - "-w /etc/sysctl.conf -p wa -k sysctl"
  - "-w /etc/sysctl.d -p wa -k sysctl_d"
  - "-w /etc/modprobe.d -p wa -k modprobe"
  # Cron (privilege escalation risk)
  - "-w /etc/cron.allow -p wa -k cron_allow"
  - "-w /etc/cron.deny -p wa -k cron_deny"
  - "-w /etc/crontab -p wa -k crontab"
  - "-w /etc/cron.d -p wa -k cron_d"
  # Time synchronization (audit log integrity depends on correct time)
  - "-w /etc/chrony.conf -p wa -k chrony"
  - "-w /etc/ntp.conf -p wa -k ntp"
  # Login / session records (CIS 4.1.x, NIST AU-2)
  - "-w /var/log/lastlog -p wa -k logins"
  - "-w /var/run/faillock -p wa -k logins"
  - "-w /var/log/wtmp -p wa -k session"
  - "-w /var/log/btmp -p wa -k session"
audit_logging_syscall_rules:
  # Process execution
  - "-a always,exit -F arch=b64 -S execve -k exec"
  - "-a always,exit -F arch=b32 -S execve -k exec"
  # Privilege escalation via setuid/setgid family
  - "-a always,exit -F arch=b64 -S setuid,setgid,setreuid,setregid,setresuid,setresgid -k priv_esc"
  - "-a always,exit -F arch=b32 -S setuid,setgid,setreuid,setregid,setresuid,setresgid -k priv_esc"
  # Discretionary access control: permission & ownership changes (CIS 4.1.3)
  - "-a always,exit -F arch=b64 -S chmod,fchmod,fchmodat,chown,fchown,fchownat,lchown,setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F auid>=1000 -F auid!=4294967295 -k perm_mod"
  - "-a always,exit -F arch=b32 -S chmod,fchmod,fchmodat,chown,chown32,fchown,fchown32,fchownat,lchown,lchown32,setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F auid>=1000 -F auid!=4294967295 -k perm_mod"
  # Unsuccessful file access attempts
  - "-a always,exit -F arch=b64 -S open,openat,creat,truncate,ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k access"
  - "-a always,exit -F arch=b64 -S open,openat,creat,truncate,ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=4294967295 -k access"
  # File deletion by users
  - "-a always,exit -F arch=b64 -S unlink,unlinkat,rename,renameat -F auid>=1000 -F auid!=4294967295 -k delete"
  # Mount operations
  - "-a always,exit -F arch=b64 -S mount,umount2 -F auid>=1000 -F auid!=4294967295 -k mounts"
  # System time changes (audit log integrity)
  - "-a always,exit -F arch=b64 -S adjtimex,settimeofday,clock_settime -k time_change"
  - "-a always,exit -F arch=b32 -S adjtimex,settimeofday,stime,clock_settime -k time_change"
  # Kernel module load/unload
  - "-a always,exit -F arch=b64 -S init_module,finit_module,delete_module -k modules"
audit_logging_service: auditd
audit_logging_rules_path: /etc/audit/rules.d/99-security.rules
audit_logging_auth_log: /var/log/auth.log
audit_logging_secure_log: /var/log/secure
audit_logging_verify_rules: true
audit_logging_verify_syscalls: true
