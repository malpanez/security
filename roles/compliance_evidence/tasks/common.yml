---
- name: common | Ensure evidence directory exists
  ansible.builtin.file:
    path: "{{ compliance_evidence_output_dir }}"
    state: directory
    mode: "0750"

- name: common | Stat evidence paths
  ansible.builtin.stat:
    path: "{{ item.path }}"
  register: compliance_evidence_stats
  loop: "{{ compliance_evidence_items | selectattr('path', 'defined') | list }}"
  failed_when: false
  tags: [review]

- name: common | Copy file evidence
  ansible.builtin.copy:
    src: "{{ item.item.path }}"
    dest: "{{ compliance_evidence_output_dir }}/{{ inventory_hostname }}-{{ item.item.name }}"
    remote_src: true
    mode: "0640"
  loop: "{{ compliance_evidence_stats.results | default([]) }}"
  when:
    - item.stat.exists | default(false)
    - not item.stat.isdir | default(false)
  changed_when: false
  failed_when: false
  tags: [review]

- name: common | Archive directory evidence
  community.general.archive:
    path: "{{ item.item.path }}"
    dest: "{{ compliance_evidence_output_dir }}/{{ inventory_hostname }}-{{ item.item.name }}.tar.gz"
    format: gz
    mode: "0640"
  loop: "{{ compliance_evidence_stats.results | default([]) }}"
  when:
    - item.stat.exists | default(false)
    - item.stat.isdir | default(false)
  failed_when: false
  tags: [review]

- name: common | Collect command output evidence
  ansible.builtin.shell: |
    set -o pipefail
    {{ item.command }}
  args:
    executable: /bin/bash
  register: compliance_evidence_cmd
  changed_when: false
  loop: "{{ compliance_evidence_items | selectattr('command', 'defined') | list }}"
  failed_when: false
  no_log: true
  tags: [review]

- name: common | Write command evidence to files
  ansible.builtin.copy:
    dest: >-
      {{ compliance_evidence_output_dir }}/{{ inventory_hostname }}-{{ item.item.name
      | default(item.item.command | regex_replace('[^A-Za-z0-9_-]', '_')) }}.log
    content: "{{ item.stdout | default('') }}"
    mode: "0640"
  loop: "{{ compliance_evidence_cmd.results | default([]) }}"
  when: compliance_evidence_cmd is defined
  tags: [review]

- name: common | Generate evidence hash manifest
  ansible.builtin.shell: |
    set -euo pipefail
    find "{{ compliance_evidence_output_dir }}" -type f \
      ! -name "{{ compliance_evidence_hash_manifest_name }}" \
      -print0 \
      | sort -z \
      | xargs -0 sha256sum > "{{ compliance_evidence_output_dir }}/{{ compliance_evidence_hash_manifest_name }}"
  args:
    executable: /bin/bash
  when: compliance_evidence_hash_manifest | bool
  changed_when: false
  tags: [review]
