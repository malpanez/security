---
argument_specs:
  main:
    short_description: Collect compliance evidence artifacts
    options:
      compliance_evidence_enabled:
        type: bool
        default: true
        description: Whether to collect evidence on the target.
      compliance_evidence_output_dir:
        type: str
        default: reports
        description: Directory (relative) where evidence files are stored.
      compliance_evidence_items:
        type: list
        elements: dict
        default: []
        description: List of evidence items (path or command).
