---
argument_specs:
  main:
    short_description: Collect compliance evidence artifacts
    description: >
      Collects file snapshots, directory archives, and command outputs from
      managed hosts and writes them to a local evidence directory. Optionally
      generates a SHA-256 hash manifest for integrity verification.
    options:
      compliance_evidence_enabled:
        type: bool
        default: true
        description: Whether to collect evidence on the target.
      compliance_evidence_output_dir:
        type: str
        default: /var/log/compliance
        description: Absolute path on the target where evidence files are written.
      compliance_evidence_hash_manifest:
        type: bool
        default: true
        description: >
          Generate a SHA-256 hash manifest of all collected evidence files.
          Useful for integrity verification and audit trails.
      compliance_evidence_hash_manifest_name:
        type: str
        default: evidence.sha256
        description: Filename for the SHA-256 hash manifest within compliance_evidence_output_dir.
      compliance_evidence_items:
        type: list
        elements: dict
        default:
          - name: sshd_config
            path: /etc/ssh/sshd_config
          - name: sshd_config_d
            path: /etc/ssh/sshd_config.d
          - name: pam_sudo
            path: /etc/pam.d/sudo
          - name: pam_mfa_substack
            path: /etc/pam.d/mfa-totp
          - name: sudoers
            path: /etc/sudoers
          - name: selinux_status_cmd
            command: sestatus
          - name: audit_rules
            path: /etc/audit/rules.d
          - name: audit_rules_loaded
            command: auditctl -l || true
          - name: pam_chain
            command: >-
              grep -E 'pam_(u2f|fido2|google_authenticator)'
              /etc/pam.d/sshd /etc/pam.d/sudo /etc/pam.d/mfa-totp 2>/dev/null || true
          - name: pam_auth_update
            command: pam-auth-update --list || true
          - name: sshd_effective_auth
            command: >-
              sshd -T | egrep -i
              'passwordauthentication|kbdinteractiveauthentication|challengeresponseauthentication|authenticationmethods|pubkeyacceptedalgorithms|permitrootlogin|usepam' || true
          - name: sudoers_summary
            command: visudo -c -f /etc/sudoers && cat /etc/sudoers
          - name: pwquality_conf
            path: /etc/security/pwquality.conf
          - name: faillock_conf
            path: /etc/security/faillock.conf
          - name: access_conf
            path: /etc/security/access.conf
          - name: limits_conf
            path: /etc/security/limits.conf
          - name: limits_d
            path: /etc/security/limits.d
          - name: login_defs
            path: /etc/login.defs
          - name: faillock_status
            command: faillock || true
          - name: sysctl_security
            path: /etc/sysctl.d/99-security.conf
          - name: sysctl_all
            command: sysctl -a --ignore 2>/dev/null | sort || true
          - name: modprobe_disabled
            path: /etc/modprobe.d/99-security-disabled.conf
          - name: loaded_modules
            command: lsmod | sort || true
          - name: apparmor_status
            command: aa-status 2>/dev/null || echo 'AppArmor not available'
          - name: selinux_status_cmd
            command: sestatus 2>/dev/null || echo 'SELinux not available'
          - name: chrony_conf
            path: /etc/chrony.conf
          - name: ntp_conf
            path: /etc/ntp.conf
          - name: timedatectl
            command: timedatectl status || true
          - name: cron_allow
            path: /etc/cron.allow
          - name: cron_deny
            path: /etc/cron.deny
          - name: at_allow
            path: /etc/at.allow
          - name: at_deny
            path: /etc/at.deny
          - name: controls_map
            command: echo 'See docs/controls.md'
        description: >
          List of evidence items to collect. Each item is a dict with a
          mandatory 'name' key and either a 'path' key (for files/directories)
          or a 'command' key (for command output). Both keys are mutually
          exclusive per item.
        options:
          name:
            type: str
            required: true
            description: >
              Identifier used to name the output file:
              {hostname}-{name} for path items,
              {hostname}-{name}.log for command items.
          path:
            type: str
            description: >
              Absolute path on the target to collect. Files are copied directly;
              directories are archived as .tar.gz.
          command:
            type: str
            description: >
              Shell command to execute on the target. stdout is written to a
              .log file. Commands run with 'set -o pipefail' and bash.
              Use '|| true' to prevent failure on non-critical commands.
