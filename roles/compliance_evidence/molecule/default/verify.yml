---
- name: Verify
  hosts: all
  become: true
  gather_facts: false
  vars:
    output_dir: /var/log/compliance
  tasks:
    - name: Stat the JSON compliance report
      ansible.builtin.stat:
        path: "{{ output_dir }}/compliance-report.json"
      register: compliance_report_json_stat

    - name: Assert the JSON compliance report exists
      ansible.builtin.assert:
        that:
          - compliance_report_json_stat.stat.exists
        fail_msg: "{{ output_dir }}/compliance-report.json was not generated"

    - name: Read the JSON compliance report
      ansible.builtin.slurp:
        src: "{{ output_dir }}/compliance-report.json"
      register: compliance_report_json_raw

    - name: Parse the JSON compliance report
      ansible.builtin.set_fact:
        compliance_report: "{{ compliance_report_json_raw.content | b64decode | from_json }}"

    - name: Assert the report parses as JSON with a positive control total
      ansible.builtin.assert:
        that:
          - compliance_report.summary.total | int > 0
          - compliance_report.controls | length == (compliance_report.summary.total | int)
        fail_msg: "compliance-report.json did not parse to a report with summary.total > 0"
