---
# SUSE Linux Enterprise / openSUSE Leap platform-specific values.
# Overrides items that differ from the defaults (auth log path).

compliance_evidence_items:
  - name: sshd_config
    path: /etc/ssh/sshd_config
  - name: sshd_config_d
    path: /etc/ssh/sshd_config.d
  - name: pam_sudo
    path: /etc/pam.d/sudo
  - name: pam_mfa_substack
    path: /etc/pam.d/mfa-totp
  - name: sudoers
    path: /etc/sudoers
  - name: apparmor_status
    command: aa-status 2>/dev/null || echo 'AppArmor not available'
  - name: audit_rules
    path: /etc/audit/rules.d
  - name: audit_rules_loaded
    command: auditctl -l || true
  - name: pam_chain
    command: >-
      grep -E 'pam_(u2f|fido2|google_authenticator)'
      /etc/pam.d/sshd /etc/pam.d/sudo 2>/dev/null || true
  - name: sshd_effective_auth
    command: >-
      sshd -T | grep -Ei
      'passwordauthentication|kbdinteractiveauthentication|authenticationmethods|permitrootlogin|usepam' || true
  - name: sudoers_summary
    command: visudo -c -f /etc/sudoers && cat /etc/sudoers
  - name: pwquality_conf
    path: /etc/security/pwquality.conf
  - name: faillock_conf
    path: /etc/security/faillock.conf
  - name: login_defs
    path: /etc/login.defs
  - name: sysctl_security
    path: /etc/sysctl.d/99-security.conf
  - name: timedatectl
    command: timedatectl status || true
  - name: auth_log
    path: /var/log/messages
  - name: controls_map
    command: echo 'See docs/controls.md'
