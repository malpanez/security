---
compliance_evidence_enabled: true
compliance_evidence_output_dir: /var/log/compliance
compliance_evidence_hash_manifest: true
compliance_evidence_hash_manifest_name: evidence.sha256
compliance_evidence_items:
  - name: sshd_config
    path: /etc/ssh/sshd_config
  - name: sshd_config_d
    path: /etc/ssh/sshd_config.d
  - name: pam_sudo
    path: /etc/pam.d/sudo
  - name: pam_mfa_substack
    path: /etc/pam.d/mfa-totp
  - name: sudoers
    path: /etc/sudoers
  - name: selinux_status_cmd
    command: sestatus
  - name: audit_rules
    path: /etc/audit/rules.d
  - name: audit_rules_loaded
    command: auditctl -l || true
  - name: pam_chain
    command: >-
      grep -E 'pam_(u2f|fido2|google_authenticator)'
      /etc/pam.d/sshd /etc/pam.d/sudo /etc/pam.d/mfa-totp 2>/dev/null || true
  - name: pam_auth_update
    command: pam-auth-update --list || true
  - name: sshd_effective_auth
    command: >-
      sshd -T | egrep -i
      'passwordauthentication|kbdinteractiveauthentication|challengeresponseauthentication|authenticationmethods|pubkeyacceptedalgorithms|permitrootlogin|usepam' || true
  - name: sudoers_summary
    command: visudo -c -f /etc/sudoers && cat /etc/sudoers

  # ── Password & login policy (pam_security role) ─────────────────────────
  - name: pwquality_conf
    path: /etc/security/pwquality.conf
  - name: faillock_conf
    path: /etc/security/faillock.conf
  - name: access_conf
    path: /etc/security/access.conf
  - name: limits_conf
    path: /etc/security/limits.conf
  - name: limits_d
    path: /etc/security/limits.d
  - name: login_defs
    path: /etc/login.defs
  - name: faillock_status
    command: faillock || true

  # ── Kernel hardening (kernel_hardening role) ─────────────────────────────
  - name: sysctl_security
    path: /etc/sysctl.d/99-security.conf
  - name: sysctl_all
    command: sysctl -a --ignore 2>/dev/null | sort || true
  - name: modprobe_disabled
    path: /etc/modprobe.d/99-security-disabled.conf
  - name: loaded_modules
    command: lsmod | sort || true

  # ── AppArmor (apparmor role — Debian/Ubuntu/SUSE) ───────────────────────
  - name: apparmor_status
    command: aa-status 2>/dev/null || echo 'AppArmor not available'

  # ── SELinux (selinux_enforcement role — RHEL family) ─────────────────────
  - name: selinux_status_cmd
    command: sestatus 2>/dev/null || echo 'SELinux not available'

  # ── Time synchronization (audit log integrity) ───────────────────────────
  - name: chrony_conf
    path: /etc/chrony.conf
  - name: ntp_conf
    path: /etc/ntp.conf
  - name: timedatectl
    command: timedatectl status || true

  # ── Cron security ────────────────────────────────────────────────────────
  - name: cron_allow
    path: /etc/cron.allow
  - name: cron_deny
    path: /etc/cron.deny
  - name: at_allow
    path: /etc/at.allow
  - name: at_deny
    path: /etc/at.deny

  - name: controls_map
    command: echo 'See docs/controls.md'

# ── Machine-readable compliance report ─────────────────────────────────────
compliance_evidence_report_enabled: true
compliance_evidence_report_json: compliance-report.json
compliance_evidence_report_md: compliance-report.md
compliance_evidence_controls:
  - id: ssh_password_auth_disabled
    title: SSH password authentication disabled
    frameworks:
      cis: CIS 5.2.x
      nist: NIST AC-17
      nis2: NIS2 21(2)(f)
    role: sshd_hardening
    severity: high
    check: sshd -T 2>/dev/null | grep -qi '^passwordauthentication no'
  - id: ssh_root_login_disabled
    title: SSH root login disabled
    frameworks:
      cis: CIS 5.2.x
      nist: NIST AC-6
      nis2: NIS2 21(2)(e)
    role: sshd_hardening
    severity: high
    check: sshd -T 2>/dev/null | grep -qiE '^permitrootlogin (no|prohibit-password)'
  - id: ssh_max_auth_tries
    title: SSH MaxAuthTries limited
    frameworks:
      cis: CIS 5.2.7
      nist: NIST AC-7
      nis2: NIS2 21(2)(e)
    role: sshd_hardening
    severity: medium
    check: v=$(sshd -T 2>/dev/null | awk '/^maxauthtries/{print $2}'); [ -n "$v" ] && [ "$v" -le 4 ]
  - id: sudo_use_pty
    title: Sudo commands use a pseudo-terminal
    frameworks:
      cis: CIS 5.3.4
      nist: NIST AC-6
      nis2: NIS2 21(2)(e)
    role: sudoers_baseline
    severity: medium
    check: grep -REq '^Defaults.*use_pty' /etc/sudoers /etc/sudoers.d/
  - id: sudo_logfile
    title: Sudo logfile configured
    frameworks:
      cis: CIS 5.3.6
      nist: NIST AU-2
      nis2: NIS2 21(2)(b)
    role: sudoers_baseline
    severity: low
    check: grep -REq '^Defaults.*logfile=' /etc/sudoers /etc/sudoers.d/
  - id: password_quality
    title: Password quality minimum length enforced
    frameworks:
      cis: CIS 5.4.1
      nist: NIST IA-5
      nis2: NIS2 21(2)(i)
    role: pam_security
    severity: medium
    check: grep -Eq '^minlen\s*=\s*(1[4-9]|[2-9][0-9])' /etc/security/pwquality.conf
  - id: account_lockout
    title: Account lockout after failed attempts
    frameworks:
      cis: CIS 5.4.2
      nist: NIST AC-7
      nis2: NIS2 21(2)(e)
    role: pam_security
    severity: medium
    check: grep -Eq '^deny\s*=\s*[1-5]' /etc/security/faillock.conf
  - id: auditd_active
    title: Audit daemon active
    frameworks:
      cis: CIS 4.1.x
      nist: NIST AU-2
      nis2: NIS2 21(2)(b)
    role: audit_logging
    severity: high
    check: systemctl is-active --quiet auditd
  - id: firewall_active
    title: Host firewall active
    frameworks:
      cis: CIS 3.5.x
      nist: NIST SC-7
      nis2: NIS2 21(2)(j)
    role: firewall
    severity: high
    check: "{ systemctl is-active --quiet firewalld; } || { command -v ufw >/dev/null && ufw status | grep -qi 'Status: active'; }"
  - id: mac_enforcing
    title: Mandatory access control enforcing
    frameworks:
      cis: CIS 1.x
      nist: NIST AC-3
      nis2: NIS2 21(2)(e)
    role: selinux_enforcement/apparmor
    severity: high
    check: "{ command -v getenforce >/dev/null && getenforce | grep -qi enforcing; } || { command -v aa-status >/dev/null && aa-status --enabled; }"
  - id: kernel_aslr
    title: Kernel ASLR fully enabled
    frameworks:
      cis: CIS 1.5.x
      nist: NIST SC-30
      nis2: NIS2 21(2)(e)
    role: kernel_hardening
    severity: medium
    check: '[ "$(sysctl -n kernel.randomize_va_space 2>/dev/null)" = "2" ]'
  - id: time_sync_active
    title: Time synchronization service active
    frameworks:
      cis: CIS 2.x
      nist: NIST AU-8
      nis2: NIS2 21(2)(b)
    role: ntp_hardening
    severity: low
    check: systemctl is-active --quiet chrony || systemctl is-active --quiet chronyd
  - id: fim_present
    title: File integrity monitoring present
    frameworks:
      cis: ""
      nist: NIST SI-7
      nis2: NIS2 21(2)(e)
    role: aide
    severity: medium
    check: command -v aide >/dev/null
  - id: auto_security_updates
    title: Automated security updates enabled
    frameworks:
      cis: CIS 1.9
      nist: NIST SI-2
      nis2: NIS2 21(2)(i)
    role: automated_patching
    severity: medium
    check: "{ systemctl is-enabled --quiet dnf-automatic.timer; } || { systemctl is-enabled --quiet unattended-upgrades || systemctl is-enabled --quiet apt-daily-upgrade.timer; }"
  - id: sshd_strong_crypto
    title: SSH disallows weak ciphers
    frameworks:
      cis: CIS 5.2.x
      nist: NIST SC-8
      nis2: NIS2 21(2)(f)
    role: sshd_hardening
    severity: medium
    check: "! sshd -T 2>/dev/null | grep -Ei 'ciphers' | grep -Eqi '(3des|arcfour|cbc)'"
