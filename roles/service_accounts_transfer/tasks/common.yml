---
- name: common | Create service accounts
  ansible.builtin.user:
    name: "{{ item.name }}"
    shell: "{{ item.shell | default('/usr/sbin/nologin') }}"
    home: "{{ item.home | default(omit) }}"
    state: present
    create_home: true
  loop: "{{ service_accounts_transfer_accounts }}"
  when: security_mode | default('enforce') == 'enforce'
  tags: [enforce]

- name: common | Ensure chroot directories exist (if configured)
  ansible.builtin.file:
    path: "{{ item.chroot }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ service_accounts_transfer_accounts }}"
  when:
    - security_mode | default('enforce') == 'enforce'
    - item.chroot is defined
  tags: [enforce]

- name: common | Ensure authorized_keys with restrictions for service accounts
  vars:
    effective_allow_from: >-
      {{
        item.0.allow_from
          if item.0.allow_from | default([]) | length > 0
          else pam_mfa_service_bypass_allow_from | default([])
      }}
    base_opts: >-
      {{
        [] +
        (['from=' ~ (effective_allow_from | join(','))] if effective_allow_from | length > 0 else []) +
        (['command=\"' ~ item.0.command ~ '\"'] if item.0.command is defined else []) +
        (
          ['restrict', 'no-pty', 'no-agent-forwarding', 'no-port-forwarding', 'no-X11-forwarding']
          if (
            item.0.sftp_only | default(false)
            or item.0.rsync_only | default(false)
            or security_capabilities_selected_auth_mode | default('legacy') == 'legacy'
          )
          else []
        )
      }}
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    key_options: "{{ base_opts | join(',') if base_opts | length > 0 else omit }}"
    state: present
    manage_dir: true
    exclusive: false
    comment: managed-service-key
  loop: "{{ service_accounts_transfer_accounts | subelements('keys', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}"
  when:
    - security_mode | default('enforce') == 'enforce'
    - item.1 is defined
  tags: [enforce]

- name: common | Configure sshd Match blocks for service accounts
  ansible.builtin.set_fact:
    sshd_hardening_service_match_blocks: >-
      {{
        (sshd_hardening_service_match_blocks | default([]))
        + [{'match': 'User ' ~ item.name, 'options': match_opts}]
      }}
  vars:
    match_opts: >-
      {{
        [
          'AuthenticationMethods publickey',
          'PubkeyAuthentication yes',
          'PermitTTY no' if (item.sftp_only | default(false) or item.rsync_only | default(false)) else omit,
          'AllowTcpForwarding no',
          'X11Forwarding no',
          'ForceCommand ' ~ (item.command | default('internal-sftp'))
        ] +
        (['ChrootDirectory ' ~ item.chroot] if item.chroot is defined else []) +
        (item.match_extra | default([]))
      }}
  loop: "{{ service_accounts_transfer_accounts }}"
  when: security_mode | default('enforce') == 'enforce'
  tags: [enforce]
