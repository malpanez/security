---
- name: Verify user_audit
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Gather package facts for shadow-utils check (STD-10)
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert shadow-utils present on RedHat (STD-10)
      ansible.builtin.assert:
        that:
          - "'shadow-utils' in ansible_facts.packages"
        fail_msg: shadow-utils package not found on RedHat
        quiet: true
      when: ansible_os_family == 'RedHat'

    - name: Assert login package present on Debian (STD-10)
      ansible.builtin.assert:
        that:
          - "'login' in ansible_facts.packages"
        fail_msg: login package not found on Debian
        quiet: true
      when: ansible_os_family == 'Debian'

    - name: Check testuser exists in /etc/passwd
      ansible.builtin.command:
        cmd: getent passwd testuser
      register: _ua_verify_passwd
      changed_when: false

    - name: Assert testuser exists
      ansible.builtin.assert:
        that:
          - _ua_verify_passwd.rc == 0
        fail_msg: testuser not found in /etc/passwd
        quiet: true

    - name: Get testuser password expiry info (USR-03)
      ansible.builtin.command:
        cmd: chage -l testuser
      register: _ua_verify_chage
      changed_when: false

    - name: Assert testuser has password expiry set to 90 days (USR-03)
      ansible.builtin.assert:
        that:
          - '_ua_verify_chage.stdout is search("Maximum number of days between password change\s*:\s*90")'
        fail_msg: >-
          testuser maxdays is not 90 after enforce.
          Got: {{ _ua_verify_chage.stdout }}
        quiet: true

    - name: Get root account password expiry info (USR-04)
      ansible.builtin.command:
        cmd: chage -l root
      register: _ua_verify_root
      changed_when: false

    - name: Assert root password expiry was not changed to 90 days (USR-04)
      ansible.builtin.assert:
        that:
          - '_ua_verify_root.stdout is not search("Maximum number of days between password change\s*:\s*90")'
        fail_msg: >-
          root account maxdays was changed to 90 by enforce tasks.
          This violates USR-04. Got: {{ _ua_verify_root.stdout }}
        quiet: true

    - name: Check testuser lock state via passwd -S (USR-02)
      ansible.builtin.command:
        cmd: passwd -S testuser
      register: _ua_verify_lock
      changed_when: false
      failed_when: false

# USR-02 NOTE: _ua_verify_lock.stdout is collected above but not asserted here.
# Reason: whether testuser appears in `lastlog --before 90` inside a Docker container
# depends on the container's /var/log/lastlog state. Newly created users with no
# login history may or may not appear depending on the image. An assert on ' L '
# (locked indicator) would be flaky across platforms.
#
# Manual verification (ASUS PN50 / Docker-capable host):
#   molecule test -s default
#   Inspect `passwd -S testuser` output during verify phase.
#   If testuser has no lastlog entry, enforce.yml locks it and output will contain ' L '.
#   If testuser is not in lastlog --before output, lock is not applied (correct behaviour).
#
# Regression protection: USR-02 is covered by code review of enforce.yml
# `ansible.builtin.user: password_lock: true` + triple guard (intersect, skip_users, != root).
