---
galaxy_info:
  author: Miguel Alpanez
  description: >-
    Local user account audit and lockout enforcement. Reviews password expiry,
    inactive accounts, UID 0 duplicates, and service account shells. Enforces
    password aging via chage and locks inactive accounts. Supports review mode
    (audit-only) and enforce mode. SOC2 CC6.2/CC6.3, HIPAA, PCI-DSS 8.1.4/8.3.6, NIS2.
  license: GPL-2.0-or-later
  min_ansible_version: "2.16"
  galaxy_tags:
    - security
    - hardening
    - user
    - audit
    - account
    - password
    - linux
    - pci
    - nis2
    - soc2
    - hipaa
    - compliance
  platforms:
    - name: Debian
      versions: [buster, bullseye, bookworm]
    - name: Ubuntu
      versions: [bionic, focal, jammy]
    - name: EL
      versions: [all]
dependencies: []
