---
- name: Gather minimum facts if not already collected
  ansible.builtin.setup:
    gather_subset: [min]
  when: ansible_facts == {}
  tags: [always]

- name: Assert supported OS family
  ansible.builtin.assert:
    that:
      - ansible_os_family in ['Debian', 'RedHat']
    fail_msg: >-
      automated_patching: unsupported OS family '{{ ansible_os_family }}'.
      Supported: Debian, RedHat.
    quiet: true
  tags: [always]

- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"
  tags: [always]

- name: Detect container environment
  ansible.builtin.set_fact:
    _automated_patching_in_container: >-
      {{ ansible_facts.virtualization_type | default('') in
         ['docker', 'podman', 'container', 'lxc'] }}
  tags: [always]

- name: Review automated patching configuration
  ansible.builtin.include_tasks: review.yml
  tags: [automated_patching, review]

- name: Enforce automated patching
  ansible.builtin.include_tasks: enforce.yml
  when:
    - automated_patching_enabled | bool
    - security_mode | default('review') == 'enforce'
  tags: [automated_patching, enforce]
