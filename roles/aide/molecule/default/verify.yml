---
- name: Verify
  hosts: all
  gather_facts: true
  become: true

  tasks:
    - name: Detect container environment
      ansible.builtin.command:
        cmd: systemd-detect-virt --container
      register: _virt_check
      changed_when: false
      failed_when: false

    - name: Set container flag
      ansible.builtin.set_fact:
        _in_container: "{{ _virt_check.rc == 0 }}"

    - name: Check aide binary present (Debian path)
      ansible.builtin.stat:
        path: /usr/bin/aide
      register: _aide_bin_usr

    - name: Check aide binary present (RedHat path)
      ansible.builtin.stat:
        path: /usr/sbin/aide
      register: _aide_bin_sbin

    - name: Assert aide binary installed
      ansible.builtin.assert:
        that:
          - _aide_bin_usr.stat.exists or _aide_bin_sbin.stat.exists
        fail_msg: 'aide binary not found at /usr/bin/aide or /usr/sbin/aide'
        quiet: true

    - name: Check aide config exists (Debian path)
      ansible.builtin.stat:
        path: /etc/aide/aide.conf
      register: _aide_cfg_deb

    - name: Check aide config exists (RedHat/Suse path)
      ansible.builtin.stat:
        path: /etc/aide.conf
      register: _aide_cfg_rh

    - name: Assert aide config deployed
      ansible.builtin.assert:
        that:
          - _aide_cfg_deb.stat.exists or _aide_cfg_rh.stat.exists
        fail_msg: 'aide config not found at /etc/aide/aide.conf or /etc/aide.conf'
        quiet: true

    - name: Check aide-check service unit exists
      ansible.builtin.stat:
        path: /etc/systemd/system/aide-check.service
      register: _aide_svc

    - name: Assert aide-check service unit present
      ansible.builtin.assert:
        that:
          - _aide_svc.stat.exists
        fail_msg: 'aide-check.service not found'
        quiet: true

    - name: Check aide-check timer unit exists
      ansible.builtin.stat:
        path: /etc/systemd/system/aide-check.timer
      register: _aide_timer

    - name: Assert aide-check timer unit present
      ansible.builtin.assert:
        that:
          - _aide_timer.stat.exists
        fail_msg: 'aide-check.timer not found'
        quiet: true

    - name: Check aide-check timer is enabled
      ansible.builtin.command:
        cmd: systemctl is-enabled aide-check.timer
      register: _timer_state
      changed_when: false
      failed_when: false
      when: not _in_container

    - name: Assert aide-check timer enabled
      ansible.builtin.assert:
        that:
          - _timer_state.stdout in ['enabled', 'static']
        fail_msg: 'aide-check.timer is not enabled (got: {{ _timer_state.stdout }})'
        quiet: true
      when: not _in_container

    - name: Set resolved aide config path
      ansible.builtin.set_fact:
        _aide_resolved_cfg: "{{ '/etc/aide.conf' if _aide_cfg_rh.stat.exists else '/etc/aide/aide.conf' }}"

    - name: Verify aide config contains expected paths
      ansible.builtin.command:
        cmd: grep -c '/etc' "{{ _aide_resolved_cfg }}"
      register: _cfg_paths
      changed_when: false

    - name: Assert aide config has watched paths
      ansible.builtin.assert:
        that:
          - _cfg_paths.stdout | int > 0
        fail_msg: 'aide config has no watched paths defined'
        quiet: true

    - name: Check aide log directory exists
      ansible.builtin.stat:
        path: /var/log/aide
      register: _aide_log_dir

    - name: Assert aide log directory present
      ansible.builtin.assert:
        that:
          - _aide_log_dir.stat.exists
          - _aide_log_dir.stat.isdir
        fail_msg: '/var/log/aide directory not found'
        quiet: true
