---
- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

- name: Determine if PAM MFA should run
  ansible.builtin.set_fact:
    pam_mfa_should_configure: >-
      {{
        pam_mfa_enabled
        or (security_capabilities_selected_auth_mode | default('legacy') == 'pam_mfa')
        or (
          security_capabilities_selected_auth_mode | default('legacy') == 'sk_keys'
          and security_capabilities_mfa_for_humans_even_with_sk_keys | default(false)
        )
      }}

- name: Include common MFA setup
  ansible.builtin.include_tasks: common.yml
  when:
    - pam_mfa_should_configure
    - security_mode | default('enforce') == 'enforce'
  tags: [enforce]

- name: Resolve platform-specific MFA task
  ansible.builtin.set_fact:
    pam_mfa_platform_task: >-
      {{
        lookup(
          'ansible.builtin.first_found',
          params={'files': [ansible_os_family ~ '.yml'], 'paths': [role_path ~ '/tasks']},
          errors='ignore'
        )
      }}
  tags: [enforce]

- name: Include platform-specific MFA tasks
  ansible.builtin.include_tasks: "{{ pam_mfa_platform_task }}"
  when:
    - pam_mfa_should_configure
    - pam_mfa_platform_task is not none
    - security_mode | default('enforce') == 'enforce'
  tags: [enforce]

- name: Configure common PAM MFA chains
  ansible.builtin.include_tasks: common_mfa_config.yml
  when:
    - pam_mfa_should_configure
    - security_mode | default('enforce') == 'enforce'
  tags: [enforce]
