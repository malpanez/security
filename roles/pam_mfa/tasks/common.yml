---
- name: common | Ensure MFA groups exist
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  loop:
    - "{{ pam_mfa_breakglass_group }}"
    - "{{ pam_mfa_service_bypass_group }}"
  when: security_mode | default('enforce') == 'enforce'
  tags: [enforce]

- name: common | Check service accounts exist
  ansible.builtin.command: id -u {{ item }}
  register: pam_mfa_service_account_checks
  changed_when: false
  failed_when: false
  loop: "{{ pam_mfa_service_accounts }}"
  when:
    - security_mode | default('enforce') == 'enforce'
    - pam_mfa_service_accounts | length > 0
  tags: [enforce]

- name: common | Add existing service accounts to MFA bypass group
  ansible.builtin.user:
    name: "{{ item.item }}"
    groups: "{{ pam_mfa_service_bypass_group }}"
    append: true
  loop: "{{ pam_mfa_service_account_checks.results | default([]) }}"
  when:
    - security_mode | default('enforce') == 'enforce'
    - item.rc == 0
  tags: [enforce]

- name: common | Warn about missing service accounts
  ansible.builtin.debug:
    msg: "WARNING: Service account {{ item.item }} not found; cannot add to {{ pam_mfa_service_bypass_group }}"
  loop: "{{ pam_mfa_service_account_checks.results | default([]) }}"
  when:
    - security_mode | default('enforce') == 'enforce'
    - item.rc != 0
  tags: [enforce]

- name: common | Ensure U2F authfile directory exists
  ansible.builtin.file:
    path: "{{ pam_mfa_u2f_keys_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  when: security_mode | default('enforce') == 'enforce'
  tags: [enforce]

- name: common | Ensure TOTP directory exists
  ansible.builtin.file:
    path: "{{ pam_mfa_totp_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: security_mode | default('enforce') == 'enforce'
  tags: [enforce]

- name: common | Detect available PAM MFA modules
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ pam_mfa_pam_module_fido2 }}"
    - "{{ pam_mfa_pam_module_u2f }}"
  register: pam_mfa_module_stats
  changed_when: false
  when: security_mode | default('enforce') == 'enforce'
  tags: [enforce]

- name: common | Resolve primary PAM module
  ansible.builtin.set_fact:
    pam_mfa_primary_module_resolved: >-
      {{
        'fido2'
          if pam_mfa_primary_module == 'fido2'
          else (
            'u2f'
              if pam_mfa_primary_module == 'u2f'
              else (
                'fido2'
                  if (pam_mfa_module_stats.results[0].stat.exists | default(false))
                  else 'u2f'
              )
          )
      }}
  when: security_mode | default('enforce') == 'enforce'
  tags: [enforce]

- name: common | Resolve primary PAM module paths
  ansible.builtin.set_fact:
    pam_mfa_primary_module_path: >-
      {{
        pam_mfa_pam_module_fido2
          if pam_mfa_primary_module_resolved == 'fido2'
          else pam_mfa_pam_module_u2f
      }}
    pam_mfa_primary_authfile: >-
      {{
        pam_mfa_fido2_authfile
          if pam_mfa_primary_module_resolved == 'fido2'
          else pam_mfa_u2f_keys_path
      }}
  when:
    - security_mode | default('enforce') == 'enforce'
    - pam_mfa_primary_module_resolved is defined
  tags: [enforce]
