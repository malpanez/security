---
# CRITICAL: Pre-flight validation for PAM modules
- name: Common | Build required PAM module list
  ansible.builtin.set_fact:
    pam_mfa_required_modules: >-
      {{
        [
          pam_mfa_primary_module_path,
          pam_mfa_pam_module_google_authenticator
            if pam_mfa_totp_enabled else None,
          pam_mfa_succeed_if_module_path
        ]
        | reject('equalto', None)
        | list
      }}
  tags: [enforce]

- name: Common | Verify PAM modules exist before configuration
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ pam_mfa_required_modules | default([]) }}"
  register: pam_mfa_module_check
  tags: [enforce]

- name: Common | Fail if required PAM modules missing
  ansible.builtin.fail:
    msg: >
      CRITICAL: PAM module {{ item.item }} not found.
      Install required packages before continuing to prevent lockout.
  loop: "{{ pam_mfa_module_check.results }}"
  when:
    - not item.stat.exists
  tags: [enforce]

- name: Common | Create backup of PAM sshd config before modification
  ansible.builtin.copy:
    src: /etc/pam.d/sshd
    dest: /etc/pam.d/sshd.pam_mfa.orig
    remote_src: true
    force: false
    mode: "0644"
  tags: [enforce]

- name: Common | Create backup of PAM sudo config before modification
  ansible.builtin.copy:
    src: /etc/pam.d/sudo
    dest: /etc/pam.d/sudo.pam_mfa.orig
    remote_src: true
    force: false
    mode: "0644"
  tags: [enforce]

# Modular PAM (the "drop-in" pattern applied to PAM): the MFA auth logic lives
# in its OWN substack file at /etc/pam.d/<name>, and each protected service is
# wired in with a SINGLE `auth substack <name>` line. We never bury the MFA
# logic inside the vendor's /etc/pam.d/sshd or /etc/pam.d/sudo — that one include
# line is the only managed change to those files (idempotent, trivially
# removable). `substack` (not `include`) keeps the jump/`done` semantics
# contained within the MFA stack so it cannot leak into the parent service.
- name: Common | Deploy MFA auth substack
  ansible.builtin.template:
    src: pam-mfa-substack.j2
    dest: "/etc/pam.d/{{ pam_mfa_substack_name }}"
    owner: root
    group: root
    mode: "0644"
  tags: [enforce]

- name: Common | Wire MFA substack into PAM sshd
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sshd
    regexp: '^auth\s+substack\s+{{ pam_mfa_substack_name }}\b'
    line: "auth\tsubstack\t{{ pam_mfa_substack_name }}"
    insertbefore: '^\s*(auth\b|@include\b)'
    firstmatch: true
    create: false
  tags: [enforce]

- name: Common | Wire MFA substack into PAM sudo
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sudo
    regexp: '^auth\s+substack\s+{{ pam_mfa_substack_name }}\b'
    line: "auth\tsubstack\t{{ pam_mfa_substack_name }}"
    insertbefore: '^\s*(auth\b|@include\b)'
    firstmatch: true
    create: false
  tags: [enforce]

# CRITICAL: Post-configuration validation
- name: Common | Set PAM module basenames
  ansible.builtin.set_fact:
    pam_mfa_primary_module_basename: "{{ pam_mfa_primary_module_path | basename }}"
    pam_mfa_totp_module_basename: "{{ pam_mfa_pam_module_google_authenticator | basename }}"
    pam_mfa_primary_module_name: >-
      {{ pam_mfa_primary_module_path | basename | regex_replace('\\.so$', '') }}
    pam_mfa_totp_module_name: >-
      {{ pam_mfa_pam_module_google_authenticator | basename | regex_replace('\\.so$', '') }}
  tags: [enforce]

- name: Common | Validate MFA substack contains the primary module
  ansible.builtin.command: >-
    grep -Eq "{{ pam_mfa_primary_module_name }}(\\.so)?\\b" /etc/pam.d/{{ pam_mfa_substack_name }}
  register: _pam_mfa_primary_check
  changed_when: false
  failed_when: _pam_mfa_primary_check.rc != 0
  when: not pam_mfa_skip_module_validation
  tags: [enforce]

- name: Common | Validate MFA substack contains the bypass (pam_succeed_if) rule
  ansible.builtin.command: grep -q "pam_succeed_if.so" /etc/pam.d/{{ pam_mfa_substack_name }}
  register: _pam_mfa_succeed_if_check
  changed_when: false
  failed_when: _pam_mfa_succeed_if_check.rc != 0
  when: not pam_mfa_skip_module_validation
  tags: [enforce]

- name: Common | Validate MFA substack contains the TOTP module
  ansible.builtin.command: >-
    grep -Fq "{{ pam_mfa_totp_module_basename }}" /etc/pam.d/{{ pam_mfa_substack_name }}
  register: _pam_mfa_totp_check
  changed_when: false
  failed_when: _pam_mfa_totp_check.rc != 0
  when:
    - pam_mfa_totp_enabled
    - not pam_mfa_skip_module_validation
  tags: [enforce]

- name: Common | Validate sshd and sudo are wired to the MFA substack
  ansible.builtin.command: >-
    grep -Eq "^auth[[:space:]]+substack[[:space:]]+{{ pam_mfa_substack_name }}\\b" {{ item }}
  loop:
    - /etc/pam.d/sshd
    - /etc/pam.d/sudo
  register: _pam_mfa_wire_check
  changed_when: false
  failed_when: _pam_mfa_wire_check.rc != 0
  when: not pam_mfa_skip_module_validation
  tags: [enforce]

- name: Common | Display PAM lockout prevention warning
  ansible.builtin.debug:
    msg: |
      ========================================
      CRITICAL: PAM MFA CONFIGURATION APPLIED
      ========================================

      IMMEDIATE ACTION REQUIRED:
      1. Keep this Ansible session ACTIVE for 5+ minutes
      2. Open a NEW SSH session in another terminal NOW
      3. Verify you can authenticate with MFA
      4. Verify service accounts ({{ pam_mfa_service_accounts | join(', ') }}) can login WITHOUT MFA

      IF NEW SESSION FAILS:
      - DO NOT close this session
      - Restore backup: cp /etc/pam.d/sshd.pam_mfa.orig /etc/pam.d/sshd
      - Restart sshd: systemctl restart sshd
      - Contact administrator

      Dead-man switch: This playbook will pause for {{ pam_mfa_validation_timeout | default(300) }} seconds.
      If you close this session prematurely, review /var/log/auth.log for errors.
      ========================================
  tags: [enforce]

- name: Common | Pause for manual validation (Dead-man switch)
  vars:
    pam_mfa_effective_validation_timeout: >-
      {{
        1
        if ansible_check_mode | default(false)
        else pam_mfa_validation_timeout | default(300)
      }}
  ansible.builtin.pause:
    seconds: "{{ pam_mfa_effective_validation_timeout }}"
    prompt: |

      Pausing for {{ pam_mfa_effective_validation_timeout }} seconds to allow manual SSH testing.

      Test checklist:
      - [ ] New SSH session opens successfully
      - [ ] MFA is prompted for human users
      - [ ] Service accounts bypass MFA
      - [ ] TOTP fallback works (if enabled)

      Press Ctrl+C then 'C' to continue immediately if all tests pass.
      Press Ctrl+C then 'A' to abort if tests fail.
  when: pam_mfa_enable_deadman_switch | default(true)
  tags: [enforce]
