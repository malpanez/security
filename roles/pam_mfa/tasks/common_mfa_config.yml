---
# CRITICAL: Pre-flight validation for PAM modules
- name: Common | Build required PAM module list
  ansible.builtin.set_fact:
    pam_mfa_required_modules: >-
      {{
        [
          pam_mfa_primary_module_path,
          pam_mfa_pam_module_google_authenticator
            if pam_mfa_totp_enabled else None,
          pam_mfa_succeed_if_module_path
        ]
        | reject('equalto', None)
        | list
      }}
  tags: [enforce]

- name: Common | Verify PAM modules exist before configuration
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ pam_mfa_required_modules | default([]) }}"
  register: pam_mfa_module_check
  tags: [enforce]

- name: Common | Fail if required PAM modules missing
  ansible.builtin.fail:
    msg: >
      CRITICAL: PAM module {{ item.item }} not found.
      Install required packages before continuing to prevent lockout.
  loop: "{{ pam_mfa_module_check.results }}"
  when:
    - not item.stat.exists
  tags: [enforce]

- name: Common | Create backup of PAM sshd config before modification
  ansible.builtin.copy:
    src: /etc/pam.d/sshd
    dest: /etc/pam.d/sshd.backup-{{ ansible_date_time.epoch }}
    remote_src: true
    mode: "0644"
  changed_when: false
  tags: [enforce]

- name: Common | Configure PAM for SSHD - bypass service accounts group
  community.general.pamd:
    name: sshd
    type: auth
    control: "[success=1 default=ignore]"
    module_path: pam_succeed_if.so
    module_arguments:
      - user
      - ingroup
      - "{{ pam_mfa_service_bypass_group }}"
  tags: [enforce]

- name: Common | Configure PAM for SSHD - allow breakglass to bypass U2F
  community.general.pamd:
    name: sshd
    type: auth
    control: "[success=1 default=ignore]"
    module_path: pam_succeed_if.so
    module_arguments:
      - user
      - ingroup
      - "{{ pam_mfa_totp_allowed_group }}"
  when: pam_mfa_totp_enabled
  tags: [enforce]

- name: Common | Configure PAM for SSHD - primary U2F/FIDO2
  community.general.pamd:
    name: sshd
    type: auth
    control: required
    module_path: "{{ pam_mfa_primary_module_path }}"
    module_arguments:
      - authfile={{ pam_mfa_primary_authfile }}
      - cue
  tags: [enforce]

- name: Common | Configure PAM for SSHD - restrict TOTP to breakglass group
  community.general.pamd:
    name: sshd
    type: auth
    control: "[success=1 default=ignore]"
    module_path: pam_succeed_if.so
    module_arguments:
      - user
      - notingroup
      - "{{ pam_mfa_totp_allowed_group }}"
  when: pam_mfa_totp_enabled
  tags: [enforce]

- name: Common | Configure PAM for SSHD - backup TOTP
  community.general.pamd:
    name: sshd
    type: auth
    control: sufficient
    module_path: "{{ pam_mfa_pam_module_google_authenticator }}"
    module_arguments:
      - nullok
      - "{{ 'rate_limit=' ~ pam_mfa_totp_rate_limit_count if pam_mfa_totp_rate_limit else omit }}"
      - user_readenv=1
      - secret={{ pam_mfa_totp_dir }}/%u
  when: pam_mfa_totp_enabled
  tags: [enforce]

- name: Common | Configure PAM for sudo - allow breakglass to bypass U2F
  community.general.pamd:
    name: sudo
    type: auth
    control: "[success=1 default=ignore]"
    module_path: pam_succeed_if.so
    module_arguments:
      - user
      - ingroup
      - "{{ pam_mfa_totp_allowed_group }}"
  when: pam_mfa_totp_enabled
  tags: [enforce]

- name: Common | Configure PAM for sudo - enforce MFA
  community.general.pamd:
    name: sudo
    type: auth
    control: required
    module_path: "{{ pam_mfa_primary_module_path }}"
    module_arguments:
      - authfile={{ pam_mfa_primary_authfile }}
      - cue
  tags: [enforce]

- name: Common | Configure PAM for sudo - restrict TOTP to breakglass group
  community.general.pamd:
    name: sudo
    type: auth
    control: "[success=1 default=ignore]"
    module_path: pam_succeed_if.so
    module_arguments:
      - user
      - notingroup
      - "{{ pam_mfa_totp_allowed_group }}"
  when: pam_mfa_totp_enabled
  tags: [enforce]

- name: Common | Configure PAM for sudo - backup TOTP
  community.general.pamd:
    name: sudo
    type: auth
    control: sufficient
    module_path: "{{ pam_mfa_pam_module_google_authenticator }}"
    module_arguments:
      - nullok
      - "{{ 'rate_limit=' ~ pam_mfa_totp_rate_limit_count if pam_mfa_totp_rate_limit else omit }}"
      - user_readenv=1
      - secret={{ pam_mfa_totp_dir }}/%u
  when: pam_mfa_totp_enabled
  tags: [enforce]

# CRITICAL: Post-configuration validation
- name: Common | Verify PAM configuration syntax
  ansible.builtin.command: grep -q "auth.*pam_" /etc/pam.d/sshd
  changed_when: false
  failed_when: false
  register: pam_mfa_syntax_check
  tags: [enforce]

- name: Common | Display PAM lockout prevention warning
  ansible.builtin.debug:
    msg: |
      ========================================
      CRITICAL: PAM MFA CONFIGURATION APPLIED
      ========================================

      IMMEDIATE ACTION REQUIRED:
      1. Keep this Ansible session ACTIVE for 5+ minutes
      2. Open a NEW SSH session in another terminal NOW
      3. Verify you can authenticate with MFA
      4. Verify service accounts ({{ pam_mfa_service_accounts | join(', ') }}) can login WITHOUT MFA

      IF NEW SESSION FAILS:
      - DO NOT close this session
      - Restore backup: cp /etc/pam.d/sshd.backup-* /etc/pam.d/sshd
      - Restart sshd: systemctl restart sshd
      - Contact administrator

      Dead-man switch: This playbook will pause for {{ pam_mfa_validation_timeout | default(300) }} seconds.
      If you close this session prematurely, review /var/log/auth.log for errors.
      ========================================
  tags: [enforce]

- name: Common | Pause for manual validation (Dead-man switch)
  vars:
    pam_mfa_effective_validation_timeout: >-
      {{
        1
        if ansible_check_mode | default(false)
        else pam_mfa_validation_timeout | default(300)
      }}
  ansible.builtin.pause:
    seconds: "{{ pam_mfa_effective_validation_timeout }}"
    prompt: |

      Pausing for {{ pam_mfa_effective_validation_timeout }} seconds to allow manual SSH testing.

      Test checklist:
      - [ ] New SSH session opens successfully
      - [ ] MFA is prompted for human users
      - [ ] Service accounts bypass MFA
      - [ ] TOTP fallback works (if enabled)

      Press Ctrl+C then 'C' to continue immediately if all tests pass.
      Press Ctrl+C then 'A' to abort if tests fail.
  when: pam_mfa_enable_deadman_switch | default(true)
  tags: [enforce]
