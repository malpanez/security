---
- name: RedHat | Ensure authselect present (if available)
  ansible.builtin.package:
    name: authselect
    state: present
  register: pam_mfa_authselect_pkg
  failed_when: false
  when:
    - security_mode | default('enforce') == 'enforce'
    - pam_mfa_should_configure | default(false)
  tags: [enforce]

- name: RedHat | Ensure MFA packages are installed (RedHat)
  ansible.builtin.package:
    name:
      - "{{ pam_mfa_package_u2f }}"
      - "{{ pam_mfa_package_totp }}"
    state: present
  when:
    - pam_mfa_should_configure | default(false)
    - security_mode | default('enforce') == 'enforce'
  tags: [enforce]

- name: RedHat | Ensure FIDO2 package installed when requested
  ansible.builtin.package:
    name: "{{ pam_mfa_package_fido2 }}"
    state: present
  when:
    - pam_mfa_should_configure | default(false)
    - security_mode | default('enforce') == 'enforce'
    - pam_mfa_primary_module == 'fido2'
  tags: [enforce]

# community.general has no `authselect` module, so drive the CLI directly.
- name: RedHat | Read current authselect profile
  ansible.builtin.command: authselect current --raw
  register: _pam_mfa_authselect_current
  changed_when: false
  failed_when: false
  when:
    - pam_mfa_should_configure | default(false)
    - security_mode | default('enforce') == 'enforce'
    - pam_mfa_authselect_pkg is not failed
  tags: [enforce]

- name: RedHat | Apply authselect profile if available
  ansible.builtin.command:
    cmd: >-
      authselect select {{ pam_mfa_rhel_authselect_profile }}
      {{ pam_mfa_rhel_authselect_features | default([]) | join(' ') }} --force
  register: _pam_mfa_authselect_apply
  changed_when: _pam_mfa_authselect_apply.rc == 0
  failed_when: false
  when:
    - pam_mfa_should_configure | default(false)
    - security_mode | default('enforce') == 'enforce'
    - pam_mfa_authselect_pkg is not failed
    - pam_mfa_rhel_authselect_profile not in (_pam_mfa_authselect_current.stdout | default(''))
  tags: [enforce]
