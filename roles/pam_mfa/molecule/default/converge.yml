---
- name: Converge
  hosts: all
  become: true
  gather_facts: false
  pre_tasks:
    - name: Ensure remote tmp directory
      ansible.builtin.raw: mkdir -p /tmp/ansible-tmp
      changed_when: false
    - name: Gather facts
      ansible.builtin.setup:
    - name: Install OpenSSH server (Debian/Ubuntu)
      ansible.builtin.apt:
        name: openssh-server
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'
    - name: Install OpenSSH server (RedHat)
      ansible.builtin.dnf:
        name: openssh-server
        state: present
      when: ansible_facts['os_family'] == 'RedHat'
    - name: Create fake pam_fido2 module for auto selection
      ansible.builtin.file:
        path: /tmp/pam_fido2.so
        state: touch
        mode: "0644"
    - name: Create service accounts for MFA bypass testing
      ansible.builtin.user:
        name: "{{ item }}"
        state: present
        shell: /usr/sbin/nologin
      loop:
        - ansible
        - ci
  vars:
    pam_mfa_enabled: true
    pam_mfa_totp_enabled: true
    pam_mfa_breakglass_group: mfa-breakglass
    pam_mfa_primary_module: auto
    pam_mfa_pam_module_fido2: /tmp/pam_fido2.so
    pam_mfa_fido2_authfile: /tmp/fido2_auth
    pam_mfa_service_accounts:
      - ansible
      - ci
  roles:
    - role: pam_mfa
