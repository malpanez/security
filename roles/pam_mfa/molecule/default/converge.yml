---
- name: Converge
  hosts: all
  become: true
  gather_facts: false
  pre_tasks:
    - name: Ensure remote tmp directory
      ansible.builtin.raw: mkdir -p /tmp/ansible-tmp
      changed_when: false
    - name: Gather facts
      ansible.builtin.setup:
    - name: Install OpenSSH server (Debian/Ubuntu)
      ansible.builtin.apt:
        name: openssh-server
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'
    - name: Install OpenSSH server (RedHat)
      ansible.builtin.dnf:
        name: openssh-server
        state: present
      when: ansible_facts['os_family'] == 'RedHat'
    - name: Ensure PAM module directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /lib/security
        - /usr/lib64/security
    - name: Create fake PAM modules for MFA tests
      ansible.builtin.file:
        path: "{{ item }}"
        state: touch
        mode: "0644"
      loop:
        - /lib/security/pam_fido2.so
        - /lib/security/pam_google_authenticator.so
        - /lib/security/pam_succeed_if.so
        - /usr/lib64/security/pam_google_authenticator.so
        - /usr/lib64/security/pam_succeed_if.so
      changed_when: false
    - name: Create service accounts for MFA bypass testing
      ansible.builtin.user:
        name: "{{ item }}"
        state: present
        shell: /usr/sbin/nologin
      loop:
        - ansible
        - ci
      changed_when: false
  vars:
    pam_mfa_enabled: true
    pam_mfa_totp_enabled: true
    pam_mfa_breakglass_group: mfa-breakglass
    pam_mfa_primary_module: auto
    pam_mfa_skip_module_validation: true
    pam_mfa_use_debian13_stack: >-
      {{ ansible_facts['distribution'] == 'Debian'
         and (ansible_facts['distribution_major_version'] | int) >= 13 }}
    pam_mfa_required_users: >-
      {{ ['ansible'] if (ansible_facts['distribution'] == 'Debian'
         and (ansible_facts['distribution_major_version'] | int) >= 13) else [] }}
    pam_mfa_service_bypass_allow_from:
      - 10.0.0.0/8
    pam_mfa_pam_module_fido2: /lib/security/pam_fido2.so
    pam_mfa_pam_module_google_authenticator: /lib/security/pam_google_authenticator.so
    pam_mfa_succeed_if_module_path: /lib/security/pam_succeed_if.so
    pam_mfa_fido2_authfile: /tmp/fido2_auth
    pam_mfa_service_accounts:
      - ansible
      - ci
  roles:
    - role: pam_mfa
