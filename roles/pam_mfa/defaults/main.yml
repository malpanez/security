---
# Feature flags
pam_mfa_enabled: false
pam_mfa_breakglass_group: mfa-breakglass
pam_mfa_human_groups:
  - humans
pam_mfa_service_accounts:
  - ansible
  - ci
  - sftp
  - rsync
pam_mfa_required_group: mfa-required
pam_mfa_required_users: []

# MFA methods
pam_mfa_method_primary: yubikey
pam_mfa_method_backup: totp
pam_mfa_primary_module: auto
pam_mfa_use_debian13_stack: false
pam_mfa_enable_su: false

# PAM module paths (override per OS if needed)
pam_mfa_pam_module_u2f: /lib/security/pam_u2f.so
pam_mfa_pam_module_fido2: /lib/security/pam_fido2.so
pam_mfa_pam_module_google_authenticator: /lib/security/pam_google_authenticator.so
pam_mfa_succeed_if_module_path: /lib/security/pam_succeed_if.so
pam_mfa_service_bypass_group: mfa-bypass

# Authselect/profile names per OS family
pam_mfa_rhel_authselect_profile: minimal
pam_mfa_rhel_authselect_features: []
# Controls for backup TOTP
pam_mfa_totp_enabled: true
pam_mfa_totp_allowed_group: mfa-breakglass
pam_mfa_totp_rate_limit: true
pam_mfa_totp_rate_limit_count: 3
pam_mfa_totp_secret_base: /var/lib/pam-google-authenticator
pam_mfa_totp_secret_file: "{{ pam_mfa_totp_secret_base }}/%u/.google_authenticator"
pam_mfa_totp_allowed_perm: "0400"
pam_mfa_totp_owner: root
pam_mfa_totp_group: root

# Bypass controls for service accounts
pam_mfa_service_bypass_allow_from: []

# Lockout prevention controls (CRITICAL)
pam_mfa_enable_deadman_switch: true
pam_mfa_validation_timeout: 300  # seconds to wait for manual validation
pam_mfa_skip_module_validation: false  # Set true only for testing

# File locations
pam_mfa_u2f_keys_path: /etc/Yubico/u2f_keys
pam_mfa_fido2_authfile: /etc/fido2/authorized_fido2
pam_mfa_totp_dir: /etc/google-authenticator.d
pam_mfa_sudo_substack_name: mfa-totp
pam_mfa_enable_faillock: false
pam_mfa_faillock_profile_name: zz-local-faillock
pam_mfa_faillock_deny: 5
pam_mfa_faillock_unlock_time: 900
pam_mfa_faillock_fail_interval: 900
