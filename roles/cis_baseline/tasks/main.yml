---
- name: "Load OS-specific variables"
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

- name: "Execute CIS baseline tasks when enabled"
  when: cis_baseline_enabled | bool
  block:
    - name: "Include CIS review tasks"
      ansible.builtin.include_tasks: review.yml
      when: cis_baseline_mode == 'review'
      tags: [cis_review]

    - name: "Include CIS enforce tasks"
      ansible.builtin.include_tasks: enforce.yml
      when: cis_baseline_mode == 'enforce'
      tags: [cis_enforce]
