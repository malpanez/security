---
- name: Converge
  hosts: all
  become: true
  gather_facts: false
  pre_tasks:
    - name: Ensure remote tmp directory
      ansible.builtin.raw: mkdir -p /tmp/ansible-tmp
      changed_when: false
    - name: Install openssh-server (Debian)
      ansible.builtin.raw: apt-get install -y openssh-server
      changed_when: false
      when: ansible_os_family | default('') == 'Debian'
    - name: Install openssh-server (RedHat)
      ansible.builtin.raw: dnf install -y openssh-server
      changed_when: false
      when: ansible_os_family | default('') == 'RedHat'
    - name: Gather facts
      ansible.builtin.setup:
  vars:
    cis_baseline_enabled: true
    cis_baseline_mode: enforce
  roles:
    - role: cis_baseline
