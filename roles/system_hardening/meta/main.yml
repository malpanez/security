---
galaxy_info:
  role_name: system_hardening
  author: malpanez
  description: >-
    OS-level Linux hardening: filesystem mounts (nodev/nosuid/noexec), /proc hidepid,
    Ctrl+Alt+Del, system account lockdown, SUID/SGID audit, .rhosts removal, umask,
    GPG package verification. Drop-in approach — never rewrites existing configs.
    Composable: pairs with kernel_hardening, pam_security, selinux_enforcement, audit_logging.
    Supports Debian/Ubuntu, RHEL/Rocky/Alma, SUSE/openSUSE.
  license: Apache-2.0
  min_ansible_version: "2.16"
  platforms:
    - name: EL
      versions: [all]
    - name: Debian
      versions: [buster, bullseye, bookworm, trixie]
    - name: Ubuntu
      versions: [focal, jammy, noble]
    - name: opensuse
      versions: ["15.5", "all"]
  galaxy_tags:
    - security
    - hardening
    - linux
    - cis
    - nist
    - nis2
    - pci
    - compliance
    - mounts
    - suid
    - sysctl

dependencies: []
