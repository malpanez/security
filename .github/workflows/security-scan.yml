name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run security scans daily at 2 AM
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner (repo scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln,secret,misconfig'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      - name: Run Trivy for human-readable output
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,secret,misconfig'

  ansible-lint-security:
    name: Ansible Lint Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-lint yamllint

      - name: Run ansible-lint
        run: |
          ansible-lint --profile production

      - name: Run yamllint
        run: |
          yamllint -c .yamllint.yml .

  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate SBOM with syft
        uses: anchore/sbom-action@v0
        with:
          format: 'spdx-json'
          output-file: 'sbom.spdx.json'

      - name: Upload SBOM
        uses: actions/upload-artifact@v5
        with:
          name: sbom
          path: 'sbom.spdx.json'
          retention-days: 30

      - name: Scan SBOM with Grype
        uses: anchore/scan-action@v3
        with:
          sbom: 'sbom.spdx.json'
          severity-cutoff: 'medium'
          fail-build: false

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  ansible-security-check:
    name: Ansible Security Best Practices
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-lint ansible-core

      - name: Check for hardcoded secrets in playbooks
        run: |
          echo "Checking for hardcoded secrets..."
          ! grep -r -i "password\s*:\s*['\"]" playbooks/ roles/ || \
            (echo "WARNING: Found hardcoded passwords!" && exit 1)

      - name: Check for no_log usage
        run: |
          echo "Checking no_log usage on sensitive tasks..."
          grep -r "password" playbooks/ roles/ | grep -v "no_log: true" || true

      - name: Verify sudo/become safety
        run: |
          echo "Checking for unsafe sudo usage..."
          ! grep -r "become_user.*root" playbooks/ roles/ | grep -v "when:" || \
            (echo "WARNING: Unconditional root escalation found!" && exit 1)

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [trivy-scan, ansible-lint-security, secret-scanning, sbom-generation, codeql-analysis, ansible-security-check]
    if: always()

    steps:
      - name: Security Scan Summary
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All security scans completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Scans Performed:" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy (vulnerabilities, secrets, misconfigurations)" >> $GITHUB_STEP_SUMMARY
          echo "- Ansible Lint (production profile)" >> $GITHUB_STEP_SUMMARY
          echo "- Gitleaks (secret scanning)" >> $GITHUB_STEP_SUMMARY
          echo "- SBOM Generation (Syft + Grype)" >> $GITHUB_STEP_SUMMARY
          echo "- CodeQL (Python security)" >> $GITHUB_STEP_SUMMARY
          echo "- Ansible Security Best Practices" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed results in the Security tab." >> $GITHUB_STEP_SUMMARY
