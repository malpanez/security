name: Enterprise CI/CD Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  pull-requests: write
  checks: write
  actions: read

env:
  PYTHON_VERSION: "3.12"
  ANSIBLE_VERSION: ">=2.16"

jobs:
  # ============================================
  # STAGE 1: VALIDATION
  # ============================================
  validate-syntax:
    name: Validate Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ansible
        run: |
          pip install ansible-core${{ env.ANSIBLE_VERSION }}

      - name: Validate ansible.cfg
        run: |
          ansible-config dump -c ansible.cfg > /dev/null
          echo "✅ ansible.cfg syntax valid"

      - name: Syntax check all playbooks
        run: |
          for playbook in playbooks/*.yml; do
            echo "Checking: $(basename $playbook)"
            ansible-playbook "$playbook" --syntax-check
          done
          echo "✅ All playbooks syntax valid"

      - name: Verify required files
        run: |
          required=(
            "README.md"
            "CONTRIBUTING.md"
            "SECURITY.md"
            "LICENSE"
            "galaxy.yml"
            "ansible.cfg"
          )
          for file in "${required[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              exit 1
            fi
          done
          echo "✅ All required files present"

  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          yamllint -c .yamllint.yml . -f colored
          echo "✅ YAML lint passed"

  lint-ansible:
    name: Lint Ansible
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Install Galaxy collections
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint (production profile)
        run: |
          ansible-lint --profile production --force-color --show-relpath
          echo "✅ Ansible lint passed"

  # ============================================
  # STAGE 2: SECURITY SCANNING
  # ============================================
  scan-secrets:
    name: Scan for Secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Manual secret patterns
        run: |
          echo "Checking for hardcoded passwords..."
          if grep -r -i "password\s*:\s*['\"]" playbooks/ roles/ 2>/dev/null | grep -v "no_log\|example\|CHANGEME"; then
            echo "❌ Found potential hardcoded passwords"
            exit 1
          fi

          echo "Checking for API keys..."
          if grep -r -E "api[_-]?key\s*[:=]\s*['\"][^'\"]+['\"]" . --exclude-dir={.git,.ansible,molecule} 2>/dev/null; then
            echo "❌ Found potential API keys"
            exit 1
          fi

          echo "✅ No secrets found"

  scan-trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Run Trivy
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # 0.33.1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln,secret,misconfig'

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@5d4e8d1aca955e8d8589aabd499c5cae939e33c7 # v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      - name: Trivy summary
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # 0.33.1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # ============================================
  # STAGE 3: QUALITY CHECKS
  # ============================================
  check-security-practices:
    name: Security Best Practices
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Check weak SSH ciphers
        run: |
          if grep -r "arcfour\|3des\|des-cbc" roles/sshd_hardening/ 2>/dev/null; then
            echo "❌ Weak SSH ciphers found"
            exit 1
          fi
          echo "✅ No weak ciphers"

      - name: Check PermitRootLogin
        run: |
          if grep -r "PermitRootLogin.*yes" roles/sshd_hardening/defaults/ 2>/dev/null; then
            echo "❌ PermitRootLogin yes in defaults"
            exit 1
          fi
          echo "✅ Root login properly configured"

      - name: Check no_log usage
        run: |
          echo "Checking sensitive tasks have no_log..."
          # Count sensitive tasks without no_log (excluding comments and backups)
          COUNT=$(grep -r "password\|secret\|token" roles/ playbooks/ 2>/dev/null | \
                  grep -v "no_log: true" | \
                  grep -v "#" | \
                  grep -v "\.bak" | \
                  wc -l || echo "0")

          if [ "$COUNT" -gt 5 ]; then
            echo "⚠️ Found $COUNT potential sensitive tasks without no_log"
          else
            echo "✅ Most sensitive tasks have no_log"
          fi

  check-documentation:
    name: Documentation Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@499c1e7f3637c131334fa8e937c45144f79d72d2 # v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'

      - name: Verify README sections
        run: |
          required=("Installation" "Usage" "Examples" "Security" "Contributing" "License")
          for section in "${required[@]}"; do
            if ! grep -qi "$section" README.md; then
              echo "❌ Missing section: $section"
              exit 1
            fi
          done
          echo "✅ README complete"

      - name: Check for TODO/FIXME
        run: |
          if grep -r "TODO\|FIXME" roles/ playbooks/ --exclude-dir=molecule 2>/dev/null | head -5; then
            echo "⚠️ Found TODO/FIXME comments"
          else
            echo "✅ No TODO/FIXME"
          fi

  check-role-structure:
    name: Role Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Verify argument_specs
        run: |
          for role in roles/*/; do
            role_name=$(basename "$role")
            if [ ! -f "${role}meta/argument_specs.yml" ]; then
              echo "❌ Missing argument_specs: $role_name"
              exit 1
            fi
          done
          echo "✅ All roles have argument_specs"

      - name: Verify molecule tests
        run: |
          for role in roles/*/; do
            role_name=$(basename "$role")
            if [ ! -d "${role}molecule" ]; then
              echo "⚠️ Missing molecule tests: $role_name"
            fi
          done
          echo "✅ Molecule test check complete"

      - name: Verify variable naming
        run: |
          for role in roles/*/defaults/main.yml; do
            if [ -f "$role" ]; then
              role_name=$(basename $(dirname $(dirname "$role")))
              if grep -E "^[a-z_]+:" "$role" | grep -v "^${role_name}_" | grep -v "^#" > /dev/null 2>&1; then
                echo "⚠️ Variables in $role_name should be prefixed"
              fi
            fi
          done
          echo "✅ Variable naming check complete"

  check-version:
    name: Version Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Check semver format
        run: |
          version=$(grep "^version:" galaxy.yml | awk '{print $2}')
          if ! echo "$version" | grep -E "^[0-9]+\.[0-9]+\.[0-9]+$"; then
            echo "❌ Version doesn't follow semver: $version"
            exit 1
          fi
          echo "✅ Version $version follows semver"

  # ============================================
  # STAGE 4: TESTING
  # ============================================
  test-molecule:
    name: Molecule Test - ${{ matrix.role }}
    runs-on: ubuntu-latest
    needs: [validate-syntax, lint-yaml, lint-ansible]
    strategy:
      fail-fast: false
      matrix:
        role:
          - security_capabilities
          - sshd_hardening
          - pam_mfa
          - sudoers_baseline
          - selinux_enforcement
          - service_accounts_transfer
          - audit_logging
          - compliance_evidence
          - cis_baseline

    env:
      DOCKER_DEFAULT_PLATFORM: linux/amd64
      PYTHONUNBUFFERED: "1"
      PY_COLORS: "1"
      ANSIBLE_FORCE_COLOR: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Install Galaxy collections
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule test
        run: |
          cd roles/${{ matrix.role }}
          molecule test -s default

  test-docker-platforms:
    name: Platform Test - ${{ matrix.platform.name }}
    runs-on: ubuntu-latest
    needs: [validate-syntax, lint-yaml, lint-ansible, scan-secrets]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: "Ubuntu 22.04", image: "ubuntu:22.04", init: "/lib/systemd/systemd", pkg: "apt-get" }
          - { name: "Ubuntu 20.04", image: "ubuntu:20.04", init: "/lib/systemd/systemd", pkg: "apt-get" }
          - { name: "Debian 12", image: "debian:12", init: "/lib/systemd/systemd", pkg: "apt-get" }
          - { name: "Debian 11", image: "debian:11", init: "/lib/systemd/systemd", pkg: "apt-get" }
          - { name: "Rocky 9", image: "rockylinux:9", init: "/usr/sbin/init", pkg: "dnf" }
          - { name: "Rocky 8", image: "rockylinux:8", init: "/usr/sbin/init", pkg: "dnf" }
          - { name: "RHEL 9", image: "redhat/ubi9:latest", init: "/usr/sbin/init", pkg: "dnf" }
          - { name: "RHEL 8", image: "redhat/ubi8:latest", init: "/usr/sbin/init", pkg: "dnf" }

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ansible
        run: |
          pip install ansible-core${{ env.ANSIBLE_VERSION }}

      - name: Install Galaxy collections
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Pull Docker image
        run: docker pull ${{ matrix.platform.image }}

      - name: Start container
        run: |
          docker run -d \
            --name test-container \
            --privileged \
            --volume /sys/fs/cgroup:/sys/fs/cgroup:ro \
            --tmpfs /run \
            --tmpfs /run/lock \
            ${{ matrix.platform.image }} \
            ${{ matrix.platform.init }}
          sleep 5

      - name: Install prerequisites
        run: |
          if [ "${{ matrix.platform.pkg }}" = "apt-get" ]; then
            docker exec test-container apt-get update -qq
            docker exec test-container apt-get install -y -qq python3 sudo openssh-server systemd
          else
            docker exec test-container ${{ matrix.platform.pkg }} install -y -q python3 sudo openssh-server
          fi

      - name: Create inventory
        run: |
          mkdir -p test-inventory
          cat > test-inventory/hosts <<EOF
          [test]
          localhost ansible_connection=docker ansible_host=test-container
          EOF

      - name: Run preflight check
        continue-on-error: true
        run: |
          ansible-playbook -i test-inventory/hosts playbooks/preflight-check.yml

      - name: Run audit-only
        run: |
          ansible-playbook -i test-inventory/hosts playbooks/audit-only.yml

      - name: Run dry-run
        run: |
          ansible-playbook -i test-inventory/hosts playbooks/dry-run.yml --check --diff

      - name: Test SSH hardening
        run: |
          ansible-playbook -i test-inventory/hosts playbooks/site.yml --tags sshd_hardening

      - name: Verify SSH config
        run: |
          docker exec test-container sshd -t

      - name: Cleanup
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true

  # ============================================
  # STAGE 5: BUILD & PACKAGE
  # ============================================
  build-collection:
    name: Build Collection
    runs-on: ubuntu-latest
    needs: [test-molecule, test-docker-platforms, scan-trivy]

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ansible
        run: |
          pip install ansible-core${{ env.ANSIBLE_VERSION }}

      - name: Build collection
        run: |
          ansible-galaxy collection build

      - name: Upload artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: ansible-collection
          path: "*.tar.gz"
          retention-days: 30

  test-installation:
    name: Test Installation
    runs-on: ubuntu-latest
    needs: build-collection

    steps:
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ansible
        run: |
          pip install ansible-core${{ env.ANSIBLE_VERSION }}

      - name: Download artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: ansible-collection

      - name: Install collection
        run: |
          COLLECTION_FILE=$(ls malpanez-security-*.tar.gz)
          ansible-galaxy collection install $COLLECTION_FILE

      - name: Verify installation
        run: |
          ansible-galaxy collection list | grep malpanez.security

  # ============================================
  # STAGE 6: SUMMARY
  # ============================================
  ci-summary:
    name: CI/CD Summary
    runs-on: ubuntu-latest
    needs:
      - validate-syntax
      - lint-yaml
      - lint-ansible
      - scan-secrets
      - scan-trivy
      - check-security-practices
      - check-documentation
      - check-role-structure
      - check-version
      - test-molecule
      - test-docker-platforms
      - build-collection
      - test-installation
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# 🚀 Enterprise CI/CD Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Pipeline Stages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stage 1: Validation" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Syntax validation" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ YAML lint" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Ansible lint (production profile)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stage 2: Security" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Secret scanning (Gitleaks)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Vulnerability scanning (Trivy)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code analysis (CodeQL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stage 3: Quality" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security best practices" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Documentation quality" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Role structure" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Version validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stage 4: Testing" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Molecule tests (9 roles)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Platform tests (8 OS versions)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stage 5: Build" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Collection build" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Installation test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎯 Status: READY FOR DEPLOYMENT" >> $GITHUB_STEP_SUMMARY
