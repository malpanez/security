name: CI with UV

on:
  push:
    branches: [develop, main]
    paths:
      - "roles/**"
      - "molecule/**"
      - "playbooks/**"
      - "tasks/**"
      - "plugins/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci-uv.yml"
  pull_request:
    branches: [develop, main]
    paths:
      - "roles/**"
      - "molecule/**"
      - "playbooks/**"
      - "tasks/**"
      - "plugins/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci-uv.yml"
  workflow_dispatch:

concurrency:
  group: ci-uv-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_VERSION: "0.5.0"
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install UV
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies (dev extras)
        run: |
          uv sync --frozen --extra dev --extra lint
        if: steps.cache-venv.outputs.cache-hit != 'true'

      - name: Cache Ansible + Molecule
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.ansible
            ~/.cache/ansible
            ~/.cache/molecule
          key: ansible-molecule-${{ runner.os }}-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ansible-molecule-${{ runner.os }}-

      - name: Cache Ansible Galaxy collections
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.ansible/collections
            ~/.cache/ansible/galaxy
          key: ansible-galaxy-${{ runner.os }}-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ansible-galaxy-${{ runner.os }}-

      - name: Install Ansible Galaxy collections
        run: |
          source .venv/bin/activate
          ansible-galaxy collection install -r requirements.yml
          ansible-galaxy collection install . -p .ansible/collections

      - name: Run ansible-lint
        run: |
          source .venv/bin/activate
          ansible-lint --profile production

      - name: Run yamllint
        run: |
          source .venv/bin/activate
          yamllint -c .yamllint.yml .

      - name: Run ruff check
        run: |
          source .venv/bin/activate
          ruff check .

  test-roles:
    name: Test ${{ matrix.role }}
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 40
    env:
      MOLECULE_OPTS: --parallel
    strategy:
      fail-fast: false
      matrix:
        role:
          - security_capabilities
          - sudoers_baseline
          - selinux_enforcement
          - service_accounts_transfer
          - compliance_evidence
          - cis_baseline
          - grype_scanner
          - aide
          - ntp_hardening
          - user_audit
          - rsyslog_forwarding
          - antivirus
          - tls_hardening
          - usbguard

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install UV
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies (dev extras)
        run: |
          uv sync --frozen --extra dev
        if: steps.cache-venv.outputs.cache-hit != 'true'

      - name: Cache Ansible + Molecule
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.ansible
            ~/.cache/ansible
            ~/.cache/molecule
          key: ansible-molecule-${{ runner.os }}-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ansible-molecule-${{ runner.os }}-

      - name: Cache Ansible Galaxy collections
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.ansible/collections
            ~/.cache/ansible/galaxy
          key: ansible-galaxy-${{ runner.os }}-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ansible-galaxy-${{ runner.os }}-

      - name: Install Ansible Galaxy collections
        run: |
          source .venv/bin/activate
          ansible-galaxy collection install -r requirements.yml
          ansible-galaxy collection install . -p .ansible/collections

      - name: Run Molecule test
        run: |
          source .venv/bin/activate
          cd roles/${{ matrix.role }}
          molecule test $MOLECULE_OPTS

  test-roles-slow:
    name: Test ${{ matrix.role }} (slow)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 40
    env:
      MOLECULE_OPTS: --parallel
    strategy:
      fail-fast: false
      matrix:
        role:
          - sshd_hardening
          - pam_mfa
          - audit_logging

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install UV
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies (dev extras)
        run: |
          uv sync --frozen --extra dev
        if: steps.cache-venv.outputs.cache-hit != 'true'

      - name: Cache Ansible + Molecule
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.ansible
            ~/.cache/ansible
            ~/.cache/molecule
          key: ansible-molecule-${{ runner.os }}-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ansible-molecule-${{ runner.os }}-

      - name: Cache Ansible Galaxy collections
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.ansible/collections
            ~/.cache/ansible/galaxy
          key: ansible-galaxy-${{ runner.os }}-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ansible-galaxy-${{ runner.os }}-

      - name: Install Ansible Galaxy collections
        run: |
          source .venv/bin/activate
          ansible-galaxy collection install -r requirements.yml
          ansible-galaxy collection install . -p .ansible/collections

      - name: Run Molecule test
        run: |
          source .venv/bin/activate
          cd roles/${{ matrix.role }}
          molecule test $MOLECULE_OPTS

  build:
    name: Build Collection
    runs-on: ubuntu-latest
    needs: [test-roles, test-roles-slow]
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write       # SLSA provenance (OIDC)
      attestations: write   # build attestation

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install UV
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          cache-dependency-glob: pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen
        if: steps.cache-venv.outputs.cache-hit != 'true'

      - name: Build collection
        run: |
          source .venv/bin/activate
          ansible-galaxy collection build

      - name: Attest build provenance (SLSA)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "*.tar.gz"

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign collection tarball (keyless / sigstore)
        if: github.event_name != 'pull_request'
        run: |
          for f in *.tar.gz; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "${f}"
          done

      - name: Upload artifact (+ signatures)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: collection
          path: |
            *.tar.gz
            *.tar.gz.sig
            *.tar.gz.pem
