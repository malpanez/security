name: CI with UV

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: ci-uv-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  UV_VERSION: "0.5.0"
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Install UV
        uses: astral-sh/setup-uv@afb3baf78d56a259980b76d3fc18fe1e99d867c2 # v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies (dev extras)
        run: |
          uv sync --frozen --extra dev
        if: steps.cache-venv.outputs.cache-hit != 'true'

      - name: Cache Ansible + Molecule
        uses: actions/cache@v4
        with:
          path: |
            ~/.ansible
            ~/.cache/ansible
            ~/.cache/molecule
          key: ansible-molecule-${{ runner.os }}-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ansible-molecule-${{ runner.os }}-

      - name: Cache Ansible Galaxy collections
        uses: actions/cache@v4
        with:
          path: |
            ~/.ansible/collections
            ~/.cache/ansible/galaxy
          key: ansible-galaxy-${{ runner.os }}-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ansible-galaxy-${{ runner.os }}-

      - name: Install Ansible Galaxy collections
        run: |
          source .venv/bin/activate
          ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: |
          source .venv/bin/activate
          ansible-lint --profile production

      - name: Run yamllint
        run: |
          source .venv/bin/activate
          yamllint -c .yamllint.yml .

      - name: Run ruff check
        run: |
          source .venv/bin/activate
          ruff check .

  test-roles:
    name: Test ${{ matrix.role }}
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        role:
          - security_capabilities
          - sudoers_baseline
          - selinux_enforcement
          - service_accounts_transfer
          - compliance_evidence
          - cis_baseline

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Install UV
        uses: astral-sh/setup-uv@afb3baf78d56a259980b76d3fc18fe1e99d867c2 # v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies (dev extras)
        run: |
          uv sync --frozen --extra dev
        if: steps.cache-venv.outputs.cache-hit != 'true'

      - name: Cache Ansible + Molecule
        uses: actions/cache@v4
        with:
          path: |
            ~/.ansible
            ~/.cache/ansible
            ~/.cache/molecule
          key: ansible-molecule-${{ runner.os }}-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ansible-molecule-${{ runner.os }}-

      - name: Cache Ansible Galaxy collections
        uses: actions/cache@v4
        with:
          path: |
            ~/.ansible/collections
            ~/.cache/ansible/galaxy
          key: ansible-galaxy-${{ runner.os }}-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ansible-galaxy-${{ runner.os }}-

      - name: Install Ansible Galaxy collections
        run: |
          source .venv/bin/activate
          ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule test
        run: |
          source .venv/bin/activate
          cd roles/${{ matrix.role }}
          molecule test

  test-roles-slow:
    name: Test ${{ matrix.role }} (slow)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        role:
          - sshd_hardening
          - pam_mfa
          - audit_logging

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Install UV
        uses: astral-sh/setup-uv@afb3baf78d56a259980b76d3fc18fe1e99d867c2 # v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies (dev extras)
        run: |
          uv sync --frozen --extra dev
        if: steps.cache-venv.outputs.cache-hit != 'true'

      - name: Cache Ansible + Molecule
        uses: actions/cache@v4
        with:
          path: |
            ~/.ansible
            ~/.cache/ansible
            ~/.cache/molecule
          key: ansible-molecule-${{ runner.os }}-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ansible-molecule-${{ runner.os }}-

      - name: Cache Ansible Galaxy collections
        uses: actions/cache@v4
        with:
          path: |
            ~/.ansible/collections
            ~/.cache/ansible/galaxy
          key: ansible-galaxy-${{ runner.os }}-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ansible-galaxy-${{ runner.os }}-

      - name: Install Ansible Galaxy collections
        run: |
          source .venv/bin/activate
          ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule test
        run: |
          source .venv/bin/activate
          cd roles/${{ matrix.role }}
          molecule test

  build:
    name: Build Collection
    runs-on: ubuntu-latest
    needs: [test-roles, test-roles-slow]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Install UV
        uses: astral-sh/setup-uv@afb3baf78d56a259980b76d3fc18fe1e99d867c2 # v7
        with:
          version: ${{ env.UV_VERSION }}
          cache-dependency-glob: pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen
        if: steps.cache-venv.outputs.cache-hit != 'true'

      - name: Build collection
        run: |
          source .venv/bin/activate
          ansible-galaxy collection build

      - name: Upload artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: collection
          path: "*.tar.gz"
