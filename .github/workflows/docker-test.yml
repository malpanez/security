name: Docker Platform Testing

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  test-platforms:
    name: Test on ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: "Ubuntu 22.04"
            image: "geerlingguy/docker-ubuntu2204-ansible:latest"
            init: "/lib/systemd/systemd"
          - name: "Ubuntu 20.04"
            image: "geerlingguy/docker-ubuntu2004-ansible:latest"
            init: "/lib/systemd/systemd"
          - name: "Debian 13"
            image: "geerlingguy/docker-debian13-ansible:latest"
            init: "/lib/systemd/systemd"
          - name: "Debian 12"
            image: "geerlingguy/docker-debian12-ansible:latest"
            init: "/lib/systemd/systemd"
          - name: "Debian 11"
            image: "geerlingguy/docker-debian11-ansible:latest"
            init: "/lib/systemd/systemd"
          - name: "Rocky Linux 9"
            image: "geerlingguy/docker-rockylinux9-ansible:latest"
            init: "/lib/systemd/systemd"
          - name: "Rocky Linux 8"
            image: "geerlingguy/docker-rockylinux8-ansible:latest"
            init: "/lib/systemd/systemd"
          - name: "CentOS 7"
            image: "geerlingguy/docker-centos7-ansible:latest"
            init: "/usr/lib/systemd/systemd"

    env:
      DOCKER_DEFAULT_PLATFORM: linux/amd64
      PYTHONUNBUFFERED: "1"
      PY_COLORS: "1"
      ANSIBLE_FORCE_COLOR: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Ansible and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Create test inventory
        run: |
          mkdir -p test-inventory
          cat > test-inventory/hosts <<EOF
          [test]
          localhost ansible_connection=local
          EOF

      - name: Pull Docker image
        run: docker pull ${{ matrix.platform.image }}

      - name: Start Docker container
        run: |
          docker run -d \
            --name test-container \
            --privileged \
            --volume /sys/fs/cgroup:/sys/fs/cgroup:ro \
            --tmpfs /run \
            --tmpfs /run/lock \
            ${{ matrix.platform.image }} \
            ${{ matrix.platform.init }}

          # Wait for systemd to be ready
          sleep 5

      - name: Install required packages in container
        run: |
          if [[ "${{ matrix.platform.image }}" =~ "ubuntu" ]] || [[ "${{ matrix.platform.image }}" =~ "debian" ]]; then
            docker exec test-container apt-get update
            docker exec test-container apt-get install -y python3 sudo openssh-server
          else
            docker exec test-container dnf install -y python3 sudo openssh-server
          fi

      - name: Run preflight-check playbook
        run: |
          ansible-playbook -i test-inventory/hosts \
            playbooks/preflight-check.yml \
            --connection=docker \
            --extra-vars "ansible_host=test-container" \
            || echo "Preflight check completed with warnings (expected in Docker)"
        continue-on-error: true

      - name: Run audit-only playbook (review mode)
        run: |
          ansible-playbook -i test-inventory/hosts \
            playbooks/audit-only.yml \
            --connection=docker \
            --extra-vars "ansible_host=test-container"

      - name: Run dry-run playbook (check mode)
        run: |
          ansible-playbook -i test-inventory/hosts \
            playbooks/dry-run.yml \
            --connection=docker \
            --extra-vars "ansible_host=test-container" \
            --check --diff

      - name: Test SSH hardening role
        run: |
          ansible-playbook -i test-inventory/hosts \
            -e '{"ansible_connection": "docker", "ansible_host": "test-container"}' \
            --tags sshd_hardening \
            playbooks/site.yml

      - name: Cleanup
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true

  test-compliance-report:
    name: Test Compliance Report Generation
    runs-on: ubuntu-latest
    needs: test-platforms

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Create test inventory
        run: |
          mkdir -p test-inventory
          cat > test-inventory/hosts <<EOF
          [test]
          localhost ansible_connection=local
          EOF

      - name: Generate compliance report (dry-run)
        run: |
          ansible-playbook -i test-inventory/hosts \
            playbooks/generate-compliance-report.yml \
            --check \
            || echo "Compliance report generation tested"
        continue-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: compliance-test-output
          path: /tmp/compliance-reports/
          retention-days: 7
          if-no-files-found: ignore

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # 0.33.1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@c37a8b7cd97e31de3fcbd9d84c401870edeb8d34 # v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
