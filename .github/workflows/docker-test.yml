name: Docker Platform Testing

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  test-platforms:
    name: Test on ${{ matrix.platform.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: "Ubuntu 22.04"
            image: "geerlingguy/docker-ubuntu2204-ansible@sha256:2744f5aca5e33c01a682ff1ea201dc3841b0eaaa1f5c448e6bd9a6156a831638"
            init: "/lib/systemd/systemd"
          - name: "Ubuntu 20.04"
            image: "geerlingguy/docker-ubuntu2004-ansible@sha256:532fb09e9f152e9f85ae348befa9ef09a9d0d23ca6c3361714d041f5a998c826"
            init: "/lib/systemd/systemd"
          - name: "Debian 13"
            image: "geerlingguy/docker-debian13-ansible@sha256:afb2e84b6787fb89c687c8df557ebf465cc9ef2302aed4324bc6c7f3c65f07b5"
            init: "/lib/systemd/systemd"
          - name: "Debian 12"
            image: "geerlingguy/docker-debian12-ansible@sha256:f69527a18970386befd62a36f68d5c39422a7ad15e4005133670566dd3b0da7f"
            init: "/lib/systemd/systemd"
          - name: "Debian 11"
            image: "geerlingguy/docker-debian11-ansible@sha256:877c2660bfe9921190f975cc750987c0905300f54bd4879af2697ba12436153b"
            init: "/lib/systemd/systemd"
          - name: "Rocky Linux 9"
            image: "geerlingguy/docker-rockylinux9-ansible@sha256:09c1074489a704687b2b1f3d16a4f537b211b49b64eb7a5b6e4d6d1eae5b8ba9"
            init: "/lib/systemd/systemd"
          - name: "Rocky Linux 8"
            image: "geerlingguy/docker-rockylinux8-ansible@sha256:4ec20ce51385c96a566c4141430ae2254f57c822e9e472abe70123987591f456"
            init: "/lib/systemd/systemd"

    env:
      DOCKER_DEFAULT_PLATFORM: linux/amd64
      PYTHONUNBUFFERED: "1"
      PY_COLORS: "1"
      ANSIBLE_FORCE_COLOR: "1"
      ANSIBLE_CONFIG: ansible.cfg
      ANSIBLE_STDOUT_CALLBACK: default
      ANSIBLE_RESULT_FORMAT: yaml

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Ansible and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Create test inventory
        run: |
          mkdir -p test-inventory
          cat > test-inventory/hosts <<EOF
          [test]
          localhost ansible_connection=local
          EOF

      - name: Pull Docker image
        run: docker pull ${{ matrix.platform.image }}

      - name: Start Docker container
        run: |
          docker run -d \
            --name test-container \
            --privileged \
            --cgroupns=host \
            --volume /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --tmpfs /run \
            --tmpfs /run/lock \
            --tmpfs /tmp \
            ${{ matrix.platform.image }} \
            ${{ matrix.platform.init }}

          # Wait for systemd to be ready
          for i in $(seq 1 10); do
            if docker ps --format '{{.Names}}' | grep -qx test-container; then
              break
            fi
            docker logs test-container || true
            sleep 2
          done

          if ! docker ps --format '{{.Names}}' | grep -qx test-container; then
            echo "Container failed to stay running"
            docker logs test-container || true
            exit 1
          fi

      - name: Install required packages in container
        run: |
          # Fix nsswitch.conf to prevent PAM/sudo failures in RHEL-family containers
          # (Rocky/RHEL containers have 'sss' in nsswitch.conf but sssd is not running)
          # Handle both "sss files" and "files sss" patterns
          docker exec test-container bash -c \
            "sed -i 's/sss //g; s/ sss//g' /etc/nsswitch.conf 2>/dev/null || true"
          if [[ "${{ matrix.platform.image }}" =~ "debian" ]]; then
            docker exec test-container bash -lc 'apt-get update -o Acquire::AllowInsecureRepositories=true -o Acquire::AllowDowngradeToInsecureRepositories=true'
            docker exec test-container bash -lc 'apt-get install -y --no-install-recommends --allow-unauthenticated debian-archive-keyring gnupg ca-certificates'
            docker exec test-container bash -lc 'apt-get update'
            docker exec test-container apt-get install -y python3 sudo openssh-server
          elif [[ "${{ matrix.platform.image }}" =~ "ubuntu" ]]; then
            docker exec test-container apt-get update
            docker exec test-container apt-get install -y python3 sudo openssh-server
          else
            docker exec test-container dnf install -y python3 sudo openssh-server
          fi

      - name: Run preflight-check playbook
        run: |
          ansible-playbook -i test-inventory/hosts \
            playbooks/preflight-check.yml \
            --connection=docker \
            --extra-vars "ansible_host=test-container ansible_python_interpreter=/usr/bin/python3" \
            || echo "Preflight check completed with warnings (expected in Docker)"
        continue-on-error: true

      - name: Run audit-only playbook (review mode)
        run: |
          ansible-playbook -i test-inventory/hosts \
            playbooks/audit-only.yml \
            --connection=docker \
            --extra-vars "ansible_host=test-container ansible_python_interpreter=/usr/bin/python3"

      - name: Run dry-run playbook (check mode)
        run: |
          ansible-playbook -i test-inventory/hosts \
            playbooks/dry-run.yml \
            --connection=docker \
            --extra-vars "ansible_host=test-container ansible_python_interpreter=/usr/bin/python3" \
            --check --diff

      - name: Test SSH hardening role
        run: |
          ansible-playbook -i test-inventory/hosts \
            -e '{"ansible_connection": "docker", "ansible_host": "test-container", "ansible_python_interpreter": "/usr/bin/python3"}' \
            --tags sshd_hardening \
            playbooks/site.yml

      - name: Cleanup
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true

  test-compliance-report:
    name: Test Compliance Report Generation
    runs-on: ubuntu-latest
    needs: test-platforms

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Create test inventory
        run: |
          mkdir -p test-inventory
          cat > test-inventory/hosts <<EOF
          [test]
          localhost ansible_connection=local
          EOF

      - name: Generate compliance report (dry-run)
        run: |
          ansible-playbook -i test-inventory/hosts \
            playbooks/generate-compliance-report.yml \
            --check \
            || echo "Compliance report generation tested"
        continue-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: compliance-test-output
          path: /tmp/compliance-reports/
          retention-days: 7
          if-no-files-found: ignore

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
