name: Docker Platform Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-platforms:
    name: Test on ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: "RHEL 9"
            image: "redhat/ubi9:latest"
            init: "/usr/sbin/init"
          - name: "RHEL 8"
            image: "redhat/ubi8:latest"
            init: "/usr/sbin/init"
          - name: "Rocky Linux 9"
            image: "rockylinux:9"
            init: "/usr/sbin/init"
          - name: "Rocky Linux 8"
            image: "rockylinux:8"
            init: "/usr/sbin/init"
          - name: "Ubuntu 22.04"
            image: "ubuntu:22.04"
            init: "/lib/systemd/systemd"
          - name: "Ubuntu 20.04"
            image: "ubuntu:20.04"
            init: "/lib/systemd/systemd"
          - name: "Debian 12"
            image: "debian:12"
            init: "/lib/systemd/systemd"
          - name: "Debian 11"
            image: "debian:11"
            init: "/lib/systemd/systemd"

    env:
      DOCKER_DEFAULT_PLATFORM: linux/amd64
      PYTHONUNBUFFERED: "1"
      PY_COLORS: "1"
      ANSIBLE_FORCE_COLOR: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Create test inventory
        run: |
          mkdir -p test-inventory
          cat > test-inventory/hosts <<EOF
          [test]
          localhost ansible_connection=local
          EOF

      - name: Pull Docker image
        run: docker pull ${{ matrix.platform.image }}

      - name: Start Docker container
        run: |
          docker run -d \
            --name test-container \
            --privileged \
            --volume /sys/fs/cgroup:/sys/fs/cgroup:ro \
            --tmpfs /run \
            --tmpfs /run/lock \
            ${{ matrix.platform.image }} \
            ${{ matrix.platform.init }}

          # Wait for systemd to be ready
          sleep 5

      - name: Install required packages in container
        run: |
          if [[ "${{ matrix.platform.image }}" =~ "ubuntu" ]] || [[ "${{ matrix.platform.image }}" =~ "debian" ]]; then
            docker exec test-container apt-get update
            docker exec test-container apt-get install -y python3 sudo openssh-server systemd
          else
            docker exec test-container dnf install -y python3 sudo openssh-server
          fi

      - name: Run preflight-check playbook
        run: |
          ansible-playbook -i test-inventory/hosts \
            playbooks/preflight-check.yml \
            --connection=docker \
            --extra-vars "ansible_host=test-container" \
            || echo "Preflight check completed with warnings (expected in Docker)"
        continue-on-error: true

      - name: Run audit-only playbook (review mode)
        run: |
          ansible-playbook -i test-inventory/hosts \
            playbooks/audit-only.yml \
            --connection=docker \
            --extra-vars "ansible_host=test-container"

      - name: Run dry-run playbook (check mode)
        run: |
          ansible-playbook -i test-inventory/hosts \
            playbooks/dry-run.yml \
            --connection=docker \
            --extra-vars "ansible_host=test-container" \
            --check --diff

      - name: Test SSH hardening role
        run: |
          ansible-playbook -i test-inventory/hosts \
            -e '{"ansible_connection": "docker", "ansible_host": "test-container"}' \
            --tags sshd_hardening \
            playbooks/site.yml

      - name: Cleanup
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true

  test-compliance-report:
    name: Test Compliance Report Generation
    runs-on: ubuntu-latest
    needs: test-platforms

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Create test inventory
        run: |
          mkdir -p test-inventory
          cat > test-inventory/hosts <<EOF
          [test]
          localhost ansible_connection=local
          EOF

      - name: Generate compliance report (dry-run)
        run: |
          ansible-playbook -i test-inventory/hosts \
            playbooks/generate-compliance-report.yml \
            --check \
            || echo "Compliance report generation tested"
        continue-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-test-output
          path: /tmp/compliance-reports/
          retention-days: 7
          if-no-files-found: ignore

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
