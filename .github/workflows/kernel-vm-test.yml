name: Kernel, System, and Audit Hardening - VM Tests

# Containers cannot test kernel sysctl enforcement, real /proc hidepid,
# auditd service state, or module blacklists. This workflow runs directly on GitHub-hosted
# Ubuntu VMs (real kernel, real systemd, no privilege restrictions).

on:
  push:
    branches: [develop]
    paths:
      - "roles/kernel_hardening/**"
      - "roles/system_hardening/**"
      - "roles/audit_logging/**"
      - "playbooks/kernel-vm-test.yml"
      - ".github/workflows/kernel-vm-test.yml"
  pull_request:
    branches: [develop]
    paths:
      - "roles/kernel_hardening/**"
      - "roles/system_hardening/**"
      - "roles/audit_logging/**"
      - "playbooks/kernel-vm-test.yml"
      - ".github/workflows/kernel-vm-test.yml"
  workflow_dispatch:
  schedule:
    # Weekly Sunday 03:00 UTC — detect kernel/distro regressions early
    - cron: "0 3 * * 0"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  kernel-vm:
    name: "Kernel hardening on ${{ matrix.runner }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-20.04

    env:
      PYTHONUNBUFFERED: "1"
      PY_COLORS: "1"
      ANSIBLE_FORCE_COLOR: "1"
      ANSIBLE_CONFIG: ansible.cfg
      ANSIBLE_STDOUT_CALLBACK: default
      ANSIBLE_RESULT_FORMAT: yaml

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Ansible and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Ansible Galaxy collections
        run: |
          ansible-galaxy collection install -r requirements.yml
          ansible-galaxy collection install . -p .ansible/collections
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections

      - name: Show kernel and OS info
        run: |
          uname -r
          cat /etc/os-release
          python3 --version

      - name: Create local inventory
        run: |
          mkdir -p test-inventory
          cat > test-inventory/hosts << 'EOF'
          [local]
          localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3
          EOF

      # ── kernel_hardening ───────────────────────────────────────────────────

      - name: "Enforce kernel_hardening (sysctl + module blacklists)"
        run: |
          ansible-playbook -i test-inventory/hosts \
            -e "kernel_hardening_enabled=true" \
            -e "security_mode=enforce" \
            -e "ansible_python_interpreter=/usr/bin/python3" \
            playbooks/kernel-vm-test.yml \
            --tags kernel_hardening
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections

      - name: "Verify sysctl values actually applied to kernel"
        run: |
          set -euo pipefail
          FAIL=0

          check_sysctl() {
            local param="$1"
            local expected="$2"
            local actual
            actual=$(sysctl -n "$param" 2>/dev/null || echo "MISSING")
            if [ "$actual" != "$expected" ]; then
              echo "FAIL: $param = $actual (expected $expected)"
              FAIL=1
            else
              echo "OK:   $param = $actual"
            fi
          }

          # CIS 1.5.3 — ASLR full randomization
          check_sysctl kernel.randomize_va_space 2
          # CIS 3.2.1 — no IP source routing
          check_sysctl net.ipv4.conf.all.accept_source_route 0
          # CIS 3.2.2 — no ICMP redirects accepted
          check_sysctl net.ipv4.conf.all.accept_redirects 0
          # CIS 3.3.1 — no redirects sent
          check_sysctl net.ipv4.conf.all.send_redirects 0
          # CIS 3.2.8 — log martian packets
          check_sysctl net.ipv4.conf.all.log_martians 1
          # CIS 3.3.8 — SYN cookies
          check_sysctl net.ipv4.tcp_syncookies 1
          # Prevent core dumps from SUID binaries
          check_sysctl fs.suid_dumpable 0
          # Protect hardlinks and symlinks
          check_sysctl fs.protected_hardlinks 1
          check_sysctl fs.protected_symlinks 1
          # Restrict dmesg to root
          check_sysctl kernel.dmesg_restrict 1
          # Hide kernel pointers
          check_sysctl kernel.kptr_restrict 2
          # Restrict ptrace to parent process
          check_sysctl kernel.yama.ptrace_scope 1

          [ $FAIL -eq 0 ] || exit 1

      - name: "Verify modprobe blacklist file deployed"
        run: |
          set -euo pipefail
          BLACKLIST=/etc/modprobe.d/99-security-disabled.conf
          [ -f "$BLACKLIST" ] || { echo "FAIL: $BLACKLIST not found"; exit 1; }
          echo "OK: blacklist file present"
          # Verify key modules are blacklisted
          for mod in dccp sctp rds tipc cramfs jffs2 hfs hfsplus udf; do
            if grep -q "blacklist $mod" "$BLACKLIST"; then
              echo "OK:   blacklist $mod"
            else
              echo "FAIL: blacklist $mod not found in $BLACKLIST"
              exit 1
            fi
          done

      - name: "Verify sysctl drop-in file deployed"
        run: |
          set -euo pipefail
          SYSCTL=/etc/sysctl.d/99-security.conf
          [ -f "$SYSCTL" ] || { echo "FAIL: $SYSCTL not found"; exit 1; }
          PERMS=$(stat -c '%a' "$SYSCTL")
          [ "$PERMS" = "640" ] || { echo "FAIL: $SYSCTL perms $PERMS (expected 640)"; exit 1; }
          echo "OK: $SYSCTL present with mode $PERMS"

      - name: "Idempotency check — kernel_hardening second run must have 0 changes"
        run: |
          set -euo pipefail
          OUTPUT=$(ansible-playbook -i test-inventory/hosts \
            -e "kernel_hardening_enabled=true" \
            -e "security_mode=enforce" \
            -e "ansible_python_interpreter=/usr/bin/python3" \
            playbooks/kernel-vm-test.yml \
            --tags kernel_hardening 2>&1)
          echo "$OUTPUT"
          # Extract changed count from play recap
          CHANGED=$(echo "$OUTPUT" | grep -oP 'changed=\K[0-9]+' | paste -sd+ | bc 2>/dev/null || echo "0")
          echo "Total changed tasks in second run: $CHANGED"
          if [ "${CHANGED:-0}" -gt 0 ]; then
            echo "IDEMPOTENCY VIOLATION: $CHANGED task(s) changed on second run"
            exit 1
          fi
          echo "OK: idempotency confirmed"
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections

      # ── system_hardening ───────────────────────────────────────────────────

      - name: "Enforce system_hardening (hidepid, ctrlaltdel, accounts)"
        run: |
          ansible-playbook -i test-inventory/hosts \
            -e "system_hardening_enabled=true" \
            -e "security_mode=enforce" \
            -e "ansible_python_interpreter=/usr/bin/python3" \
            -e "system_hardening_suid_remove_unlisted=false" \
            playbooks/kernel-vm-test.yml \
            --tags system_hardening
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections

      - name: "Verify Ctrl+Alt+Del is masked"
        run: |
          set -euo pipefail
          STATUS=$(systemctl is-active ctrl-alt-del.target 2>&1 || true)
          MASKED=$(systemctl show ctrl-alt-del.target --property=LoadState --value 2>/dev/null || echo "unknown")
          echo "ctrl-alt-del.target status: $STATUS / LoadState: $MASKED"
          if [ "$MASKED" != "masked" ]; then
            echo "FAIL: ctrl-alt-del.target is not masked (LoadState=$MASKED)"
            exit 1
          fi
          echo "OK: ctrl-alt-del.target masked"

      - name: "Verify /proc hidepid applied (or correctly skipped)"
        run: |
          set -euo pipefail
          # In GH Actions VMs hidepid should actually work
          HIDEPID=$(findmnt -n -o OPTIONS /proc 2>/dev/null | grep -oP 'hidepid=\K[0-9]' || echo "not set")
          echo "/proc hidepid: $HIDEPID"
          # It's OK if hidepid is set to 2 (expected) or if remount was skipped
          # (systemd unit will enforce on next boot via fstab drop-in)
          echo "OK: hidepid status verified (value=$HIDEPID)"

      - name: "Verify system account shells are locked"
        run: |
          set -euo pipefail
          FAIL=0
          # Check that no system account (UID < 1000, not root/sync/shutdown/halt)
          # has an interactive shell
          INTERACTIVE_SHELLS="/bin/bash /bin/sh /bin/zsh /bin/fish /usr/bin/bash /usr/bin/zsh"
          while IFS=: read -r user _ uid _ _ _ shell; do
            if [ "$uid" -lt 1000 ] && [ "$uid" -gt 0 ]; then
              for ish in $INTERACTIVE_SHELLS; do
                if [ "$shell" = "$ish" ]; then
                  echo "WARN: System account $user (uid=$uid) has interactive shell $shell"
                fi
              done
            fi
          done < /etc/passwd
          echo "OK: system account shell audit complete"

      - name: "Idempotency check — system_hardening second run must have 0 changes"
        run: |
          set -euo pipefail
          OUTPUT=$(ansible-playbook -i test-inventory/hosts \
            -e "system_hardening_enabled=true" \
            -e "security_mode=enforce" \
            -e "ansible_python_interpreter=/usr/bin/python3" \
            -e "system_hardening_suid_remove_unlisted=false" \
            playbooks/kernel-vm-test.yml \
            --tags system_hardening 2>&1)
          echo "$OUTPUT"
          CHANGED=$(echo "$OUTPUT" | grep -oP 'changed=\K[0-9]+' | paste -sd+ | bc 2>/dev/null || echo "0")
          echo "Total changed tasks in second run: $CHANGED"
          if [ "${CHANGED:-0}" -gt 0 ]; then
            echo "IDEMPOTENCY VIOLATION: $CHANGED task(s) changed on second run"
            exit 1
          fi
          echo "OK: idempotency confirmed"
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections

      # ── audit_logging ─────────────────────────────────────────────────────

      - name: "Enforce audit_logging (auditd + audit rules)"
        run: |
          ansible-playbook -i test-inventory/hosts \
            -e "audit_logging_enabled=true" \
            -e "security_mode=enforce" \
            -e "ansible_python_interpreter=/usr/bin/python3" \
            playbooks/kernel-vm-test.yml \
            --tags audit_logging
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections

      - name: "Verify auditd service and rules on Ubuntu VM"
        run: |
          set -euo pipefail
          RULES=/etc/audit/rules.d/99-security.rules
          GENERATED_RULES=/etc/audit/audit.rules
          HAVE_SSHD_CONFIG=0

          [ -f /etc/ssh/sshd_config ] && HAVE_SSHD_CONFIG=1

          systemctl is-active --quiet auditd || { echo "FAIL: auditd is not active"; exit 1; }
          systemctl is-enabled --quiet auditd || { echo "FAIL: auditd is not enabled"; exit 1; }

          if [ -f "$RULES" ]; then
            PERMS=$(stat -c '%a' "$RULES")
            [ "$PERMS" = "640" ] || { echo "FAIL: $RULES perms $PERMS (expected 640)"; exit 1; }

            if [ "$HAVE_SSHD_CONFIG" -eq 1 ]; then
              grep -Fq -- "-w /etc/ssh/sshd_config -p wa -k sshd_config" "$RULES" || \
                { echo "FAIL: sshd_config audit rule missing from $RULES"; exit 1; }
            fi
            grep -Fq -- "-w /etc/sudoers -p wa -k sudoers" "$RULES" || \
              { echo "FAIL: sudoers audit rule missing from $RULES"; exit 1; }
          elif [ -f "$GENERATED_RULES" ]; then
            echo "INFO: $RULES not present; using generated rules file $GENERATED_RULES"
            if [ "$HAVE_SSHD_CONFIG" -eq 1 ]; then
              grep -Fq -- "-w /etc/ssh/sshd_config -p wa -k sshd_config" "$GENERATED_RULES" || \
                { echo "FAIL: sshd_config audit rule missing from $GENERATED_RULES"; exit 1; }
            fi
            grep -Fq -- "-w /etc/sudoers -p wa -k sudoers" "$GENERATED_RULES" || \
              { echo "FAIL: sudoers audit rule missing from $GENERATED_RULES"; exit 1; }
          else
            echo "INFO: no persistent audit rules file found; validating loaded kernel rules only"
          fi

          OUTPUT=$(sudo auditctl -l)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -Fq -- "-S execve" || \
            { echo "FAIL: execve audit syscall rule not loaded"; exit 1; }

          echo "OK: auditd active and audit rules loaded"

      - name: "Idempotency check — audit_logging second run must have 0 changes"
        run: |
          set -euo pipefail
          OUTPUT=$(ansible-playbook -i test-inventory/hosts \
            -e "audit_logging_enabled=true" \
            -e "security_mode=enforce" \
            -e "ansible_python_interpreter=/usr/bin/python3" \
            playbooks/kernel-vm-test.yml \
            --tags audit_logging 2>&1)
          echo "$OUTPUT"
          CHANGED=$(echo "$OUTPUT" | grep -oP 'changed=\K[0-9]+' | paste -sd+ | bc 2>/dev/null || echo "0")
          echo "Total changed tasks in second run: $CHANGED"
          if [ "${CHANGED:-0}" -gt 0 ]; then
            echo "IDEMPOTENCY VIOLATION: $CHANGED task(s) changed on second run"
            exit 1
          fi
          echo "OK: idempotency confirmed"
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections

  # ── Rocky Linux 9 (RHEL-compatible) — docker container on Ubuntu host ────
  # sysctl params land on the host kernel (privileged); we verify inside the
  # container so the Rocky Linux OS paths and dnf package layout are exercised.

  rocky-container:
    name: "Kernel hardening on Rocky Linux 9 (RHEL-compatible)"
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: "1"
      PY_COLORS: "1"
      ANSIBLE_FORCE_COLOR: "1"
      ANSIBLE_CONFIG: ansible.cfg
      ANSIBLE_STDOUT_CALLBACK: default
      ANSIBLE_RESULT_FORMAT: yaml
      CONTAINER: rocky9-hardening

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Ansible and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Ansible Galaxy collections
        run: |
          ansible-galaxy collection install -r requirements.yml
          ansible-galaxy collection install . -p .ansible/collections
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections

      - name: Start Rocky Linux 9 container
        run: |
          docker run -d \
            --name "$CONTAINER" \
            --privileged \
            --cgroupns host \
            --tmpfs /run \
            --tmpfs /run/lock \
            --tmpfs /tmp \
            --volume /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --platform linux/amd64 \
            geerlingguy/docker-rockylinux9-ansible:latest \
            /lib/systemd/systemd
          # Wait for systemd to be ready
          sleep 5
          docker exec "$CONTAINER" systemctl is-system-running --wait || true

      - name: Prepare container (nsswitch, python3)
        run: |
          # Remove sssd entries that break PAM in containers without sssd running
          docker exec "$CONTAINER" bash -c \
            "sed -i 's/sss //g; s/ sss//g' /etc/nsswitch.conf 2>/dev/null || true"
          # Ensure python3 resolves to a modern interpreter
          docker exec "$CONTAINER" bash -c \
            "python3 --version 2>/dev/null || dnf install -y python3"

      - name: Create docker inventory
        run: |
          mkdir -p test-inventory
          cat > test-inventory/hosts << EOF
          [rocky]
          $CONTAINER ansible_connection=docker ansible_python_interpreter=/usr/bin/python3 ansible_become=false
          EOF

      # ── kernel_hardening ─────────────────────────────────────────────────

      - name: "Enforce kernel_hardening on Rocky Linux 9"
        run: |
          ansible-playbook -i test-inventory/hosts \
            -e "kernel_hardening_enabled=true" \
            -e "security_mode=enforce" \
            -e "ansible_python_interpreter=/usr/bin/python3" \
            playbooks/kernel-vm-test.yml \
            --tags kernel_hardening
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections

      - name: "Verify sysctl values applied (Rocky Linux 9)"
        run: |
          set -euo pipefail
          FAIL=0
          check_sysctl() {
            local param="$1" expected="$2" actual
            actual=$(docker exec "$CONTAINER" sysctl -n "$param" 2>/dev/null || echo "MISSING")
            if [ "$actual" != "$expected" ]; then
              echo "FAIL: $param = $actual (expected $expected)"
              FAIL=1
            else
              echo "OK:   $param = $actual"
            fi
          }
          check_sysctl kernel.randomize_va_space 2
          check_sysctl net.ipv4.conf.all.accept_source_route 0
          check_sysctl net.ipv4.conf.all.accept_redirects 0
          check_sysctl net.ipv4.conf.all.send_redirects 0
          check_sysctl net.ipv4.conf.all.log_martians 1
          check_sysctl net.ipv4.tcp_syncookies 1
          check_sysctl fs.suid_dumpable 0
          check_sysctl fs.protected_hardlinks 1
          check_sysctl fs.protected_symlinks 1
          check_sysctl kernel.dmesg_restrict 1
          check_sysctl kernel.kptr_restrict 2
          check_sysctl kernel.yama.ptrace_scope 1
          [ $FAIL -eq 0 ] || exit 1

      - name: "Verify modprobe blacklist deployed (Rocky Linux 9)"
        run: |
          set -euo pipefail
          BLACKLIST=/etc/modprobe.d/99-security-disabled.conf
          docker exec "$CONTAINER" test -f "$BLACKLIST" || \
            { echo "FAIL: $BLACKLIST not found"; exit 1; }
          for mod in dccp sctp rds tipc cramfs jffs2 hfs hfsplus udf; do
            docker exec "$CONTAINER" grep -q "blacklist $mod" "$BLACKLIST" || \
              { echo "FAIL: blacklist $mod missing"; exit 1; }
            echo "OK:   blacklist $mod"
          done

      - name: "Idempotency check — kernel_hardening on Rocky Linux 9"
        run: |
          set -euo pipefail
          OUTPUT=$(ansible-playbook -i test-inventory/hosts \
            -e "kernel_hardening_enabled=true" \
            -e "security_mode=enforce" \
            -e "ansible_python_interpreter=/usr/bin/python3" \
            playbooks/kernel-vm-test.yml \
            --tags kernel_hardening 2>&1)
          echo "$OUTPUT"
          CHANGED=$(echo "$OUTPUT" | grep -oP 'changed=\K[0-9]+' | paste -sd+ | bc 2>/dev/null || echo "0")
          echo "Total changed: $CHANGED"
          [ "${CHANGED:-0}" -eq 0 ] || { echo "IDEMPOTENCY VIOLATION: $CHANGED changed"; exit 1; }
          echo "OK: idempotency confirmed"
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections

      # ── system_hardening ─────────────────────────────────────────────────

      - name: "Enforce system_hardening on Rocky Linux 9"
        run: |
          ansible-playbook -i test-inventory/hosts \
            -e "system_hardening_enabled=true" \
            -e "security_mode=enforce" \
            -e "ansible_python_interpreter=/usr/bin/python3" \
            -e "system_hardening_suid_remove_unlisted=false" \
            playbooks/kernel-vm-test.yml \
            --tags system_hardening
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections

      - name: "Observe Ctrl+Alt+Del state (Rocky Linux 9 container)"
        run: |
          set -euo pipefail
          MASKED=$(docker exec "$CONTAINER" \
            systemctl show ctrl-alt-del.target --property=LoadState --value 2>/dev/null || echo "unknown")
          echo "ctrl-alt-del.target LoadState: $MASKED"
          if [ "$MASKED" = "masked" ]; then
            echo "OK: ctrl-alt-del.target masked"
          else
            echo "INFO: ctrl-alt-del.target not masked in container context ($MASKED)"
          fi

      - name: "Idempotency check — system_hardening on Rocky Linux 9"
        run: |
          set -euo pipefail
          OUTPUT=$(ansible-playbook -i test-inventory/hosts \
            -e "system_hardening_enabled=true" \
            -e "security_mode=enforce" \
            -e "ansible_python_interpreter=/usr/bin/python3" \
            -e "system_hardening_suid_remove_unlisted=false" \
            playbooks/kernel-vm-test.yml \
            --tags system_hardening 2>&1)
          echo "$OUTPUT"
          CHANGED=$(echo "$OUTPUT" | grep -oP 'changed=\K[0-9]+' | paste -sd+ | bc 2>/dev/null || echo "0")
          echo "Total changed: $CHANGED"
          [ "${CHANGED:-0}" -eq 0 ] || { echo "IDEMPOTENCY VIOLATION: $CHANGED changed"; exit 1; }
          echo "OK: idempotency confirmed"
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections

      - name: Stop Rocky Linux container
        if: always()
        run: docker rm -f "$CONTAINER" 2>/dev/null || true

  # ── Compliance summary ────────────────────────────────────────────────────
  summary:
    name: VM Test Summary
    runs-on: ubuntu-latest
    needs: [kernel-vm, rocky-container]
    if: always()
    steps:
      - name: Check all VM tests passed
        run: |
          if [ "${{ needs.kernel-vm.result }}" != "success" ]; then
            echo "Ubuntu VM kernel tests failed."
            exit 1
          fi
          if [ "${{ needs.rocky-container.result }}" != "success" ]; then
            echo "Rocky Linux 9 container tests failed."
            exit 1
          fi
          echo "All VM kernel, system, and audit hardening tests passed (Ubuntu + Rocky Linux 9)."
