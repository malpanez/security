name: molecule-complete-stack

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Molecule scenario to run'
        required: false
        default: 'complete_stack_ci'
        type: choice
        options:
          - complete_stack_ci
          - complete_stack
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  complete-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PY_COLORS: "1"
      ANSIBLE_FORCE_COLOR: "1"
      ANSIBLE_CONFIG: ${{ github.workspace }}/ansible.cfg
      DOCKER_BUILDKIT: "1"
      DOCKER_DEFAULT_PLATFORM: linux/amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Pre-pull common images to speed up Molecule
        run: |
          docker pull ubuntu:22.04
          docker pull debian:12
          docker pull rockylinux:9
          docker pull almalinux:9

      - name: Debug - List molecule scenarios
        run: |
          echo "=== Molecule version ==="
          molecule --version
          echo "=== Available scenarios ==="
          ls -la molecule/
          echo "=== Checking scenario files ==="
          ls -la molecule/complete_stack_ci/ || echo "CI scenario missing"

      - name: Run Molecule tests
        run: |
          SCENARIO="${{ github.event.inputs.scenario }}"
          if [ -z "$SCENARIO" ]; then
            SCENARIO="complete_stack_ci"
          fi
          echo "Running Molecule scenario: $SCENARIO"
          if [ "$SCENARIO" == "complete_stack_ci" ]; then
            echo "Using CI scenario (3 platforms: Ubuntu 22.04, Debian 12, Rocky 9)"
          else
            echo "Using full scenario (11 platforms - may timeout)"
          fi
          molecule test -s "$SCENARIO"
