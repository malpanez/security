name: molecule-complete-stack

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Molecule scenario to run'
        required: false
        default: 'complete_stack_ci'
        type: choice
        options:
          - complete_stack_ci
          - complete_stack
  schedule:
    - cron: "0 2 * * *"

jobs:
  complete-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PY_COLORS: "1"
      ANSIBLE_FORCE_COLOR: "1"
      ANSIBLE_CONFIG: ${{ github.workspace }}/ansible.cfg
      ANSIBLE_ROLES_PATH: ${{ github.workspace }}/roles
      ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}
      DOCKER_BUILDKIT: "1"
      DOCKER_DEFAULT_PLATFORM: linux/amd64
      SCENARIO: ${{ github.event.inputs.scenario || 'complete_stack_ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6
        with:
          python-version: "3.12"

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Install Ansible Galaxy collections
        run: |
          ansible-galaxy collection install -r requirements.yml
          ansible-galaxy collection list

      - name: Wait for Docker daemon
        run: |
          set -euo pipefail
          timeout 30 bash -c 'until docker info; do sleep 1; done'
          docker info

      - name: Pre-pull common images to speed up Molecule
        run: |
          set -euo pipefail
          for img in ubuntu:22.04 debian:12 rockylinux:9; do
            echo "Pulling ${img}"
            docker pull "${img}"
          done

      - name: Debug - List molecule scenarios
        run: |
          echo "=== Molecule version ==="
          molecule --version
          echo "=== Available scenarios ==="
          ls -la molecule/
          echo "=== Checking scenario files ==="
          ls -la molecule/complete_stack_ci/ || echo "CI scenario missing"

      - name: Run Molecule tests
        run: |
          echo "Running Molecule scenario: ${SCENARIO}"
          molecule --version
          molecule list -s "${SCENARIO}"
          molecule test -s "${SCENARIO}"
