name: molecule-test

on:
  workflow_dispatch:
  push:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install molecule
        run: |
          pip install molecule==3.5.2 molecule-docker==1.1.0 ansible-core

      - name: Install collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Test molecule create only
        run: |
          set -x
          molecule create -s complete_stack_ci || echo "Create failed with $?"
          docker ps -a
