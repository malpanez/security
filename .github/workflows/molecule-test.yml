name: molecule-test

on:
  workflow_dispatch:
  push:
    branches: [develop, main]
    paths:
      - "roles/**"
      - "molecule/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/molecule-test.yml"
  pull_request:
    branches: [develop, main]
    paths:
      - "roles/**"
      - "molecule/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/molecule-test.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest  # Cannot use ubuntu-slim: Docker driver required
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,test]"

      - name: Run property tests (templates)
        run: pytest tests/property_tests -q

      - name: Install collections
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if ansible-galaxy collection install -r requirements.yml; then
              break
            fi
            echo "Retrying ansible-galaxy collection install (${attempt}/3)..."
            sleep $((attempt * 10))
          done
          ansible-galaxy collection install . -p .ansible/collections

      - name: Test minimal scenario
        run: |
          molecule create -s minimal
          molecule destroy -s minimal
