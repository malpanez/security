name: molecule-test

on:
  workflow_dispatch:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest  # Cannot use ubuntu-slim: Docker driver required
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,test]"

      - name: Run property tests (templates)
        run: pytest tests/property_tests -q

      - name: Install collections
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if ansible-galaxy collection install -r requirements.yml; then
              exit 0
            fi
            echo "Retrying ansible-galaxy collection install (${attempt}/3)..."
            sleep $((attempt * 10))
          done
          exit 1

      - name: Test minimal scenario
        run: |
          molecule create -s minimal
          molecule destroy -s minimal
