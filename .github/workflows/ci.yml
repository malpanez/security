name: ci

on:
  workflow_dispatch:

jobs:
  lint:
    name: Lint with ansible-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: ansible-lint

  test-roles:
    name: Test role - ${{ matrix.role }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        role:
          - security_capabilities
          - sshd_hardening
          - pam_mfa
          - sudoers_baseline
          - selinux_enforcement
          - service_accounts_transfer
          - audit_logging
          - compliance_evidence
          - cis_baseline
    env:
      DOCKER_DEFAULT_PLATFORM: linux/amd64
      PYTHONUNBUFFERED: "1"
      PY_COLORS: "1"
      ANSIBLE_FORCE_COLOR: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Molecule test - ${{ matrix.role }}
        run: |
          cd roles/${{ matrix.role }}
          molecule test -s default

  build-collection:
    name: Build Ansible Collection artifact
    runs-on: ubuntu-latest
    needs: test-roles
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core>=2.16

      - name: Build collection
        run: ansible-galaxy collection build

      - name: Upload collection artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ansible-collection
          path: "*.tar.gz"
          retention-days: 30

  test-install:
    name: Test collection installation
    runs-on: ubuntu-latest
    needs: build-collection
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core>=2.16

      - name: Download collection artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: ansible-collection

      - name: Install collection from artifact
        run: |
          COLLECTION_FILE=$(ls malpanez-security-*.tar.gz)
          ansible-galaxy collection install $COLLECTION_FILE

      - name: Verify collection installed
        run: |
          ansible-galaxy collection list | grep malpanez.security
