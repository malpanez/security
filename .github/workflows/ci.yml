name: ci

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint with ansible-lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: ansible-lint

  test-roles:
    name: Test role - ${{ matrix.role }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        role:
          - security_capabilities
          - sshd_hardening
          - pam_mfa
          - sudoers_baseline
          - selinux_enforcement
          - service_accounts_transfer
          - audit_logging
          - compliance_evidence
          - cis_baseline
    env:
      DOCKER_DEFAULT_PLATFORM: linux/amd64
      PYTHONUNBUFFERED: "1"
      PY_COLORS: "1"
      ANSIBLE_FORCE_COLOR: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Molecule test - ${{ matrix.role }}
        run: |
          cd roles/${{ matrix.role }}
          molecule test -s default

  build-collection:
    name: Build Ansible Collection artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test-roles
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core>=2.16

      - name: Build collection
        run: ansible-galaxy collection build

      - name: Upload collection artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ansible-collection
          path: "*.tar.gz"
          retention-days: 30

  test-install:
    name: Test collection installation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-collection
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core>=2.16

      - name: Download collection artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ansible-collection

      - name: Install collection from artifact
        run: |
          COLLECTION_FILE=$(ls malpanez-security-*.tar.gz)
          ansible-galaxy collection install $COLLECTION_FILE

      - name: Verify collection installed
        run: |
          ansible-galaxy collection list | grep malpanez.security
