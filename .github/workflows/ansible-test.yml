name: Ansible Test

on:
  push:
    branches: [develop, main]
    paths:
      - "roles/**"
      - "plugins/**"
      - "meta/**"
      - "galaxy.yml"
      - "tests/sanity/**"
      - ".github/workflows/ansible-test.yml"
  pull_request:
    branches: [develop, main]
    paths:
      - "roles/**"
      - "plugins/**"
      - "meta/**"
      - "galaxy.yml"
      - "tests/sanity/**"
      - ".github/workflows/ansible-test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    name: Sanity (ansible-core ${{ matrix.ansible }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - "2.16"
          - "2.17"
          - "2.18"
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # ansible-test must run from ansible_collections/<ns>/<name>
      - name: Checkout into collection path
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: ansible_collections/malpanez/security

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install ansible-core ${{ matrix.ansible }}
        run: python -m pip install "ansible-core~=${{ matrix.ansible }}.0"

      - name: Run ansible-test sanity
        working-directory: ansible_collections/malpanez/security
        run: ansible-test sanity --docker --color -v
