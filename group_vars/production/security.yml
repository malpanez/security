---
# Security Configuration - Production Environment
# CONSERVATIVE, gradual rollout with maximum safety
# Start with Phase 1 and progress slowly over weeks

# ========================================
# CONSERVATIVE PRODUCTION DEPLOYMENT
# ========================================

# Start with Phase 1 (SSH hardening only)
# Increment this slowly over weeks as each phase stabilizes
current_security_phase: 1

# Enforce mode (but controlled by phase)
security_mode: enforce

# Phase controls (auto-calculated, don't modify)
security_phase_ssh_hardening: "{{ current_security_phase >= 1 }}"
security_phase_sudoers: "{{ current_security_phase >= 2 }}"
security_phase_mfa: "{{ current_security_phase >= 3 }}"
security_phase_selinux: "{{ current_security_phase >= 4 }}"
security_phase_audit: "{{ current_security_phase >= 5 }}"

# ========================================
# SSH HARDENING (Phase 1)
# ========================================

# Conservative SSH settings for production
sshd_hardening_permit_root_login: false
sshd_hardening_password_authentication: false
sshd_hardening_pubkey_authentication: true
sshd_hardening_max_auth_tries: 4  # Slightly more lenient
sshd_hardening_log_level: VERBOSE
sshd_hardening_x11_forwarding: false
sshd_hardening_use_pam: true

# Production-grade ciphers
sshd_hardening_ciphers:
  - chacha20-poly1305@openssh.com
  - aes256-gcm@openssh.com
  - aes128-gcm@openssh.com

sshd_hardening_macs:
  - hmac-sha2-512-etm@openssh.com
  - hmac-sha2-256-etm@openssh.com

# ========================================
# SUDOERS (Phase 2)
# ========================================

# CRITICAL: NEVER touch main /etc/sudoers in production
sudoers_baseline_preserve_main: true
sudoers_baseline_manage_main_file: false  # Do NOT modify main file

# Only add to /etc/sudoers.d/
sudoers_baseline_defaults:
  - "use_pty"
  - "logfile=/var/log/sudo.log"

# Conservative groups (expand as needed)
sudoers_baseline_groups:
  linux_admins:
    require_password: true
    commands:
      - "/usr/bin/systemctl restart *"
      - "/usr/bin/systemctl status *"

# ========================================
# PAM MFA (Phase 3 - MOST CRITICAL)
# ========================================

pam_mfa_enabled: "{{ current_security_phase >= 3 }}"
pam_mfa_yubikey_enabled: auto
pam_mfa_totp_enabled: true

# CRITICAL: Comprehensive service account list
# Add ALL automation accounts before enabling Phase 3!
pam_mfa_service_accounts:
  - ansible
  - awx
  - tower
  - ci
  - jenkins
  - gitlab-runner
  - github-runner
  - bitbucket-runner
  - monitoring
  - nagios
  - zabbix
  - icinga
  - prometheus
  - grafana
  - datadog
  - newrelic
  - backup
  - rsync
  - sftp
  - bacula
  - bareos
  # ADD YOUR SPECIFIC SERVICE ACCOUNTS HERE BEFORE PHASE 3!

pam_mfa_require_resident_key: false
pam_mfa_user_verification: required

# ========================================
# SELINUX (Phase 4)
# ========================================

selinux_enforcement_enabled: "{{ current_security_phase >= 4 }}"

# CONSERVATIVE: Start permissive, enforce only after validation
# Set selinux_enforcement_production_ready: true after 1 week of permissive
selinux_enforcement_mode: "{{ 'enforcing' if selinux_enforcement_production_ready | default(false) else 'permissive' }}"

selinux_enforcement_packages:
  - policycoreutils
  - policycoreutils-python-utils
  - setools-console

# ========================================
# AUDIT LOGGING (Phase 5)
# ========================================

audit_logging_enabled: "{{ current_security_phase >= 5 }}"
audit_logging_verbose: false  # Conservative logging in production
audit_logging_log_commands: true

# ========================================
# COMPLIANCE
# ========================================

compliance_evidence_output_path: /var/log/security-compliance
compliance_evidence_frameworks:
  - soc2
  - pci-dss

cis_baseline_enabled: true
cis_baseline_mode: "{{ security_mode }}"

# ========================================
# ROLLOUT CONTROLS (CRITICAL)
# ========================================

# GRADUAL rollout - 10% of production at a time
rollout_percentage: "10%"

# Stop if more than 5% fail
max_fail_percentage: 5

# REQUIRE maintenance window
security_require_maintenance_window: true
security_maintenance_day: Saturday  # Or your preferred maintenance day
security_maintenance_hour_start: 2  # 2 AM
security_maintenance_hour_end: 6    # 6 AM

# Automatic rollback on failure
security_production_rollback_on_failure: true

# ========================================
# PRODUCTION SAFETY CHECKLIST
# ========================================

# Before incrementing current_security_phase:
#
# Phase 1 → 2 (SSH → Sudoers):
#   [ ] Phase 1 stable for 1 week in production
#   [ ] No SSH access issues reported
#   [ ] All users have SSH keys configured
#   [ ] Emergency access procedures documented
#
# Phase 2 → 3 (Sudoers → MFA) - MOST CRITICAL:
#   [ ] Phase 2 stable for 1 week
#   [ ] ALL service accounts identified and added to pam_mfa_service_accounts
#   [ ] Users have YubiKeys provisioned
#   [ ] TOTP backup codes distributed
#   [ ] Emergency console access verified
#   [ ] Rollback procedure tested in staging
#   [ ] On-call engineer available during deployment
#   [ ] Change control approved
#
# Phase 3 → 4 (MFA → SELinux):
#   [ ] Phase 3 stable for 2 weeks minimum
#   [ ] MFA working perfectly for all users
#   [ ] No login issues reported
#   [ ] Service accounts confirmed working
#
# Phase 4 → 5 (SELinux → Audit):
#   [ ] SELinux permissive for 1 week with no critical denials
#   [ ] Application compatibility verified
#   [ ] SELinux policies tuned if needed
#
# Phase 5 → 6 (Audit → Full):
#   [ ] All phases individually stable
#   [ ] Disk space monitored for logs
#   [ ] Log rotation configured
#
# ========================================
# PHASE PROGRESSION TIMELINE
# ========================================

# Recommended production timeline:
#
# Week 1-2: current_security_phase: 0 (Review)
#   - Audit current state
#   - Plan changes
#
# Week 3-4: current_security_phase: 1 (SSH)
#   - 10% rollout per batch
#   - Monitor for issues
#
# Week 5-6: current_security_phase: 2 (SSH + Sudoers)
#   - After Phase 1 is stable
#
# Week 7-10: current_security_phase: 3 (+ MFA)
#   - MOST CRITICAL PHASE
#   - Extra caution and validation
#   - User communication and training
#
# Week 11-12: current_security_phase: 4 (+ SELinux)
#   - Week 1: Permissive mode
#   - Week 2: Enforcing mode (if no issues)
#
# Week 13-14: current_security_phase: 5 (+ Audit)
#   - Enable comprehensive logging
#
# Week 15+: current_security_phase: 6 (Full enforcement)
#   - All phases active
#   - Continuous monitoring
