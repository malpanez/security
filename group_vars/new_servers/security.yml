---
# Security Configuration - New Servers
# Aggressive security baseline for newly provisioned servers
# No legacy compatibility needed - apply full baseline immediately

# ========================================
# AGGRESSIVE ENFORCEMENT
# ========================================

# Jump directly to Phase 6 (full enforcement)
current_security_phase: 6

# Enforce mode (no review)
security_mode: enforce

# All phases enabled
security_phase_ssh_hardening: true
security_phase_sudoers: true
security_phase_mfa: true
security_phase_selinux: true
security_phase_audit: true

# ========================================
# SSH HARDENING (STRICT)
# ========================================

sshd_hardening_permit_root_login: false
sshd_hardening_password_authentication: false # No passwords allowed
sshd_hardening_max_auth_tries: 3 # Strict
sshd_hardening_log_level: VERBOSE
sshd_hardening_x11_forwarding: false
sshd_hardening_allow_tcp_forwarding: false # Stricter
sshd_hardening_use_pam: true

# Only modern ciphers
sshd_hardening_ciphers:
  - chacha20-poly1305@openssh.com
  - aes256-gcm@openssh.com

sshd_hardening_macs:
  - hmac-sha2-512-etm@openssh.com

sshd_hardening_kex_algorithms:
  - curve25519-sha256@libssh.org

# ========================================
# SUDOERS (MODULAR FROM START)
# ========================================

# Role manages /etc/sudoers when strict is true
sudoers_baseline_strict: true

# Comprehensive logging
sudoers_baseline_defaults:
  - use_pty
  - logfile=/var/log/sudo.log
  - log_output
  - log_input
  - "!visiblepw"
  - always_set_home
  - env_reset
  - secure_path=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

# Example groups (customize for your environment)
sudoers_baseline_groups:
  linux_admins:
    require_password: true
    commands:
      - /usr/bin/systemctl restart *
      - /usr/bin/systemctl status *
      - /usr/bin/systemctl start *
      - /usr/bin/systemctl stop *
      - /usr/sbin/service *
      - /usr/bin/journalctl *

  devops:
    require_password: false
    commands:
      - /usr/bin/docker *
      - /usr/bin/kubectl *
      - /usr/local/bin/helm *

  monitoring:
    require_password: false
    commands:
      - /usr/bin/systemctl status *
      - /usr/bin/journalctl *

# ========================================
# PAM MFA (ENABLED BY DEFAULT)
# ========================================

pam_mfa_enabled: true
pam_mfa_totp_enabled: true

# Service accounts (customize for your automation)
pam_mfa_service_accounts:
  - ansible
  - awx
  - ci
  - jenkins
  - monitoring
  - nagios
  - prometheus
  - backup


# ========================================
# SELINUX (ENFORCING IMMEDIATELY)
# ========================================

selinux_enforcement_enabled: true
selinux_enforcement_mode: enforcing # Aggressive on new servers

selinux_enforcement_packages:
  - policycoreutils
  - policycoreutils-python-utils
  - setools-console

# ========================================
# AUDIT LOGGING (COMPREHENSIVE)
# ========================================

audit_logging_enabled: true

# ========================================
# COMPLIANCE
# ========================================

cis_baseline_enabled: true
cis_baseline_mode: enforce

# ========================================
# ROLLOUT SETTINGS
# ========================================

# Process new servers in larger batches (they're not production yet)
rollout_percentage: 50%

# No maintenance window required for new servers
security_require_maintenance_window: false

# Rollback enabled but less critical (dev/test environment)
security_staging_rollback_on_failure: true
