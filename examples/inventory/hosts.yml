---
# Example Inventory for malpanez.security Collection
# This inventory demonstrates a typical enterprise setup with different
# security requirements for different server types

all:
  children:
    # ============================================
    # PRODUCTION ENVIRONMENTS
    # ============================================
    production:
      children:
        prod_web:
          hosts:
            web01.prod.example.com:
              ansible_host: 10.0.1.10
            web02.prod.example.com:
              ansible_host: 10.0.1.11
        prod_db:
          hosts:
            db01.prod.example.com:
              ansible_host: 10.0.2.10
              # Database servers need specific service accounts
              additional_service_accounts:
                - postgres
                - mysql_backup
        prod_app:
          hosts:
            app01.prod.example.com:
              ansible_host: 10.0.3.10
            app02.prod.example.com:
              ansible_host: 10.0.3.11

    # ============================================
    # STAGING ENVIRONMENT
    # ============================================
    staging:
      hosts:
        web01.staging.example.com:
          ansible_host: 10.1.1.10
        db01.staging.example.com:
          ansible_host: 10.1.2.10
        app01.staging.example.com:
          ansible_host: 10.1.3.10

    # ============================================
    # NEW SERVERS (Not yet in production)
    # ============================================
    new_servers:
      hosts:
        new01.example.com:
          ansible_host: 10.2.1.10
        new02.example.com:
          ansible_host: 10.2.1.11

    # ============================================
    # DMZ / EXTERNAL-FACING
    # ============================================
    dmz:
      hosts:
        bastion01.dmz.example.com:
          ansible_host: 203.0.113.10
          # Bastion hosts need specific SSH config
          sshd_hardening_port: 2222
          sshd_hardening_listen_address: "0.0.0.0"
        reverse_proxy01.dmz.example.com:
          ansible_host: 203.0.113.20

    # ============================================
    # TRANSFER SERVERS (SFTP/rsync)
    # ============================================
    transfer_servers:
      hosts:
        sftp01.example.com:
          ansible_host: 10.0.4.10
          # Multiple SSH instances for different purposes
          ssh_instances:
            - name: primary
              port: 22
              purpose: admin
            - name: sftp
              port: 2222
              purpose: file_transfer
        rsync01.example.com:
          ansible_host: 10.0.4.20

    # ============================================
    # COMPLIANCE-SPECIFIC GROUPS
    # ============================================

    # PCI-DSS scope servers
    pci_scope:
      hosts:
        payment_gateway.example.com:
          ansible_host: 10.0.5.10
        card_processor.example.com:
          ansible_host: 10.0.5.20

    # HIPAA-covered systems
    hipaa_systems:
      hosts:
        ehr_db.example.com:
          ansible_host: 10.0.6.10
        patient_portal.example.com:
          ansible_host: 10.0.6.20

    # ============================================
    # OS-BASED GROUPS (for platform-specific config)
    # ============================================
    rhel_based:
      children:
        rhel7:
          hosts:
            legacy01.example.com:
              ansible_host: 10.3.1.10
        rhel8:
          hosts:
            app01.prod.example.com:
        rhel9:
          hosts:
            web01.prod.example.com:

    debian_based:
      children:
        ubuntu_1804:
          hosts:
            legacy_ubuntu.example.com:
              ansible_host: 10.3.2.10
        ubuntu_2004:
          hosts:
            app02.prod.example.com:
        ubuntu_2204:
          hosts:
            web02.prod.example.com:

  # ============================================
  # GLOBAL VARIABLES (for all hosts)
  # ============================================
  vars:
    # Ansible connection settings
    ansible_user: ansible
    ansible_become: true
    ansible_become_method: sudo
    ansible_python_interpreter: /usr/bin/python3

    # Global service accounts (bypass MFA everywhere)
    global_service_accounts:
      - ansible
      - awx
      - jenkins
      - gitlab-runner
      - monitoring
      - backup

    # Global SSH settings
    sshd_hardening_protocol: 2
    sshd_hardening_log_level: VERBOSE

    # Global compliance frameworks to check
    compliance_frameworks:
      - soc2
