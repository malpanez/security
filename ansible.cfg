[defaults]
# Inventory and paths
inventory = inventory
roles_path = roles
collections_path = .

# SSH connection settings
host_key_checking = True
timeout = 30
# Parallel execution (increase for large environments)
forks = 10
# Only gather facts when needed
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

# Output and logging (compatible 2.9+)
# Use built-in yaml callback (works on old and new Ansible)
stdout_callback = yaml
retry_files_enabled = False
display_skipped_hosts = False
display_args_to_stdout = False
error_on_undefined_vars = True

# Security settings (set no_log=True to hide sensitive output)
no_log = False
# Don't log to target system syslog
no_target_syslog = True
module_compression = 'ZIP_DEFLATED'

# Performance optimization
# Reduce SSH operations
pipelining = True
control_path_dir = /tmp/ansible_ssh
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ForwardAgent=no
# Faster than default
transfer_method = piped

# Deprecation warnings (disabled to reduce noise in CI)
deprecation_warnings = False
command_warnings = True
system_warnings = True
# Allow broken conditionals for molecule-plugins compatibility
allow_broken_conditionals = True

# Callback plugins for better output
callbacks_enabled = timer,profile_tasks

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False

[ssh_connection]
# SSH multiplexing for performance
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/dev/null
pipelining = True
control_path = /tmp/ansible_ssh_%%h_%%p_%%r

# Security: disable SSH agent forwarding
ssh_extra_args = -o ForwardAgent=no

[colors]
# Color output for better readability
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecate = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
diff_add = green
diff_remove = red
diff_lines = cyan
