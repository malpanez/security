---
- name: "Skip audit logging when disabled"
  ansible.builtin.meta: end_play
  when: not audit_logging_enabled

- name: "Include common audit logging tasks"
  ansible.builtin.include_tasks: common.yml
  when: security_mode | default('enforce') == 'enforce'
  tags: [enforce]

- name: "Include platform-specific audit logging tasks"
  ansible.builtin.set_fact:
    audit_logging_platform_task: "{{ lookup('ansible.builtin.first_found', params={'files': [ansible_os_family | lower ~ '.yml'], 'paths': [role_path ~ '/tasks']}, errors='ignore') }}"
  tags: [enforce]

- name: "Platform-specific audit logging tasks"
  ansible.builtin.include_tasks: "{{ audit_logging_platform_task }}"
  when: audit_logging_platform_task is not none and security_mode | default('enforce') == 'enforce'
  tags: [enforce]
