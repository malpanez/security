---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: cef0300fd0fc4d2a87a85fa2093c6b283ea36f4b  # frozen: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending

  - repo: https://github.com/ansible/ansible-lint
    rev: 4ce8e497d462cf73b4d4fac1e97b4ace4f317dcc  # frozen: v24.12.2
    hooks:
      - id: ansible-lint
        args: [--offline]
        files: \.(yaml|yml)$
        additional_dependencies:
          - ansible-core==2.18.6

  - repo: https://github.com/adrienverge/yamllint
    rev: 79a6b2b1392eaf49cdd32ac4f14be1a809bbd8f7  # frozen: v1.37.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yml]
        files: \.(yaml|yml)$

  - repo: https://github.com/gitleaks/gitleaks
    rev: 78eebaca9d8940b8c511a6e67349168f6477943a  # frozen: v8.26.0
    hooks:
      - id: gitleaks
        args: [--config=.gitleaks.toml, --redact]

  - repo: local
    hooks:
      - id: validate-no-log
        name: Validate no_log on sensitive tasks
        entry: python3 scripts/validate-no-log.py
        language: system
        pass_filenames: false
        always_run: true
